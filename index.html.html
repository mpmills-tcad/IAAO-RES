ics and market conditions.", "p": "311 p.262"}, {"n": 68, "ch": "Ch7: Income Approach Modeling", "q": "The two basic methods for developing per unit rents, expense ratios, GIMs, and OARs are:", "o": ["Direct and indirect capitalization", "Physical and economic analysis", "Cost and income analysis", "Stratification and modeling (regression)"], "a": "D", "e": "Both stratification (grouping similar properties and computing median values) and regression modeling (statistically estimating from property characteristics) can be used to develop GIMs, OARs, rents, and expense ratios.", "p": "311 p.262"}, {"n": 69, "ch": "Ch7: Income Approach Modeling", "q": "Vacancy and collection losses in the income model reflect:", "o": ["Legal restrictions on rent increases", "Above-market lease rates", "Actual specific vacancies of the subject property", "Typical market vacancy rates"], "a": "D", "e": "For ad valorem appraisal, vacancy rates should reflect TYPICAL market vacancy - not the subject actual current vacancy, which may be atypically high or low. Use market-derived typical vacancy rates by property type.", "p": "311 p.262"}, {"n": 70, "ch": "Ch7: Income Approach Modeling", "q": "The measure of goodness-of-fit used in direct sale price models but LESS useful in income models is:", "o": ["COD", "Standard error", "PRD", "R-square"], "a": "D", "e": "R-square measures how well the model predicts sale prices - very useful for direct sales models. In income models (predicting GIMs or OARs), R-square is less meaningful and COD/COV are preferred.", "p": "311 p.262"}, {"n": 71, "ch": "Ch8: Value Review & Maintenance", "q": "________ are used when implementing a new CAMA system or new valuation techniques because they provide a test on a sample or test area:", "o": ["Ratio studies", "Field reviews", "Pilot studies", "Benchmark comparisons"], "a": "C", "e": "Pilot studies test new models or systems on a sample of parcels before full deployment. They identify data issues, model weaknesses, and calibration problems before they affect the entire assessment roll.", "p": "311 p.276"}, {"n": 72, "ch": "Ch8: Value Review & Maintenance", "q": "Once preliminary values are produced, what is an essential first step in quality control?", "o": ["Publishing value notices", "Field review of all properties", "Submitting to state review agency", "Office review of preliminary values"], "a": "D", "e": "Office review is the first quality control step - examining preliminary values for reasonableness, consistency, and credibility before committing to field review or mailing value notices.", "p": "311 p.276"}, {"n": 73, "ch": "Ch8: Value Review & Maintenance", "q": "________ studies are one of the best tools to measure the quality of new appraised values during the review process:", "o": ["Depreciation studies", "Cost index studies", "Market studies", "Ratio studies"], "a": "D", "e": "Ratio studies measure accuracy (level) and uniformity (COD) of new values against recent sales - the most objective measure of value quality available during the review process.", "p": "311 p.276"}, {"n": 74, "ch": "Ch8: Value Review & Maintenance", "q": "Three items required for an effective field review include:", "o": ["Tax bills, appeal records, and deeds", "Ratio reports, assessment maps, and property record cards", "Sales data, cost manuals, and income schedules", "Building permits, zoning maps, and environmental studies"], "a": "B", "e": "Field review requires: (1) Ratio study reports (identify problem areas), (2) Assessment/cadastral maps (identify parcels), (3) Property record cards (verify data accuracy in the field).", "p": "311 p.276"}, {"n": 75, "ch": "Ch8: Value Review & Maintenance", "q": "Three aspects of value acceptability are:", "o": ["Median, mode, and mean", "COD, COV, and PRD", "Cost, income, and sales approach", "Accuracy, stability, and explainability"], "a": "D", "e": "Value acceptability requires: (1) Accuracy (values close to market), (2) Stability (values change smoothly over time, avoiding large swings), and (3) Explainability (values defensible to property owners and courts).", "p": "311 p.277"}, {"n": 76, "ch": "Ch8: Value Review & Maintenance", "q": "Two goodness-of-fit statistics used to evaluate accuracy when using multiple regression are:", "o": ["COD and PRD", "Mean and median", "Adjusted R-square and standard error of estimate (SEE)", "t-value and F-statistic"], "a": "C", "e": "MRA model accuracy is evaluated by: (1) Adjusted R-square (percentage of value variation explained by the model), and (2) SEE (Standard Error of Estimate - average prediction error in dollar terms).", "p": "311 p.277"}, {"n": 77, "ch": "Ch8: Value Review & Maintenance", "q": "Which update strategy tends to maximize ACCURACY versus stability?", "o": ["Partial recalibration", "Cyclical recalibration with interim adjustments", "Annual land value updates only", "Full recalibration of all models"], "a": "D", "e": "Full recalibration of all models maximizes accuracy - all rates and coefficients are updated to current market conditions. However, it may sacrifice stability (large year-to-year value swings).", "p": "311 p.277"}, {"n": 78, "ch": "Ch8: Value Review & Maintenance", "q": "Cyclical recalibration with interim adjustments:", "o": ["Tends to maximize accuracy only", "Tends to maximize stability only", "Sacrifices stability for accuracy", "Maintains reasonable accuracy while emphasizing stability"], "a": "D", "e": "Cyclical recalibration: full model recalibration on a schedule (e.g., every 3-5 years) with interim market adjustments applied annually. This balances accuracy against the need for value stability.", "p": "311 p.277"}, {"n": 79, "ch": "Quiz 1: Chapters 1-5", "q": "Scalar values are best centered on 1.00 in which model type?", "o": ["Additive models", "Hybrid models", "All of the above", "Multiplicative models"], "a": "D", "e": "Scalar multipliers centered on 1.00 work best in multiplicative models - where average = 1.00, above-average = >1.00, below-average = <1.00. In additive models, adjustments are expressed as dollar amounts, not scalar factors.", "p": "311 Quiz1 Q1"}, {"n": 80, "ch": "Quiz 1: Chapters 1-5", "q": "Which statistical technique would be most appropriate for grouping similar subdivisions for modeling purposes?", "o": ["Multiple regression analysis", "Location value response surface analysis", "Adaptive estimation procedure (AEP)", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar observations (subdivisions) by minimizing within-group differences and maximizing between-group differences - the ideal tool for objective neighborhood delineation.", "p": "311 Quiz1 Q2"}, {"n": 81, "ch": "Quiz 1: Chapters 1-5", "q": "Average home age = 25 years, standard deviation = 3 years, normally distributed. Approximately 95% of homes will fall in what age bracket?", "o": ["22-28 years", "22-26 years", "19-31 years", "16-34 years"], "a": "C", "e": "95% falls within +/- 2 standard deviations of the mean: 25 - (2x3) = 19 and 25 + (2x3) = 31. The 95% interval = 19-31 years.", "p": "311 Quiz1 Q3"}, {"n": 82, "ch": "Quiz 1: Chapters 1-5", "q": "A scatter diagram shows a loose NEGATIVE correlation between sale price and distance to the CBD. Which correlation coefficient is consistent?", "o": ["Zero", "0.50", "-2.00", "-0.20"], "a": "D", "e": "A loose negative correlation means: as distance increases, price decreases (negatively related). The correlation coefficient must be between -1 and 0. -0.20 indicates a loose (weak) negative relationship. -2.00 is impossible (outside the -1 to +1 range).", "p": "311 Quiz1 Q4"}, {"n": 83, "ch": "Quiz 1: Chapters 1-5", "q": "Which of the following best defines the coefficient of dispersion (COD)?", "o": ["Standard deviation of the ratios expressed as a percentage of the mean", "Average deviation from the chosen measure of central tendency", "The range which contains 50 percent of the ratios", "Average percentage deviation from the median"], "a": "D", "e": "COD = 100 x (Average Absolute Deviation from Median) / Median. It is the average PERCENTAGE deviation from the MEDIAN - not the mean. This is the IAAO standard definition.", "p": "311 Quiz1 Q5"}, {"n": 84, "ch": "Quiz 1: Chapters 1-5", "q": "The IAAO COD standard for older, heterogeneous residential property is:", "o": ["5.0 or less", "10.0 or less", "20.0 or less", "15.0 or less"], "a": "D", "e": "IAAO COD standard: older heterogeneous residential = 5.0-15.0. Newer homogeneous residential = 5.0-10.0. Income-producing and rural/seasonal = 5.0-20.0.", "p": "311 Quiz1 Q6"}, {"n": 85, "ch": "Quiz 1: Chapters 1-5", "q": "Assessors need skills in single property appraisal to:", "o": ["Develop valuation models", "Test values", "Defend values", "All of the above"], "a": "D", "e": "Single-property appraisal skills are essential in mass appraisal for: (1) developing appropriate model structures, (2) testing values for reasonableness on individual properties, and (3) defending values in appeals.", "p": "311 Quiz1 Q7"}, {"n": 86, "ch": "Quiz 1: Chapters 1-5", "q": "The statement or conclusion that is accepted in the absence of sufficient evidence to the contrary is known as the:", "o": ["Alternative hypothesis", "First hypothesis", "Confidence level", "Null hypothesis"], "a": "D", "e": "The null hypothesis (H0) is the default assumption - accepted unless the data provides sufficient evidence to reject it. In ratio studies, the null might be that the median ratio = 1.00.", "p": "311 Quiz1 Q8"}, {"n": 87, "ch": "Quiz 1: Chapters 1-5", "q": "Ratios: 0.89, 0.96, 1.08, 1.14, 1.20. Mean = 1.054. Standard deviation = 0.122. What is the coefficient of variation (COV)?", "o": ["10.6", "13.3", "12.1", "11.4"], "a": "B", "e": "COV = (SD / Mean) x 100 = (0.122 / 1.054) x 100 = 11.6... Closest to 11.4 per IAAO answer key. Note: COV = 100 x 0.1157/1.054 = 10.98 or approx 11.4 depending on rounding.", "p": "311 Quiz1 Q9"}, {"n": 88, "ch": "Quiz 1: Chapters 1-5", "q": "In the cost approach model, construction costs represent the ________ side of the market and depreciation represents the ________ side:", "o": ["Demand; supply", "Supply; supply", "Demand; demand", "Supply; demand"], "a": "D", "e": "Supply side = construction costs (cost to produce). Demand side = depreciation (what buyers will pay relative to replacement cost, reflecting market acceptance of the property at its age/condition).", "p": "311 Quiz1 Q10"}, {"n": 89, "ch": "Quiz 1: Chapters 1-5", "q": "The cost approach is closely related to which model structure?", "o": ["Additive model structure", "Multiplicative model structure", "Least square model structure", "Hybrid model structure"], "a": "D", "e": "The hybrid (generic) model: MV = GQ x [LV + (RCN - D)] directly mirrors the cost approach: Land Value + Depreciated Building Value, multiplied by a general qualitative (neighborhood) factor.", "p": "311 Quiz1 Q11"}, {"n": 90, "ch": "Quiz 1: Chapters 1-5", "q": "Which of the following is NOT one of the seven major steps in the mass appraisal process?", "o": ["Preliminary survey and analysis", "Valuation", "Correlation of values, model testing, and quality control", "Defend value estimates"], "a": "D", "e": "The seven mass appraisal steps: (1) Preliminary survey, (2) Data collection, (3) Data analysis, (4) Model specification, (5) Model calibration, (6) Valuation, (7) Review and quality control. Defending values is not one of the seven formal steps.", "p": "311 Quiz1 Q12"}, {"n": 91, "ch": "Quiz 1: Chapters 1-5", "q": "The process of quantifying and evaluating reliability of value estimates by comparing values to a representative sample of sales is:", "o": ["Model specification", "Model infusion", "Model calibration", "Model testing"], "a": "D", "e": "Model testing = comparing modeled values against actual sales to quantify accuracy. This produces ratio statistics (median, COD, PRD) that tell the assessor whether the model meets IAAO performance standards.", "p": "311 Quiz1 Q13"}, {"n": 92, "ch": "Quiz 1: Chapters 1-5", "q": "In modern price theory, which of the following is NOT a determinant of demand?", "o": ["Consumer incomes", "Consumer expectations", "Price of related commodities", "Availability and cost of goods used in production"], "a": "D", "e": "Demand determinants: income, tastes/preferences, expectations, prices of related goods (substitutes/complements), number of buyers. Availability and cost of production inputs are SUPPLY-side factors.", "p": "311 Quiz1 Q14"}, {"n": 93, "ch": "Quiz 1: Chapters 1-5", "q": "V = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is what type of model?", "o": ["Multiplicative", "Hybrid", "None of the above", "Additive"], "a": "D", "e": "This is an additive model: the base value (b0) plus dollar contributions from each property characteristic. Each b coefficient represents the dollar value of one unit of its corresponding X variable.", "p": "311 Quiz1 Q15"}, {"n": 94, "ch": "Quiz 1: Chapters 1-5", "q": "The most effective but most expensive means of collecting income and expense data is:", "o": ["Mail questionnaire", "Telephone survey", "Assessment appeals", "Personal interview"], "a": "D", "e": "Personal interviews yield the most complete and accurate income/expense data but consume the most professional time and resources.", "p": "311 Quiz1 Q16"}, {"n": 95, "ch": "Quiz 1: Chapters 1-5", "q": "In a net lease, the owner pays:", "o": ["All expenses", "Only operating expenses", "A pre-specified percentage of expenses", "No operating expenses"], "a": "D", "e": "Net lease: tenant pays all operating expenses (property taxes, insurance, maintenance). The owner receives net rent with no expense obligations. Sometimes called a triple-net (NNN) lease.", "p": "311 Quiz1 Q17"}, {"n": 96, "ch": "Quiz 1: Chapters 1-5", "q": "A lease indexed to the Consumer Price Index is an example of:", "o": ["A percentage lease", "A net lease", "A graduated lease", "An adjustable lease"], "a": "D", "e": "An adjustable (index) lease ties rent increases to an external index (CPI, PPI) to protect landlord purchasing power from inflation. Different from a graduated lease, which specifies fixed step-up amounts.", "p": "311 Quiz1 Q18"}, {"n": 97, "ch": "Quiz 1: Chapters 1-5", "q": "Interactive effects, where the impact of certain property characteristics on value is interrelated, are best handled by:", "o": ["Additive MRA", "Stepwise MRA", "Exponential transformations", "Multiplicative and quotient transformations"], "a": "D", "e": "Multiplicative and quotient transformations capture interaction effects - where the value contribution of one variable depends on another (e.g., quality x size: a larger good-quality home commands a premium over both quality and size alone).", "p": "311 Quiz1 Q19"}, {"n": 98, "ch": "Quiz 1: Chapters 1-5", "q": "Which of the following can best be used to present visually the contents of a frequency distribution?", "o": ["Array", "Scatter diagram", "Box plot", "Bar chart (histogram)"], "a": "D", "e": "A histogram (bar chart) is specifically designed to display frequency distributions - each bar represents an interval, and the height shows how many observations fall in that interval.", "p": "311 Quiz1 Q20"}, {"n": 99, "ch": "Quiz 1: Chapters 1-5", "q": "The IAAO Standard on Ratio Studies calls for a price-related differential (PRD) in what range?", "o": ["0.95 to 1.05", "0.95 to 1.10", "0 to 0.15", "0.98 to 1.03"], "a": "D", "e": "IAAO PRD standard: 0.98 to 1.03. Values outside this range indicate systematic vertical inequity (regressivity or progressivity) that should be corrected.", "p": "311 Quiz1 Q21"}, {"n": 100, "ch": "Quiz 1: Chapters 1-5", "q": "Costs used in mass appraisal are typically:", "o": ["Reproduction costs", "Historical costs", "Trended historical costs", "Replacement costs"], "a": "D", "e": "Mass appraisal uses replacement costs (cost to construct a building of equal utility using modern materials/methods) rather than reproduction costs (exact replica). Replacement cost manuals are updated regularly to reflect current construction costs.", "p": "311 Quiz1 Q22"}, {"n": 101, "ch": "Quiz 1: Chapters 1-5", "q": "Which of the following does NOT apply to the development of depreciation tables?", "o": ["Use only arm-length sales", "Exclude parcels with extreme land-to-building ratios", "Exclude parcels with additional buildings", "Include mixed-use parcels"], "a": "D", "e": "Mixed-use parcels should be EXCLUDED from depreciation analysis - their complex mix of uses makes it impossible to accurately extract depreciation for a single building type. Only clean, arm-length, single-use sales are appropriate.", "p": "311 Quiz1 Q23"}, {"n": 102, "ch": "Quiz 1: Chapters 1-5", "q": "In market calibration of cost models, market adjustments can be developed using ratio studies stratified by:", "o": ["Construction class only", "Size only", "Age groups only", "All of the above: construction class, size, and age groups"], "a": "D", "e": "Cost model calibration uses ratio studies stratified by: construction class (wood frame vs. masonry), size ranges (large homes vs. small), and age/condition groups - to identify where the model systematically over- or under-predicts.", "p": "311 Quiz1 Q24"}, {"n": 103, "ch": "Quiz 2: Chapters 6-8", "q": "V = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is an example of which model structure for sales comparison?", "o": ["Hybrid", "Multiplicative", "Adaptive Estimation Procedure", "Additive"], "a": "D", "e": "This is the standard additive model formula for the sales comparison approach in mass appraisal.", "p": "311 Quiz2 Q1"}, {"n": 104, "ch": "Quiz 2: Chapters 6-8", "q": "N=349; Adj R-sq=0.879; SEE=9,800; Avg sale price=00,000. Approximately two-thirds of regression errors fall within what range?", "o": ["-19.6% to +19.6%", "0% to 12.1%", "-12.1% to +12.1%", "-9.8% to +9.8%"], "a": "D", "e": "Two-thirds (68%) of errors fall within +/- 1 SEE. SEE as % of mean = ,800/00,000 = 9.8%. So roughly two-thirds of predictions are within -9.8% to +9.8% of actual sale prices.", "p": "311 Quiz2 Q2"}, {"n": 105, "ch": "Quiz 2: Chapters 6-8", "q": "The most accurate measure of the percentage of variation in sale prices explained by a regression model is the:", "o": ["R-square", "Coefficient of variation", "Standard error of estimate", "Adjusted R-square"], "a": "D", "e": "Adjusted R-square corrects R-square for the number of variables in the model (degrees of freedom). Unlike R-square, it only increases if a new variable genuinely improves model fit - more accurate for comparing models.", "p": "311 Quiz2 Q3"}, {"n": 106, "ch": "Quiz 2: Chapters 6-8", "q": "In regression statistics, the ratio of a regression coefficient to its standard error is the:", "o": ["R-square", "Adjusted R-square", "Standard error of estimate", "t-value"], "a": "D", "e": "t-value = coefficient / standard error. It measures statistical significance. Higher t-values (typically > 2.0) indicate the variable is a statistically significant predictor of value.", "p": "311 Quiz2 Q4"}, {"n": 107, "ch": "Quiz 2: Chapters 6-8", "q": "In MRA, ________ represent the difference between actual and predicted sale prices:", "o": ["Standard error of estimate", "Coefficient of variation", "None of the above", "Residuals"], "a": "D", "e": "Residuals = actual sale price minus predicted sale price for each observation. Systematic patterns in residuals reveal model weaknesses that need to be addressed.", "p": "311 Quiz2 Q5"}, {"n": 108, "ch": "Quiz 2: Chapters 6-8", "q": "Which of the following employs the Euclidean distance metric?", "o": ["Location value response surface analysis", "Multiplicative MRA", "Adaptive estimation procedure / Feedback", "Automated comparable sales"], "a": "D", "e": "Automated comparable sales uses a Euclidean distance metric to find the most similar properties to the subject based on multiple characteristics simultaneously. The closest properties are selected as comparables.", "p": "311 Quiz2 Q6"}, {"n": 109, "ch": "Quiz 2: Chapters 6-8", "q": "During office review, the reasonableness, consistency, and credibility of values can be gauged through:", "o": ["Ratio studies only", "Benchmark values only", "Average change in values only", "All of the above: ratio studies, benchmark values, and average value changes"], "a": "D", "e": "Office review uses all available tools: ratio studies (accuracy/uniformity), benchmark comparisons (individual property reasonableness), and average change reports (detecting unexpected value shifts by area or class).", "p": "311 Quiz2 Q7"}, {"n": 110, "ch": "Quiz 2: Chapters 6-8", "q": "Materials required for an effective field review of values include:", "o": ["Assessment maps and property record cards only", "Sales ratio reports only", "Average value change reports only", "All of the above"], "a": "D", "e": "Field review requires all three: (1) Assessment/cadastral maps to locate parcels, (2) Property record cards to verify data, (3) Sales ratio reports and value change reports to guide which areas need attention.", "p": "311 Quiz2 Q8"}, {"n": 111, "ch": "Quiz 2: Chapters 6-8", "q": "Aspects of value acceptability are:", "o": ["Accuracy only", "Stability only", "Explainability only", "Accuracy, stability, and explainability"], "a": "D", "e": "All three aspects are required: (1) Accuracy - values close to market, (2) Stability - reasonable year-to-year continuity, (3) Explainability - values that can be clearly justified to owners and courts.", "p": "311 Quiz2 Q9"}, {"n": 112, "ch": "Quiz 2: Chapters 6-8", "q": "Which update strategy maximizes accuracy versus stability?", "o": ["Cyclical recalibration with interim adjustments", "Partial recalibration", "All equally maximize both", "Full recalibration of all models"], "a": "D", "e": "Full recalibration maximizes accuracy (all coefficients updated to current market) but may sacrifice stability (large year-to-year swings). It is appropriate when values have drifted far from market.", "p": "311 Quiz2 Q10"}, {"n": 113, "ch": "Quiz 2: Chapters 6-8", "q": "MRA works on the principle of:", "o": ["Passing the sales file multiple times until coefficients converge", "Finding best comparables via Euclidean distance metric", "Minimizing the absolute errors between actual and predicted prices", "Minimizing the SQUARED errors between actual and predicted sale prices"], "a": "D", "e": "MRA uses ordinary least squares (OLS): it finds the coefficients that minimize the sum of squared residuals. Squaring penalizes large errors more heavily than small ones.", "p": "311 Quiz2 Q11"}, {"n": 114, "ch": "Quiz 2: Chapters 6-8", "q": "The most flexible model structure, which is also the most difficult to calibrate, is the:", "o": ["Additive model", "None of the above", "Multiplicative model", "Hybrid model"], "a": "D", "e": "The hybrid model combines multiplicative and additive elements, allowing the greatest flexibility in modeling complex value relationships. However, this flexibility makes calibration more complex.", "p": "311 Quiz2 Q12"}, {"n": 115, "ch": "Quiz 2: Chapters 6-8", "q": "When modeling income properties with small sample sizes, they can best be expanded by:", "o": ["Using non-market sales", "Combining property types", "Supplementing with prior year values", "Extending the period from which sales are drawn"], "a": "A", "e": "Extending the time period from which sales are drawn (with appropriate time adjustments) is the preferred approach to expand small income property samples. Using non-market sales or mixing property types would distort the model.", "p": "311 Quiz2 Q13"}, {"n": 116, "ch": "Quiz 2: Chapters 6-8", "q": "The most appropriate calibration tool for a multiplicative model is:", "o": ["Additive MRA", "AEP / Feedback", "Response surface analysis", "Log-linear MRA"], "a": "D", "e": "Multiplicative models are calibrated using log-linear MRA - both the dependent variable (sale price) and independent variables are converted to natural logarithms before regression. The resulting coefficients are exponents.", "p": "311 Quiz2 Q14"}, {"n": 117, "ch": "Quiz 2: Chapters 6-8", "q": "Which measure is used to assess the significance of individual independent variables in a regression model?", "o": ["Correlation coefficient", "Adjusted R-square", "Standard error of estimate", "t-value"], "a": "D", "e": "The t-value measures whether a specific variable makes a statistically significant contribution to the model. Variables with t-values below approximately 2.0 may not be significant and could be candidates for removal.", "p": "311 Quiz2 Q15"}, {"n": 118, "ch": "Quiz 2: Chapters 6-8", "q": "SP/SQFT = 61.85 x SQFT^0.977 x PCTGOOD^0.652. Which of the following is true?", "o": ["The model is hybrid in form", "The model is multiplicative in form", "The contribution of SQFT to value is linear", "The effect of SQFT and PCTGOOD upon value is additive"], "a": "B", "e": "This model is MULTIPLICATIVE: variables are multiplied together with exponents. The exponent of SQFT (0.977) is less than 1, meaning the effect is slightly less-than-linear (diminishing returns to size).", "p": "311 Quiz2 Q16"}, {"n": 119, "ch": "Quiz 2: Chapters 6-8", "q": "GIM data: newer apartments in average economic area = 6.7; older apartments in superior economic area = 6.0; older apartments in average area = 5.4. Which multiplier is MOST likely inconsistent with appraisal theory?", "o": ["6.0 for older apartments in superior area", "5.9 for mid-age apartments in average area", "5.4 for older apartments in average area", "6.7 for newer apartments in average area"], "a": "D", "e": "A GIM of 6.7 for newer apartments in the AVERAGE area exceeds the GIM for newer apartments in the SUPERIOR area - this is inconsistent with appraisal theory, which holds that superior location should command a higher GIM (or the same level). This multiplier likely requires override.", "p": "311 Quiz2 Q17"}, {"n": 120, "ch": "Quiz 2: Chapters 6-8", "q": "In developing gross income models for a large metropolitan area, it would be most important to stratify properties by:", "o": ["Value", "Size, stories, or number of units", "Economic area", "Use class"], "a": "D", "e": "Primary stratification for income models should be by use class (apartments, retail, office, industrial) because different use types have fundamentally different income characteristics, cap rates, and GIMs.", "p": "311 Quiz2 Q18"}, {"n": 121, "ch": "Quiz 2: Chapters 6-8", "q": "Which of the following is LEAST effective in evaluating the reliability of an expense ratio model?", "o": ["Coefficient of dispersion", "Coefficient of variation", "Standard error of estimate", "R-square"], "a": "D", "e": "R-square measures how well a model predicts sale PRICES and is effective for direct sales models. For expense ratio models, measures of dispersion (COD, COV, SEE) around the predicted expense ratio are more meaningful than R-square.", "p": "311 Quiz2 Q19"}, {"n": 122, "ch": "Quiz 2: Chapters 6-8", "q": "Which of the following is an important component of the field review of values?", "o": ["Assessment maps only", "Property record cards only", "Valuation reports only", "All of the above"], "a": "D", "e": "Effective field review requires all three: maps (locate parcels), property record cards (verify physical data), and valuation/ratio reports (guide review priorities).", "p": "311 Quiz2 Q20"}, {"n": 123, "ch": "Quiz 2: Chapters 6-8", "q": "Cyclical recalibration with interim adjustments:", "o": ["Tends to maximize accuracy only", "Tends to maximize stability only", "Sacrifices stability for accuracy", "Maintains reasonable accuracy while emphasizing stability"], "a": "D", "e": "Cyclical recalibration achieves a balance: full model updates every few years maintain long-run accuracy, while annual market factor adjustments (time trending) keep values reasonably current between full recalibrations.", "p": "311 Quiz2 Q21"}, {"n": 124, "ch": "Quiz 2: Chapters 6-8", "q": "Office building: 2,500 sq ft, rent 5/sf, vacancy 5%, expenses 15%, misc income 2%, cap rate 8%. Value (rounded to nearest 00) is:", "o": ["78,500", "70,900", "98,400", "86,500"], "a": "B", "e": "PGI = 2,500 x 5 = 7,500. Less vacancy (5%): 7,500 x 0.95 = 5,625. EGI. Add misc income (2%): 7,500 x 0.02 = 50. Total EGI = 6,375. Less expenses (15%): 6,375 x 0.85 = 0,919. NOI = 0,919. Value = 0,919/0.08 = 86,488, rounded = 86,500.", "p": "311 Quiz2 Q22"}]}}, "master": [{"n": 1, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The property tax is an ad valorem tax, meaning it is based on:", "o": ["The income generated by the property", "Value", "The cost to replace the property", "The original purchase price"], "a": "B", "e": "Ad valorem means according to value. The property tax is levied as a percentage of estimated market value.", "p": "101 p.5"}, {"n": 2, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The three basic responsibilities of the assessor are to:", "o": ["Collect taxes, issue permits, and record deeds", "Discover, list, and value all taxable property", "Appraise, sell, and transfer taxable property", "Zone, map, and record all real property"], "a": "B", "e": "The assessors three core duties: discover all taxable property, list it, and value it for taxation.", "p": "101 p.5"}, {"n": 3, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The taxable location of personal property is referred to as its:", "o": ["Domicile", "Nexus", "Assessment site", "Situs"], "a": "D", "e": "Situs is the legal term for where personal property is physically situated and subject to tax.", "p": "101 p.6"}, {"n": 4, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "An estimate of value in writing of an adequately described property as of a given date is termed a(n):", "o": ["Assessment", "Market analysis", "Equalization report", "Appraisal"], "a": "D", "e": "An appraisal is a formal written estimate of value for a described property as of a specific date.", "p": "101 p.4"}, {"n": 5, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "A jurisdiction tax rate is determined by dividing the revenue needed from property tax by:", "o": ["The total number of parcels", "The prior year levy", "The total market value of all property", "The total assessed value of the taxing jurisdiction"], "a": "D", "e": "Tax Rate = Net Budget divided by Total Assessed Value.", "p": "101 p.8"}, {"n": 6, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The type of value most commonly estimated by the assessor is:", "o": ["Use value", "Investment value", "Insurable value", "Market value"], "a": "D", "e": "Assessors typically estimate market value - the most probable price in an open competitive market.", "p": "101 p.7"}, {"n": 7, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The effective tax rate (ETR) reflects the ratio between:", "o": ["The mill rate and assessment level", "The tax levy and the budget", "The assessed value and cost", "The current tax bill and the property market value"], "a": "D", "e": "ETR = Tax Bill divided by Market Value. It is the true property tax burden as a share of market value.", "p": "101 p.13"}, {"n": 8, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "For a property to have value it must possess:", "o": ["Size, location, condition, and age", "Title, zoning, access, and improvements", "Income, appreciation, liquidity, and leverage", "Utility, scarcity, desirability, and effective purchasing power"], "a": "D", "e": "The four elements of value (USDE): Utility, Scarcity, Desirability, and Effective Purchasing Power.", "p": "101 p.19"}, {"n": 9, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The use that generates the highest net return to a property over a reasonable period is its:", "o": ["Interim use", "Probable future use", "Current use", "Highest and best use"], "a": "D", "e": "Highest and best use is legally permissible, physically possible, financially feasible, and maximally productive.", "p": "101 p.39"}, {"n": 10, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The principle of conformity states that maximum neighborhood value is attained when:", "o": ["All properties are the same age", "Properties appreciate uniformly", "All structures are equal quality", "The uses of land are perfectly complementary"], "a": "D", "e": "Conformity: maximum value is achieved when land uses in a neighborhood are compatible and complementary.", "p": "101 p.27"}, {"n": 11, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Which principle affirms that land cannot be valued on one use while improvements are valued on another?", "o": ["Substitution", "Anticipation", "Surplus productivity", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must be valued under the same use assumption simultaneously.", "p": "101 p.21"}, {"n": 12, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The four tests of highest and best use must be applied in which sequence?", "o": ["Financially feasible, maximally productive, legally permissible, physically possible", "Physically possible, legally permissible, maximally productive, financially feasible", "Maximally productive, financially feasible, physically possible, legally permissible", "Legally permissible, physically possible, financially feasible, maximally productive"], "a": "D", "e": "Sequential order: (1) Legally permissible, (2) Physically possible, (3) Financially feasible, (4) Maximally productive.", "p": "101 p.39"}, {"n": 13, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Real property is defined as:", "o": ["Any property that can be moved without damage", "All property owned by a legal entity", "Tangible personal property used in trade", "A parcel of land and any structures or improvements permanently affixed thereto"], "a": "D", "e": "Real property = land plus all permanently attached improvements.", "p": "101 p.16"}, {"n": 14, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Property is considered personal property if it can be:", "o": ["Owned by a private individual", "Subject to property taxes", "Assessed as of the lien date", "Moved without causing damage to itself or the structure"], "a": "D", "e": "Personal property is movable - removable without damage to itself or the structure.", "p": "101 p.16"}, {"n": 15, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Assessment level multiplied by the tax rate equals the:", "o": ["Assessed value", "Taxable value", "Nominal tax rate", "Effective tax rate"], "a": "D", "e": "ETR = Assessment Level x Tax Rate.", "p": "101 p.13"}, {"n": 16, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Equilibrium in the market is defined as the point at which:", "o": ["All properties have sold", "Supply exceeds demand", "Interest rates stabilize", "The forces of supply and demand meet"], "a": "D", "e": "Equilibrium is the balance point where quantity supplied equals quantity demanded.", "p": "101 p.24"}, {"n": 17, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The two types of highest and best use analysis are:", "o": ["Single-property and mass appraisal", "Cost approach and income approach", "Interim use and final use", "As vacant and as improved"], "a": "D", "e": "H&BU is analyzed: (1) as if the site were vacant and available, and (2) as currently improved.", "p": "101 p.39"}, {"n": 18, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The four stages of a typical neighborhood life cycle in correct order are:", "o": ["Decline, growth, stability, revitalization", "Growth, decline, stability, revitalization", "Stability, growth, decline, revitalization", "Growth, stability, decline, revitalization"], "a": "D", "e": "The four stages in order: Growth, Stability, Decline, Revitalization.", "p": "101 p.53"}, {"n": 19, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Which of the following contributes to a change in DEMAND (not supply)?", "o": ["Number of sellers in the market", "Cost of production materials", "Price of inputs to produce goods", "Consumer income and purchasing power"], "a": "D", "e": "Demand factors: consumer income, tastes, prices of substitutes, expectations, number of buyers.", "p": "101 p.24"}, {"n": 20, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The definition of market value assumes all of the following EXCEPT:", "o": ["Buyer and seller are typically motivated", "Reasonable exposure time in the open market", "Payment in cash or cash-equivalent terms", "The buyer is forced to purchase within 30 days"], "a": "D", "e": "Market value assumes motivated parties, reasonable exposure, and cash-equivalent payment. A forced sale violates the open-market assumption.", "p": "101 p.19"}, {"n": 21, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "Which of the following is NOT one of the four government powers limiting private property rights?", "o": ["Taxation", "Eminent domain", "Police power", "Dedication"], "a": "D", "e": "The four government limitations are: Taxation, Eminent Domain, Police Power, and Escheat. Dedication is a voluntary act by a property owner.", "p": "101 p.17"}, {"n": 22, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The first step in the seven-step appraisal process is:", "o": ["Data collection and analysis", "Application of the three approaches", "Reconciliation and final value opinion", "Definition of the appraisal problem"], "a": "D", "e": "Step 1 is defining the appraisal problem - identifying the property, rights appraised, purpose, date, and limiting conditions.", "p": "101 p.46"}, {"n": 23, "ch": "Ch1: Assessment & Appraisal Theory", "course": "101", "q": "The underlying principle for all three approaches to appraisal is:", "o": ["Anticipation", "Contribution", "Balance", "Substitution"], "a": "D", "e": "Substitution: a rational buyer will not pay more than the cost of acquiring an equally desirable substitute.", "p": "101 p.44"}, {"n": 24, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The principle that returns to land are what remain after returns to labor, management, and capital are satisfied is:", "o": ["Supply and demand", "Change", "Anticipation", "Surplus productivity"], "a": "D", "e": "Surplus productivity - land receives the residual income after all other agents of production have been compensated.", "p": "101 p.95"}, {"n": 25, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "Measuring property lines with compass bearings and distances between monuments describes which system?", "o": ["State plane coordinate system", "Public Land Survey System", "Platted subdivision system", "Metes and bounds"], "a": "D", "e": "Metes and bounds describes boundaries using compass directions and distances between monuments.", "p": "101 p.99"}, {"n": 26, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "A township in the Public Land Survey System contains how many sections, each containing how many acres?", "o": ["32 sections - 620 acres", "36 sections - 320 acres", "30 sections - 640 acres", "36 sections - 640 acres"], "a": "D", "e": "A township = 6 x 6 miles = 36 square miles. Each section = 1 square mile = 640 acres.", "p": "101 p.80"}, {"n": 27, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "In the PLSS, the NE quarter NW quarter SE quarter SW quarter contains how many acres?", "o": ["5 acres", "10 acres", "40 acres", "2.5 acres"], "a": "D", "e": "Each quarter division divides by 4: 640 / 4 / 4 / 4 / 4 = 2.5 acres.", "p": "101 p.80"}, {"n": 28, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "When using the direct sales comparison approach to value land, the first step is to:", "o": ["Apply dollar adjustments", "Calculate price per front foot", "Determine final value by reconciliation", "Stratify sales into homogeneous groups"], "a": "D", "e": "Stratification - grouping sales by type, location, and characteristics - is the essential first step.", "p": "101 p.115"}, {"n": 29, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "Improvements such as streets, sidewalks, and utilities are considered:", "o": ["Direct costs", "Superadequacies", "Functional additions", "Site improvements"], "a": "D", "e": "Site improvements are infrastructure (streets, utilities, grading) that make raw land developable.", "p": "101 p.93"}, {"n": 30, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "Which land valuation method compares the subject to comparable vacant parcels that have recently sold?", "o": ["Abstraction method", "Allocation method", "Anticipated use method", "Direct sales comparison method"], "a": "D", "e": "The direct sales comparison method is preferred - it compares vacant land sales directly and adjusts for differences.", "p": "101 p.115"}, {"n": 31, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "Front foot, square foot, and acre are examples of basic:", "o": ["Legal description systems", "Adjustment methods", "Stratification categories", "Units of comparison"], "a": "D", "e": "Units of comparison normalize sale prices for comparison.", "p": "101 p.115"}, {"n": 32, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "In the direct sales comparison approach, adjustments are always made to the ________ property:", "o": ["Subject", "Either one", "Most recent", "Comparable"], "a": "D", "e": "Adjustments are ALWAYS made to the comparable - the subject is the fixed benchmark.", "p": "101 p.115"}, {"n": 33, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "If a comparable lot is SUPERIOR to the subject in some characteristic, the adjustment to the comparable is:", "o": ["Positive (+)", "Zero", "Depends on magnitude", "Negative (-)"], "a": "D", "e": "If the comparable is superior its price is adjusted downward (-) to equate it to the subject.", "p": "101 p.115"}, {"n": 34, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The abstraction method of land valuation involves:", "o": ["Comparing the subject to similar vacant parcels", "Applying a land-to-value ratio", "Capitalizing ground rent", "Subtracting the depreciated value of improvements from the sale price"], "a": "D", "e": "Abstraction: Land Value = Sale Price minus (RCN minus Depreciation). Extracts land value from improved sales.", "p": "101 p.120"}, {"n": 35, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The preferred method of valuing land when adequate vacant land sales are available is:", "o": ["Abstraction method", "Allocation method", "Cost of development method", "Direct sales comparison method"], "a": "D", "e": "Direct sales comparison is always preferred when adequate comparable vacant land sales exist.", "p": "101 p.115"}, {"n": 36, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "A land-to-building ratio of 1:4 means land represents what percent of total value?", "o": ["40%", "25%", "80%", "20%"], "a": "D", "e": "Ratio 1:4 = 1 part land + 4 parts building = 5 parts total. Land = 1/5 = 20%.", "p": "101 p.117"}, {"n": 37, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The property account number linking ownership records, tax maps, and assessment records is the:", "o": ["Legal description", "Assessment ratio", "Cadastral index", "Parcel identifier (PIN)"], "a": "D", "e": "The parcel identifier (PIN) is a unique code linking every record system to the physical parcel.", "p": "101 p.92"}, {"n": 38, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The concept that market value of vacant land depends on potential use rather than current use is:", "o": ["Supply and demand", "Anticipation", "Change", "Highest and best use"], "a": "D", "e": "H&BU - land is valued at its highest and best use, not necessarily its current use.", "p": "101 p.39"}, {"n": 39, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "Factors affecting land values such as size, topography, and location are termed:", "o": ["Governmental factors", "Social factors", "Economic factors", "Physical factors"], "a": "D", "e": "Physical factors include size, shape, topography, frontage, drainage, utilities, and locational attributes of the site.", "p": "101 p.95"}, {"n": 40, "ch": "Ch2: Land Description & Valuation", "course": "101", "q": "The land valuation method that replicates the actions of subdividers or developers is the:", "o": ["Sales comparison method", "Allocation method", "Abstraction method", "Anticipated use or development method"], "a": "D", "e": "The anticipated use/development method models what a developer would pay - projecting lot sales, deducting costs and profit, then discounting to present value.", "p": "101 p.120"}, {"n": 41, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "The cost approach is premised on the principle of substitution, which holds that an informed buyer will not pay:", "o": ["More than the assessed value", "Less than the income-justified value", "More than the sellers asking price", "More to build a property than the cost of acquiring a similar one with equal utility"], "a": "D", "e": "The cost approach is grounded in substitution - a rational buyer will not pay more to construct than to acquire an equivalent existing property.", "p": "101 p.147"}, {"n": 42, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Costs that occur directly on the construction site are called:", "o": ["Indirect costs", "Soft costs", "Overhead costs", "Direct costs"], "a": "D", "e": "Direct (hard) costs are on-site construction expenses: materials, labor, and equipment.", "p": "101 p.148"}, {"n": 43, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Architectural fees, insurance, and title expenses during construction are classified as:", "o": ["Direct costs", "Variable costs", "Replacement costs", "Indirect costs (soft costs)"], "a": "D", "e": "Indirect costs include architectural/engineering fees, financing costs, insurance, permits, and taxes during construction.", "p": "101 p.148"}, {"n": 44, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Reproduction cost new is defined as:", "o": ["Cost to build an equally useful structure with modern materials", "Depreciated value of the current improvement", "Insured value of the structure", "Cost to produce an exact replica using original materials and methods"], "a": "D", "e": "Reproduction cost = exact replica using same materials, design, and methods as original.", "p": "101 p.150"}, {"n": 45, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Replacement cost new (RCN) is defined as:", "o": ["Cost to produce an exact replica", "Depreciated market value of improvements", "Original construction cost indexed to current dollars", "Cost to produce a building of equal utility using modern methods and materials"], "a": "D", "e": "RCN uses current materials and standards to produce equivalent utility.", "p": "101 p.150"}, {"n": 46, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Building A: 100x100 ft (10,000 sq ft). Building B: 50x200 ft (10,000 sq ft). Which costs MORE to build?", "o": ["Building A - it is more square", "They cost the same", "Cannot be determined", "Building B - it has more exterior wall perimeter per square foot"], "a": "D", "e": "Building B has 500 ft perimeter vs Building A 400 ft. More perimeter = more exterior wall = higher cost.", "p": "101 p.155"}, {"n": 47, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Building A was built 20 years ago for 00,000. Cost index was 200 then; now it is 350. Reproduction cost new today is:", "o": ["00,000", "00,000", "00,000", "00,000"], "a": "D", "e": "RCN = Historical Cost x (Current Index / Past Index) = 00,000 x (350/200) = 00,000.", "p": "101 p.155"}, {"n": 48, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "The easiest, fastest, and most widely used method of estimating cost is the:", "o": ["Quantity survey method", "Unit-in-place method", "Trended historical cost method", "Comparative unit (square foot) method"], "a": "D", "e": "The comparative unit method applies a cost-per-unit rate to building size. Most efficient for valuing large numbers of properties.", "p": "101 p.155"}, {"n": 49, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Which of the following is a desirable feature of a cost manual?", "o": ["Applicable to most structure types only", "Based on actual costs only", "Suitable for computerization only", "All of the above"], "a": "D", "e": "A good cost manual should be comprehensive, accurate (real market data), regularly updated, and CAMA-compatible.", "p": "101 p.197"}, {"n": 50, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Depreciation in the cost approach is defined as:", "o": ["IRS tax write-off over useful life", "Annual decline in assessed value", "Physical wear and tear only", "The difference between market value of an improvement and its cost at the time of appraisal"], "a": "D", "e": "Appraisal depreciation = any loss in value from any cause = RCN minus depreciated value.", "p": "101 p.172"}, {"n": 51, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Property B sold for 80,000 with land value of 0,000. RCN for improvement is 00,000. Extracted depreciation is:", "o": ["25%", "40%", "55%", "50%"], "a": "D", "e": "Improvement value = 80,000 - 0,000 = 00,000. Depreciation = (00,000 - 00,000) / 00,000 = 50%.", "p": "101 p.174"}, {"n": 52, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Curable physical deterioration is measured by:", "o": ["The economic age-life formula", "Capitalizing rent loss", "The observed condition breakdown method", "The cost to cure"], "a": "D", "e": "Curable physical deterioration = cost to cure. An item is curable when the cost to repair does not exceed the value added.", "p": "101 p.175"}, {"n": 53, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Functional obsolescence is a loss in value due to:", "o": ["Physical wear and deterioration", "Factors outside the property boundaries", "The passage of time regardless of condition", "A deficiency, modernization need, or superadequacy within the structure"], "a": "D", "e": "Functional obsolescence originates within the building - poor floor plan, outdated features, or over-improvements.", "p": "101 p.172"}, {"n": 54, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "External (economic) obsolescence is a loss in value resulting from:", "o": ["A superadequacy in the improvements", "Outdated design features inside the building", "Physical deterioration of structural components", "A decrease in utility caused by factors outside the property boundaries"], "a": "D", "e": "External obsolescence originates outside the property and is always incurable.", "p": "101 p.172"}, {"n": 55, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Incurable physical deterioration is measured by the:", "o": ["Cost to cure", "Sales comparison market extraction", "Capitalized income loss approach", "Economic age-life method"], "a": "D", "e": "The economic age-life method: Depreciation % = Effective Age / Total Economic Life.", "p": "101 p.172"}, {"n": 56, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "If a depreciation table starts at 0% and goes to 40%, the percent good table would:", "o": ["Start at 0% and go to 40%", "Start at 40% and go to 100%", "Start at 60% and go to 100%", "Start at 100% and go to 60%"], "a": "D", "e": "Percent good = 100% - Depreciation %. If depreciation goes 0 to 40%, percent good goes 100% to 60%.", "p": "101 p.183"}, {"n": 57, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "The most detailed depreciation method, required for demonstration appraisal reports, is the:", "o": ["Economic age-life method", "Modified economic age-life method", "Sales comparison method", "Observed condition (breakdown) method"], "a": "D", "e": "The observed condition/breakdown method separately identifies and measures each type and category of depreciation.", "p": "101 p.197"}, {"n": 58, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "A short-lived item: cost new = ,000; actual age = 5 years; total useful life = 20 years. Dollar depreciation is:", "o": [",000", ",500", "50", ",250"], "a": "D", "e": "Depreciation = (5/20) x ,000 = 25% x ,000 = ,250.", "p": "101 p.183"}, {"n": 59, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "A residence lacks a second bath on the first floor. RCN if installed originally = 1,500; cost to install today = 3,500. Functional obsolescence is:", "o": ["1,500", "3,500", ",500", ",000"], "a": "D", "e": "Curable functional obsolescence = Excess Cost to Cure = 3,500 - 1,500 = ,000.", "p": "101 p.197"}, {"n": 60, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "Residence rents for 00/month; comparable rents for 25/month. GRM = 150; land-to-building ratio = 1:4. External obsolescence to the improvement is:", "o": [",750", ",625", ",500", ",000"], "a": "D", "e": "Rent loss = 5/month. Total loss = 5 x 150 = ,750. Building share = 4/5 = 80%. Obsolescence = ,750 x 0.80 = ,000.", "p": "101 p.213"}, {"n": 61, "ch": "Ch3: Cost Estimation & Depreciation", "course": "101", "q": "If the cost to cure a functional deficiency exceeds the value added to the property, it is classified as:", "o": ["Curable functional obsolescence", "Physical curable deterioration", "External obsolescence", "Incurable functional obsolescence"], "a": "D", "e": "Incurable if cost to fix > value added. Curable if cost to fix is less than or equal to value added.", "p": "101 p.172"}, {"n": 62, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The major premise of the sales comparison approach is that:", "o": ["Value equals the cost to reproduce the property", "The income stream determines value", "Land and building must be valued separately", "Value is determined by comparing the subject to similar recently sold properties"], "a": "D", "e": "The sales comparison approach derives value by analyzing actual sales of comparable properties and adjusting for differences.", "p": "101 p.231"}, {"n": 63, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The underlying principle of the adjustment process in the sales comparison approach is:", "o": ["Anticipation", "Substitution", "Balance", "Contribution"], "a": "D", "e": "Contribution governs adjustments - each feature is adjusted for the value it contributes to the whole property.", "p": "101 p.232"}, {"n": 64, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "A major advantage of the sales comparison approach is that it:", "o": ["Can be used for all special-purpose properties", "Requires no market data", "Can be completed without inspection", "Reflects the actual actions of buyers and sellers in the market"], "a": "D", "e": "The sales comparison approach is market-driven, directly reflecting real buyer/seller behavior.", "p": "101 p.232"}, {"n": 65, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The sales comparison approach generally CANNOT reliably value:", "o": ["Single-family residences", "Vacant land", "Agricultural land", "Special-purpose or one-of-a-kind properties"], "a": "D", "e": "Special-purpose properties have few or no true comparables, making the sales comparison approach unreliable.", "p": "101 p.232"}, {"n": 66, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The cardinal rule in the sales comparison approach is that all adjustments are made to the:", "o": ["Subject property", "Both subject and comparable", "The one with more differences", "Comparable sale property"], "a": "D", "e": "Adjustments are ALWAYS made to the comparable - never to the subject. The subject is the fixed benchmark.", "p": "101 p.232"}, {"n": 67, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "Paired sales analysis requires sale properties to be:", "o": ["Sold within 90 days of each other", "Located in the same neighborhood", "Sold under the same financing conditions", "Identical in all attributes except the one being measured"], "a": "D", "e": "Paired sales isolates the value contribution of one feature by finding two sales differing in only that characteristic.", "p": "101 p.240"}, {"n": 68, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "Which method of determining adjustments CANNOT be used to measure market conditions (time trends)?", "o": ["Paired sales analysis", "Multiple regression analysis", "Repeat sales analysis", "Depreciated cost method"], "a": "D", "e": "The depreciated cost method values features based on cost and cannot detect market-based time trends.", "p": "101 p.232"}, {"n": 69, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The unit of comparison for office properties is generally the:", "o": ["Price per room", "Price per acre", "Price per animal unit", "Price per square foot of net rentable area"], "a": "D", "e": "Office properties are typically compared on a price-per-square-foot basis (NRA).", "p": "101 p.232"}, {"n": 70, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "Price per animal unit is the appropriate unit of comparison when valuing:", "o": ["Office properties", "Suburban residential lots", "Industrial warehouses", "Agricultural livestock operations"], "a": "D", "e": "Agricultural livestock operations are valued on a per-animal-unit basis when carrying capacity is the primary value driver.", "p": "101 p.232"}, {"n": 71, "ch": "Ch4: Sales Comparison Approach", "course": "101", "q": "The principle of change states that market value is never constant because:", "o": ["Properties physically deteriorate over time", "Buyers and sellers have different motivations", "Interest rates fluctuate annually", "Physical, governmental, social, and economic forces are constantly at work"], "a": "D", "e": "The four PEGS forces constantly influence markets - hence the need for market condition (time) adjustments.", "p": "101 p.232"}, {"n": 72, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The basic responsibilities of the assessor include which of the following?", "o": ["List only", "Value only", "Discover only", "All of the above: discover, list, and value"], "a": "D", "e": "The three basic assessor responsibilities are: discover all taxable property, list it, and value it.", "p": "101 Quiz1 Q1"}, {"n": 73, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "One of the steps an assessor must take in the DISCOVERY of property is to:", "o": ["Create a legal description", "Determine the physical attributes of the property", "Confirm the property rights", "Conduct periodic on-site inspections of properties"], "a": "D", "e": "Discovery requires physically locating and identifying property - periodic on-site inspections are a key method.", "p": "101 Quiz1 Q2"}, {"n": 74, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The property tax is a(n) _________ tax, meaning it is based on value:", "o": ["Use tax", "Income tax", "Value added tax", "Ad valorem"], "a": "D", "e": "Ad valorem means according to value.", "p": "101 Quiz1 Q3"}, {"n": 75, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Actual value = 75,000; assessment level = 20%; tax rate = 92.8 mills. The property tax is:", "o": ["24.80", ",248.00", ",624.00", ",299.20"], "a": "A", "e": "AV = 75,000 x 0.20 = 5,000. Tax = 5,000 x 0.0928 = ,248. Per IAAO answer key: A (24.80).", "p": "101 Quiz1 Q4"}, {"n": 76, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "If a tax rate is 3.30 per 00, the decimal equivalent is:", "o": ["1.3300", "13.300", "133.00", "0.1330"], "a": "D", "e": "3.30 per 00 = 13.30 / 100 = 0.1330 as a decimal multiplier.", "p": "101 Quiz1 Q5"}, {"n": 77, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "________ divided by the assessed value equals the tax rate:", "o": ["Market value", "Millage", "Assessment level", "Budget"], "a": "D", "e": "Tax Rate = Net Budget / Total Assessed Value.", "p": "101 Quiz1 Q6"}, {"n": 78, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Assessment level times the tax rate equals the:", "o": ["Nominal tax rate", "Taxable value", "Market value", "Effective tax rate"], "a": "D", "e": "ETR = Assessment Level x Tax Rate.", "p": "101 Quiz1 Q7"}, {"n": 79, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Budget = ,000,000; Market Value = 00,000,000; Assessment Level = 50%; Non-property tax revenue = ,000,000. Tax rate in dollars per 00 is:", "o": ["1.25", ".25", ".50", ".25"], "a": "D", "e": "Net budget = ,000,000. AV = 00M x 50% = 00M. Rate = M / 00M = 0.0125 = .25 per 00.", "p": "101 Quiz1 Q8"}, {"n": 80, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "________ is the physical land and everything permanently attached to it:", "o": ["Chattel", "Real property", "Real estate", "All of the above"], "a": "C", "e": "Real estate is the physical land and all permanently attached structures. Real property is a broader legal concept including real estate plus the rights.", "p": "101 Quiz1 Q9"}, {"n": 81, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Which of the following is a GOVERNMENTAL restriction on the bundle of rights?", "o": ["Lien", "Lease", "Easement", "Eminent domain"], "a": "D", "e": "Eminent domain is a government power to take private property for public use with just compensation. Liens, leases, and easements are private encumbrances.", "p": "101 Quiz1 Q10"}, {"n": 82, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Which of the following is a basic right associated with the ownership of property?", "o": ["To use", "To lease or rent", "To enter or leave", "All of the above"], "a": "D", "e": "The bundle of rights includes: to use, to lease/rent, to enter/leave, to sell, to exclude others, and to bequeath.", "p": "101 Quiz1 Q11"}, {"n": 83, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The economic forces that determine SCARCITY - one of the four elements of value - are:", "o": ["Anticipation and change", "Increasing and decreasing returns", "Progression and regression", "Supply and demand"], "a": "D", "e": "Scarcity is a function of supply and demand. Limited supply relative to demand creates scarcity.", "p": "101 Quiz1 Q12"}, {"n": 84, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "________ is the point at which the forces of supply and demand meet - the point of balance:", "o": ["Changes in supply", "Changes in demand", "All of the above", "Equilibrium"], "a": "D", "e": "Equilibrium is the balance point where supply and demand forces meet.", "p": "101 Quiz1 Q13"}, {"n": 85, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A ________ interest is ownership of all the rights in a property, except those reserved by the government, and with no private encumbrances:", "o": ["Possessory", "Leasehold", "Leased fee", "Fee simple"], "a": "D", "e": "Fee simple = full ownership with no private encumbrances, subject only to government powers.", "p": "101 Quiz1 Q14"}, {"n": 86, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "In the appraisal process, data collection requires the assessor to collect:", "o": ["General data", "Specific data", "Comparative data", "All of the above"], "a": "D", "e": "Data collection requires general data (regional/neighborhood), specific data (subject property), and comparative data (comparable sales/rents).", "p": "101 Quiz1 Q15"}, {"n": 87, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Which is NOT one of the four great forces by which value is created, maintained, modified, or destroyed?", "o": ["Economic", "Social", "Governmental", "Conceptual"], "a": "D", "e": "The four PEGS forces are Physical, Economic, Governmental, and Social. Conceptual is not one of them.", "p": "101 Quiz1 Q16"}, {"n": 88, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A ________ is defined as an area of complementary land uses in which all properties are similarly influenced by the four forces affecting value:", "o": ["Tract", "Lot", "Subdivision", "Neighborhood"], "a": "D", "e": "A neighborhood is a geographic area where all properties experience similar influences from the four PEGS forces.", "p": "101 Quiz1 Q17"}, {"n": 89, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Parcel A: land 0,000, improvements 50,000. Parcel B: land 00,000, improvements 00,000. Subject total value = 00,000. Allocation method land value is:", "o": ["00,000", "0,000", "None of the above", "5,000"], "a": "D", "e": "Land ratio: A = 0K/00K = 25%; B = 00K/00K = 25%. Subject land = 00,000 x 25% = 5,000.", "p": "101 Quiz1 Q18"}, {"n": 90, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "What element of the marketplace is likely to contribute to a change in DEMAND?", "o": ["Cost of production", "Number of sellers", "Price of other goods", "Consumer expectations"], "a": "D", "e": "Consumer expectations are a demand-side factor. Cost of production, number of sellers, and price of inputs are supply-side factors.", "p": "101 Quiz1 Q19"}, {"n": 91, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A township in the PLSS contains _______ sections, each section containing _______ acres:", "o": ["32 - 620", "36 - 320", "30 - 640", "36 - 640"], "a": "D", "e": "A township = 6x6 miles = 36 sections. Each section = 1 square mile = 640 acres.", "p": "101 Quiz1 Q21"}, {"n": 92, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The NE quarter NW quarter SE quarter SW quarter contains _______ acres:", "o": ["5", "10", "None of the above - it contains 40", "2.5"], "a": "D", "e": "640 / 4 / 4 / 4 / 4 = 2.5 acres.", "p": "101 Quiz1 Q22"}, {"n": 93, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A land description system where boundaries are described as distances between semipermanent points or compass bearing lines is:", "o": ["State plane coordinate system", "Public Land Survey System", "Platted subdivision system", "Metes and bounds"], "a": "D", "e": "Metes and bounds uses compass bearings and distances between monuments to describe boundaries.", "p": "101 Quiz1 Q23"}, {"n": 94, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The principle that market value of a property tends to be set by the cost of acquiring an equally desirable substitute is:", "o": ["Progression", "Surplus productivity", "Conformity", "Substitution"], "a": "D", "e": "Substitution: a rational buyer will not pay more than the cost of an equivalent substitute.", "p": "101 Quiz1 Q24"}, {"n": 95, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A parcel identifier links ownership records, tax maps, and assessment records. Thus the identifier must be:", "o": ["Unique", "Permanent", "Simple", "All of the above"], "a": "D", "e": "A parcel identifier must be unique, permanent, and simple to be effective across all record systems.", "p": "101 Quiz1 Q25"}, {"n": 96, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Stratification is the first step in analyzing land sales, and the primary sort is by:", "o": ["Zoning", "Land use regulations", "Probable future use", "Market area"], "a": "D", "e": "The primary stratification sort is by market area - ensuring comparables come from the same competitive market.", "p": "101 Quiz1 Q26"}, {"n": 97, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "Given: Sale price = 20,000; Cost new of improvement = 60,000; Depreciation = 0,000. Indicated land value using abstraction is:", "o": ["0,000", "0,000", "None of the above", "0,000"], "a": "D", "e": "Land = Sale Price - (Cost New - Depreciation) = 20,000 - (60,000 - 0,000) = 20,000 - 70,000 = 0,000.", "p": "101 Quiz1 Q29"}, {"n": 98, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The principle illustrating that market value is determined by factors such as zoning, rent controls, and interest rates is:", "o": ["Anticipation", "Contribution", "Consistent use", "Change"], "a": "D", "e": "Change: market value is never constant because external forces (governmental, economic, social, physical) are always at work.", "p": "101 Quiz1 Q30"}, {"n": 99, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The appropriate map scale for urban areas is:", "o": ["1 inch = 200 feet", "1 inch = 100 feet", "1 foot = 400 feet", "1 inch = 50 feet"], "a": "D", "e": "Urban areas use the largest scale (most detail): 1 inch = 50 feet. Suburban = 1 inch = 100 or 200 feet. Rural = smaller scale.", "p": "101 Quiz1 Q31"}, {"n": 100, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "A lot measures 242 feet x 1,800 feet. At 0,000 per acre the lot value is:", "o": ["0,000", ",600,000", "None of the above", "00,000"], "a": "D", "e": "Area = 242 x 1,800 = 435,600 sq ft. Acres = 435,600 / 43,560 = 10 acres. Value = 10 x 0,000 = 00,000.", "p": "101 Quiz1 Q32"}, {"n": 101, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "When pedestrian access is an important consideration the appropriate land unit of comparison is the:", "o": ["Square foot", "Acre", "Units buildable", "Front foot"], "a": "D", "e": "Front footage captures street frontage and pedestrian/visibility access value - typical for retail storefronts.", "p": "101 Quiz1 Q33"}, {"n": 102, "ch": "Quiz 1: Chapters 1-2", "course": "101", "q": "The correct sequence of percentage adjustments in the direct sales comparison approach is:", "o": ["Market conditions, financing, location, physical characteristics", "Location, market conditions, financing, physical characteristics", "Physical characteristics, location, market conditions, financing", "Financing, market conditions, location, physical characteristics"], "a": "D", "e": "Sequence: (1) Financing, (2) Market conditions/time, (3) Location, (4) Physical characteristics.", "p": "101 Quiz1 Q34"}, {"n": 103, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The cost of producing a building of equal utility using modern materials and workmanship is called:", "o": ["Indirect cost", "Reproduction cost", "Direct cost", "Replacement cost"], "a": "D", "e": "Replacement cost new (RCN) uses current materials and standards to produce equivalent utility.", "p": "101 Quiz2 Q1"}, {"n": 104, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "When using a cost manual, which component is NOT included in the inventory of physical characteristics?", "o": ["Heating and cooling", "Porches", "Current condition", "Location"], "a": "D", "e": "Cost manuals capture physical building characteristics. Location affects land value but is not a physical building characteristic.", "p": "101 Quiz2 Q2"}, {"n": 105, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The underlying principle in the adjustment process in the sales comparison approach is the Principle of:", "o": ["Substitution", "Complementary use", "Change", "Contribution"], "a": "D", "e": "Contribution governs adjustments - each feature is worth what it adds to overall property value.", "p": "101 Quiz2 Q3"}, {"n": 106, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "A resale sold 18 months ago for 00,000 and again 8 months ago for 20,000. Monthly time adjustment is:", "o": ["0.09%", "10%", "0.83%", "1%"], "a": "D", "e": "Change = 0,000 over 10 months (18-8). Monthly % = 0,000 / 00,000 / 10 = 1% per month.", "p": "101 Quiz2 Q4"}, {"n": 107, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which approach to value is premised on the Principle of Substitution?", "o": ["Cost approach only", "Sales comparison approach only", "Income approach only", "All three approaches"], "a": "D", "e": "Substitution underlies all three approaches.", "p": "101 Quiz2 Q5"}, {"n": 108, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which is NOT an appropriate unit of comparison for multi-family residential properties?", "o": ["Price per room", "Price per square foot", "GIM (Gross Income Multiplier)", "Price per cubic foot"], "a": "D", "e": "For multi-family: price per room, per unit, per sq ft, and GIM are all appropriate. Price per cubic foot is rarely used.", "p": "101 Quiz2 Q7"}, {"n": 109, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The cost of building an exact replica of a building is called:", "o": ["Direct cost", "Indirect cost", "Replacement cost", "Reproduction cost"], "a": "D", "e": "Reproduction cost = exact replica using same materials, design, and methods as original.", "p": "101 Quiz2 Q8"}, {"n": 110, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Direct costs for a 1,500 sq ft home = 0/sq ft; indirect costs = 20% of direct. Cost new of the improvement is:", "o": ["20,000", "94,000", "6,000", "44,000"], "a": "D", "e": "Direct = 1,500 x 0 = 20,000. Indirect = 20,000 x 20% = 4,000. Cost new = 44,000.", "p": "101 Quiz2 Q9"}, {"n": 111, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Same data: cost new = 44,000; land = 0,000; depreciation rate = 0.5%/year x 10 years. Indicated value by cost approach is:", "o": ["36,800", "94,000", "None of the above", "86,800"], "a": "D", "e": "Depreciation = 5%. Depreciated improvement = 44,000 x 0.95 = 36,800. Total = 36,800 + 0,000 = 86,800.", "p": "101 Quiz2 Q10"}, {"n": 112, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "External obsolescence attributable to the improvement is measured by:", "o": ["Capitalizing rent loss using a GRM only", "The cost to cure", "The economic age-life method", "Capitalizing rent loss using GRM multiplied by the buildings share of total value"], "a": "D", "e": "External obsolescence affects land and improvements. Only the improvement share is charged: (Rent Loss x GRM) x Building Ratio.", "p": "101 Quiz2 Q11"}, {"n": 113, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "When a property experiences functional obsolescence it is usually the result of:", "o": ["Physical wear beyond normal maintenance", "Factors outside the property boundaries", "Over-assessment by the assessor", "Diminished utility within the building"], "a": "D", "e": "Functional obsolescence = diminished utility within the building - poor design, missing features, or superadequacies.", "p": "101 Quiz2 Q12"}, {"n": 114, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The most accurate but most time-consuming method of cost estimation is the:", "o": ["Unit-in-place method", "Square foot or cubic foot method", "Trended historical cost method", "Quantity survey method"], "a": "D", "e": "Quantity survey inventories every material and component - most detailed and accurate, but impractical for mass appraisal.", "p": "101 Quiz2 Q13"}, {"n": 115, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The first adjustment in the sales comparison approach is:", "o": ["Market conditions (time of sale)", "Location", "Physical characteristics", "Financing"], "a": "D", "e": "Financing (cash equivalency) is applied first to convert all sales to a cash-equivalent basis before any other adjustments.", "p": "101 Quiz2 Q14"}, {"n": 116, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "RCN = 68,000; curable items depreciation = 0,000; short-lived incurable depreciation = 7,200; actual age = 20 yrs; total life = 80 yrs; curable RCN = ,800; short-lived RCN = 0,000. Long-lived incurable depreciation is:", "o": ["5,200", "7,300", "21,440", "4,800"], "a": "D", "e": "Long-lived RCN = 68,000 - ,800 - 0,000 = 99,200. Depreciation % = 20/80 = 25%. Amount = 99,200 x 25% = 4,800.", "p": "101 Quiz2 Q15"}, {"n": 117, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Using the same data, total physical depreciation is:", "o": ["25,900", "12,400", "04,000", "02,000"], "a": "D", "e": "Total = curable (0,000) + short-lived incurable (7,200) + long-lived incurable (4,800) = 02,000.", "p": "101 Quiz2 Q16"}, {"n": 118, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Using the same data (RCN = 68,000; total physical depreciation = 02,000; land = 5,000), indicated value by cost approach is:", "o": ["39,000", "30,600", "17,100", "41,000"], "a": "D", "e": "Depreciated improvement = 68,000 - 02,000 = 66,000. Total value = 66,000 + 5,000 = 41,000.", "p": "101 Quiz2 Q17"}, {"n": 119, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which sale is MOST comparable to a subject with 3BR, 2.5 bath, 1 den, 2-car garage? Sale 1: 4BR, 2.5 bath, den, 2-car (10 mo. ago). Sale 3: 3BR, 2.5 bath, den, 2-car (10 mo. ago, 30,000). Sale 4: 3BR, 1.5 bath, den, 1-car (current).", "o": ["Sale 1 - most recent", "Sale 2 - closest price", "Sale 4 - current sale", "Sale 3 - fewest differences from subject"], "a": "D", "e": "Sale 3 matches the subject on bedrooms, bathrooms, den, and garage - only a time adjustment is needed.", "p": "101 Quiz2 Q19"}, {"n": 120, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which of the following influences DEMAND when analyzing supply and demand?", "o": ["Current inventories", "Materials for construction", "Capital availability for producers", "Local services"], "a": "D", "e": "Demand factors include consumer income, tastes, expectations, and access to services. Inventories, materials, and capital are supply-side factors.", "p": "101 Quiz2 Q20"}, {"n": 121, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which of the following is a method used to determine adjustments in the sales comparison approach?", "o": ["Paired sales analysis only", "Multiple regression analysis only", "Depreciated cost only", "All of the above"], "a": "D", "e": "Recognized adjustment methods include: paired sales analysis, multiple regression analysis, and depreciated cost - all are valid.", "p": "101 Quiz2 Q21"}, {"n": 122, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "The cost approach is MOST applicable when:", "o": ["Income data is abundant", "Comparable sales are plentiful", "The property has been on the market over a year", "Valuing new construction, special-purpose properties, or properties with planned renovations"], "a": "D", "e": "Best uses of the cost approach: new/proposed construction, special-purpose properties, and renovation analysis.", "p": "101 Quiz2 Q22"}, {"n": 123, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which is NOT a characteristic of cost?", "o": ["Quality of workmanship", "Design type", "Floor area", "Land value"], "a": "D", "e": "Cost characteristics are building attributes: quality, design, size, features, condition. Land value is a separate component.", "p": "101 Quiz2 Q23"}, {"n": 124, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Which of the following is NOT an indirect cost?", "o": ["Engineering fees", "Real estate taxes during construction", "Insurance", "Supervision"], "a": "D", "e": "Supervision of workers on-site is a direct cost. Engineering fees, taxes during construction, and insurance are indirect costs.", "p": "101 Quiz2 Q24"}, {"n": 125, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "An INDIRECT method of measuring depreciation is the:", "o": ["Sales comparison method", "Observed condition (breakdown) method", "Cost to cure method", "Economic age-life method"], "a": "D", "e": "Indirect methods estimate total depreciation in one step: economic age-life and modified economic age-life. The breakdown method is a direct method.", "p": "101 Quiz2 Q26"}, {"n": 126, "ch": "Quiz 2: Chapters 3-4", "course": "101", "q": "Kitchen outlets are inadequate. Existing cost = ,600; depreciation charged = 50%; cost to remove/install new = ,600; if installed originally = ,800. Depreciation amount is:", "o": [",400", ",600", "0,200", "00"], "a": "D", "e": "Curable functional obsolescence (modernization deficiency) = Cost to Cure minus RCN if originally installed = ,600 - ,800 = 00.", "p": "101 Quiz2 Q27"}, {"n": 127, "ch": "Qu
