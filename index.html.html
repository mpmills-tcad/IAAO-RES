wances and free rent periods are examples of:", "o": ["Miscellaneous income", "Lease concessions", "Net lease provisions", "Operating expense adjustments"], "a": "B", "e": "Lease concessions (free rent, TI allowances, moving allowances) are offered by landlords to attract tenants. Effective rent analysis strips out concessions to find the true economic rent.", "p": "102 p.83"}, {"n": 30, "ch": "Ch2: Net Operating Income", "q": "Leased fee value tends to be less than fee simple value because:", "o": ["Leases always reduce property value", "Leased properties are harder to sell", "Leases are typically set at market level when written but usually fall below market levels as time passes", "Tenants always pay less than market rent"], "a": "C", "e": "Leased fee value can differ from fee simple value. When contract rents are below market (common as leases age), leased fee value is typically less than fee simple market value.", "p": "102 p.85"}, {"n": 31, "ch": "Ch2: Net Operating Income", "q": "Effective rent is used as a common denominator to compare leases with different provisions. It equals:", "o": ["Contract rent plus all concessions", "The natural breakpoint in a percentage lease", "Lease base rent plus market adjustments", "Lease base rent minus rent concessions"], "a": "D", "e": "Effective rent = Base Rent minus Rent Concessions. It strips out free rent, TI allowances, and other landlord inducements to provide an apples-to-apples comparison across different leases.", "p": "102 p.87"}, {"n": 32, "ch": "Ch2: Net Operating Income", "q": "The formula to calculate the Operating Expense Ratio (OER) is:", "o": ["Operating Expenses / Potential Gross Income", "NOI / Sale Price", "Operating Expenses / Effective Gross Income", "EGI / Sale Price"], "a": "C", "e": "OER = Operating Expenses / Effective Gross Income. It expresses operating expenses as a percentage of EGI and is used to compare expense levels across properties.", "p": "102 p.89"}, {"n": 33, "ch": "Ch3: Capitalization Rates", "q": "Name five methods of developing an overall capitalization rate (RO):", "o": ["Derivation from sales, band of investment, summation, effective gross income multiplier, and debt coverage ratio", "Sales comparison, cost approach, income approach, GIM, and DCR", "PGI multiplier, EGI multiplier, NOI multiplier, land residual, and building residual", "Market extraction, paired sales, regression, cost, and income"], "a": "A", "e": "The five methods of developing RO are: (1) Derivation from comparable sales, (2) Band-of-investment (mortgage-equity), (3) Summation (built-up), (4) Effective gross income multiplier method, and (5) Debt coverage ratio method.", "p": "102 p.120"}, {"n": 34, "ch": "Ch3: Capitalization Rates", "q": "The four components of the summation method of developing the overall yield rate (YO) are:", "o": ["Safe rate, illiquidity premium, management burden, and risk premium", "PGI, EGI, NOI, and net income ratio", "Land rate, building rate, equity rate, and mortgage rate", "Discount rate, recapture rate, tax rate, and vacancy rate"], "a": "A", "e": "Summation method: YO = Safe Rate + Illiquidity Premium + Management Burden + Risk Premium. Each component compensates for a specific investment characteristic relative to a safe (risk-free) investment.", "p": "102 p.123"}, {"n": 35, "ch": "Ch3: Capitalization Rates", "q": "When developing an overall capitalization rate from derivation from comparable sales, three critical items that must be highly comparable are:", "o": ["Sale price, square footage, and age", "Income, expenses, and location", "NOI, OER, and remaining economic life", "Amenities, expense ratios, and remaining economic life"], "a": "D", "e": "For valid cap rate extraction from sales, comparables must be similar in: (1) amenities/location/desirability, (2) expense ratios (OER), and (3) remaining economic life. Different ratios or economic lives distort the extracted rate.", "p": "102 p.125"}, {"n": 36, "ch": "Ch3: Capitalization Rates", "q": "Another name for the mortgage capitalization rate (RM) is the:", "o": ["Overall yield rate", "Equity capitalization rate", "Annual mortgage constant", "Safe rate"], "a": "C", "e": "The mortgage capitalization rate (RM) is also called the annual mortgage constant - it is the ratio of annual debt service to the original loan amount.", "p": "102 p.128"}, {"n": 37, "ch": "Ch3: Capitalization Rates", "q": "The band-of-investment technique computes a weighted average of:", "o": ["The land capitalization rate and building capitalization rate", "The overall yield rate and recapture rate", "The mortgage capitalization rate (RM) and equity capitalization rate (RE)", "The effective tax rate and the safe rate"], "a": "C", "e": "Band-of-investment (mortgage-equity): RO = (M x RM) + ((1-M) x RE), where M = loan-to-value ratio. It weights RM and RE by their respective proportions of total value.", "p": "102 p.130"}, {"n": 38, "ch": "Ch3: Capitalization Rates", "q": "The capitalization rate method most often used by lending institutions is the:", "o": ["Summation method", "Band-of-investment method", "Effective gross income multiplier method", "Debt coverage ratio method"], "a": "D", "e": "Lenders use the debt coverage ratio (DCR) method because it focuses on the safety of their loan - whether NOI is sufficient to cover debt service by a margin that protects the lender.", "p": "102 p.133"}, {"n": 39, "ch": "Ch3: Capitalization Rates", "q": "The effective tax rate (ETR) is the percentage that annual real estate taxes are in relation to:", "o": ["The assessed value of the property", "The net operating income", "The potential gross income", "The total property value"], "a": "D", "e": "ETR = Annual Real Estate Taxes / Total Property Value. It is expressed as a decimal and loaded into the capitalization rate when taxes are excluded from operating expenses.", "p": "102 p.136"}, {"n": 40, "ch": "Ch3: Capitalization Rates", "q": "When using the net income ratio method, the overall capitalization rate is developed by dividing the net income ratio by:", "o": ["The safe rate", "The potential gross income", "The effective gross income multiplier", "The loan-to-value ratio"], "a": "C", "e": "RO = Net Income Ratio (NIR) / Effective Gross Income Multiplier (EGIM). NIR = NOI/EGI, so RO = (NOI/EGI) / EGIM = NOI / (EGI x EGIM) = NOI / Sale Price.", "p": "102 p.137"}, {"n": 41, "ch": "Ch3: Capitalization Rates", "q": "The three components of an overall capitalization rate are:", "o": ["Safe rate, risk premium, and recapture rate", "PGI rate, EGI rate, and NOI rate", "Land rate, building rate, and equity rate", "Discount (yield) rate, recapture rate, and effective tax rate"], "a": "D", "e": "RO = Discount Rate (YO) + Recapture Rate + Effective Tax Rate (ETR). Each component serves a specific purpose: return on investment, return of investment, and property tax provision.", "p": "102 p.138"}, {"n": 42, "ch": "Ch3: Capitalization Rates", "q": "The land capitalization rate reflects the relationship between:", "o": ["Building income and building value", "Total NOI and total property value", "Land income and land value", "Potential gross income and land value"], "a": "C", "e": "The land capitalization rate (RL) is the rate applied to land income to derive land value. Since land is not a wasting asset, RL = Yield Rate + ETR (no recapture component).", "p": "102 p.140"}, {"n": 43, "ch": "Ch3: Capitalization Rates", "q": "The weighted average of the land capitalization rate and the building capitalization rate is known as the:", "o": ["Mortgage capitalization rate (RM)", "Equity capitalization rate (RE)", "Overall capitalization rate (RO)", "Recapture rate"], "a": "C", "e": "RO = (Land Value % x RL) + (Building Value % x RB). The overall rate is a weighted average of the land and building rates, weighted by their proportions of total value.", "p": "102 p.140"}, {"n": 44, "ch": "Ch3: Capitalization Rates", "q": "The assessment level is 30% of appraised value and the current tax rate is .50 per hundred. The effective tax rate (ETR) as a decimal is:", "o": ["0.0850", "0.2833", "0.3000", "0.0255"], "a": "D", "e": "ETR = Assessment Level x Tax Rate = 0.30 x 0.0850 = 0.0255 (or 2.55%). The tax rate of .50 per 00 = 0.0850 as a decimal.", "p": "102 p.136"}, {"n": 45, "ch": "Ch3: Capitalization Rates", "q": "The effective gross income multiplier (EGIM) method of developing RO is appropriate when:", "o": ["The debt coverage ratio is known", "The land-to-building ratio is known", "The effective gross income multiplier is known", "The summation rate components are known"], "a": "C", "e": "The EGIM method: RO = NIR / EGIM. It is applicable when the EGIM is known from comparable sales and the net income ratio can be developed from market data.", "p": "102 p.139"}, {"n": 46, "ch": "Ch4: Contemporary Capitalization Methods", "q": "Direct capitalization is defined as:", "o": ["A method of converting future net benefits into present value by discounting each year individually", "A method requiring separate analysis of land and building income", "A method of converting future income over a holding period into present value", "A method of converting an estimate of a single years income into value in one direct step"], "a": "D", "e": "Direct capitalization converts a single stabilized year income estimate into a value indication in one step - by dividing by the overall rate or multiplying by an income multiplier.", "p": "102 p.181"}, {"n": 47, "ch": "Ch4: Contemporary Capitalization Methods", "q": "Yield capitalization (discounting) is defined as:", "o": ["A method of converting a single years NOI into value by dividing by the cap rate", "A method of estimating value based on the cost approach", "A method of converting future net benefits into present value by discounting each future benefit at a proper yield rate", "A method of applying the gross income multiplier to effective gross income"], "a": "C", "e": "Yield capitalization (DCF analysis) explicitly discounts each future cash flow at the required yield rate. Unlike direct capitalization, it considers year-by-year income changes and the reversion.", "p": "102 p.181"}, {"n": 48, "ch": "Ch4: Contemporary Capitalization Methods", "q": "Direct capitalization differs from yield capitalization in that direct capitalization:", "o": ["Requires more data and assumptions", "Considers each years cash flow individually", "Always produces a higher value estimate", "Does not directly consider individual cash flows beyond the first year"], "a": "D", "e": "Direct capitalization uses only a single stabilized income year. Yield capitalization explicitly models each years cash flow, income changes, and the reversion at the end of the holding period.", "p": "102 p.182"}, {"n": 49, "ch": "Ch4: Contemporary Capitalization Methods", "q": "The two generic formulas used in direct capitalization are:", "o": ["NOI / Rate and NOI x Factor", "PGI / Rate and EGI x Factor", "EGI / Rate and NOI / Rate", "NOI / Value and Value / Income"], "a": "A", "e": "The two formulas: (1) Value = Income / Rate (IRV), and (2) Value = Income x Factor (VIF). The factor is the reciprocal of the rate: Factor = 1 / Rate.", "p": "102 p.183"}, {"n": 50, "ch": "Ch4: Contemporary Capitalization Methods", "q": "The formula for developing a gross income multiplier (GIM) is:", "o": ["NOI / Operating Expenses", "Effective Gross Income / Sale Price", "Sale Price / Income", "Cap Rate x Sale Price"], "a": "C", "e": "GIM = Sale Price / Income (either PGI or EGI). The EGIM = Sale Price / EGI. It is the inverse of the cap rate relationship but applied to gross income before expenses.", "p": "102 p.185"}, {"n": 51, "ch": "Ch4: Contemporary Capitalization Methods", "q": "When property is appraised for ad valorem tax purposes, what must be included as part of the overall capitalization rate?", "o": ["The mortgage constant", "The equity dividend rate", "The effective tax rate (ETR)", "The safe rate"], "a": "C", "e": "For ad valorem appraisal, actual taxes are unknown as of the assessment date, so real estate taxes are excluded from operating expenses and instead the ETR is loaded into the capitalization rate.", "p": "102 p.186"}, {"n": 52, "ch": "Ch4: Contemporary Capitalization Methods", "q": "For direct capitalization of improved properties, which of the following is a required comparability criterion?", "o": ["Same ownership history", "Same assessor jurisdiction", "Same property manager", "Similar amenities, expense ratios, remaining economic life, and land-to-building ratios"], "a": "D", "e": "Four required comparability criteria for improved property cap rate derivation: (1) amenities/location, (2) expense ratios, (3) remaining economic life, and (4) land-to-improvement value ratios.", "p": "102 p.188"}, {"n": 53, "ch": "Ch4: Contemporary Capitalization Methods", "q": "A property recently sold for ,000,000. Potential gross income = 70,000; vacancy loss = 0,000. The effective gross income multiplier (EGIM) is:", "o": ["7.41", "8.00", "8.33", "10.00"], "a": "B", "e": "EGI = PGI - Vacancy = 70,000 - 0,000 = 50,000. EGIM = Sale Price / EGI = ,000,000 / 50,000 = 8.0.", "p": "102 p.195"}, {"n": 54, "ch": "Ch4: Contemporary Capitalization Methods", "q": "A comparable sale has NOI of 50,000 (taxes included as expense) and sold for ,500,000. The subject NOI is 32,000 (taxes excluded). ETR = 1%. Subject value is:", "o": [",320,000", ",500,000", ",200,000", ",100,000"], "a": "C", "e": "Unloaded cap rate = 50,000 / ,500,000 = 10%. Loaded cap rate = 10% + 1% ETR = 11%. Subject value = 32,000 / 0.11 = ,200,000.", "p": "102 p.190"}, {"n": 55, "ch": "Ch4: Contemporary Capitalization Methods", "q": "The partial payment factor (installment to amortize ) shows:", "o": ["The present worth of a single future payment", "The present worth of a series of future payments", "The future value of a current investment", "The periodic payment necessary to amortize a loan at a specified rate over a specific number of periods"], "a": "D", "e": "The partial payment factor (also called the installment to amortize  or the mortgage constant) shows the periodic payment per dollar of loan needed to fully amortize the debt.", "p": "102 p.182"}, {"n": 56, "ch": "Ch4: Contemporary Capitalization Methods", "q": "The present worth of a series of future payments is shown by which compound interest table factor?", "o": ["Partial payment factor (installment to amortize )", "Present worth of  (reversion factor)", "Sinking fund factor", "Present worth of  per period (Inwood coefficient)"], "a": "D", "e": "The present worth of  per period (Inwood coefficient) is used to find the present value of an annuity - a series of equal future payments discounted at a specified yield rate.", "p": "102 p.182"}, {"n": 57, "ch": "Ch4: Contemporary Capitalization Methods", "q": "The present worth of a single future payment of  is shown by which factor?", "o": ["Partial payment factor", "Present worth of  per period (Inwood coefficient)", "Sinking fund factor", "Present worth of  (reversion factor)"], "a": "D", "e": "The present worth of  (reversion factor) discounts a single future lump sum to its present value. Used to value the reversion (sale proceeds) at the end of a holding period.", "p": "102 p.182"}, {"n": 58, "ch": "Ch5: Straight-Line Capitalization", "q": "Straight-line capitalization assumes which type of income stream during the remaining economic life of the improvements?", "o": ["Level (flat) income stream", "Increasing income stream", "Declining income stream", "Variable income stream based on CPI"], "a": "C", "e": "Straight-line capitalization assumes a declining income stream - as the building ages, income is expected to decrease. This is why it uses a declining balance for the discount calculation.", "p": "102 p.223"}, {"n": 59, "ch": "Ch5: Straight-Line Capitalization", "q": "In straight-line capitalization, recapture is received in:", "o": ["Increasing amounts weighted to later years", "Decreasing amounts weighted to early years", "A single lump sum at the end of economic life", "Equal amounts during the economic life of the improvement"], "a": "D", "e": "Straight-line capitalization: recapture is received in equal annual installments over the remaining economic life. The recapture rate = 1 / Remaining Economic Life.", "p": "102 p.223"}, {"n": 60, "ch": "Ch5: Straight-Line Capitalization", "q": "Straight-line capitalization is best utilized when:", "o": ["The property has a long remaining economic life and strong tenants", "The income is expected to increase over time", "The property is new construction with 50+ years of economic life", "Income is likely to decline, recapture is in equal amounts, and the tenant is financially average to poor"], "a": "D", "e": "Straight-line is appropriate for: (1) declining income, (2) equal recapture installments, (3) financially average-to-poor tenants with short-term or month-to-month leases.", "p": "102 p.223"}, {"n": 61, "ch": "Ch5: Straight-Line Capitalization", "q": "The land capitalization rate (RL) is composed of which two components?", "o": ["Overall yield rate and recapture rate", "Recapture rate and effective tax rate", "Overall yield rate (YO) and effective tax rate (ETR)", "Safe rate and risk premium"], "a": "C", "e": "RL = Yield Rate (YO) + Effective Tax Rate (ETR). Land is not a wasting asset so it does NOT include a recapture component.", "p": "102 p.224"}, {"n": 62, "ch": "Ch5: Straight-Line Capitalization", "q": "The building capitalization rate (RB) is composed of which three components?", "o": ["Safe rate, risk premium, and recapture rate", "Land rate, equity rate, and mortgage rate", "PGI, EGI, and NOI rates", "Overall yield rate (YO), effective tax rate (ETR), and recapture rate"], "a": "D", "e": "RB = YO + ETR + Recapture Rate. Buildings depreciate, so the building rate includes a recapture component that the land rate does not.", "p": "102 p.224"}, {"n": 63, "ch": "Ch5: Straight-Line Capitalization", "q": "What is the key difference between the land capitalization rate and the building capitalization rate?", "o": ["Land rate uses the mortgage constant; building rate uses the equity rate", "Land rate is always higher than the building rate", "Land rate does not include a recapture component because land is not a wasting asset", "Building rate uses the safe rate; land rate uses the overall yield rate"], "a": "C", "e": "The only difference: RB includes a recapture rate while RL does not. Land does not physically depreciate so no recapture is needed. Both share the same YO and ETR components.", "p": "102 p.224"}, {"n": 64, "ch": "Ch5: Straight-Line Capitalization", "q": "The recapture rate in straight-line capitalization is calculated as:", "o": ["1 / (Yield Rate x Remaining Economic Life)", "Remaining Economic Life / 100", "Yield Rate + Effective Tax Rate", "1 / Remaining Economic Life"], "a": "D", "e": "Recapture Rate = 1 / Remaining Economic Life. For example, a building with 25 years remaining economic life has a recapture rate of 1/25 = 0.04 (4%).", "p": "102 p.225"}, {"n": 65, "ch": "Ch5: Straight-Line Capitalization", "q": "The building residual technique should be used when:", "o": ["Land value is unknown but building value is well-supported", "Building value is unknown but land value is well-supported", "Both land and building values are unknown", "Neither land nor building value can be estimated"], "a": "B", "e": "Building residual: used when land value IS known (well-supported by vacant land sales) but building value needs to be estimated. Land income is calculated first, then building income is the residual.", "p": "102 p.228"}, {"n": 66, "ch": "Ch5: Straight-Line Capitalization", "q": "The land residual technique should be used when:", "o": ["Land value is known but building value is not", "Land value is unknown but building value is known and well-supported", "Both land and building values are unknown", "Land value exceeds building value"], "a": "B", "e": "Land residual: used when building value IS known (well-supported by cost or sales data) but land value needs to be estimated. Building income is calculated first, then land income is the residual.", "p": "102 p.235"}, {"n": 67, "ch": "Ch5: Straight-Line Capitalization", "q": "In the building residual technique, to obtain land income you:", "o": ["Divide land value by the building capitalization rate", "Multiply the total NOI by the land value ratio", "Multiply land value by the land capitalization rate", "Divide the building income by the building capitalization rate"], "a": "C", "e": "Land Income = Land Value x Land Capitalization Rate (RL). The land income is then subtracted from total NOI to get the residual building income.", "p": "102 p.228"}, {"n": 68, "ch": "Ch5: Straight-Line Capitalization", "q": "The land capitalization rate (RL) in straight-line capitalization if land is 9% and there is no ETR, and remaining economic life of improvement is 25 years, the building capitalization rate (RB) is:", "o": ["9%", "13%", "9.04%", "4%"], "a": "B", "e": "RB = YO + ETR + Recapture Rate = 9% + 0% + (1/25) = 9% + 4% = 13%. The recapture rate adds 4% to the land rate.", "p": "102 p.229"}, {"n": 69, "ch": "Ch5: Straight-Line Capitalization", "q": "Overall yield rate (YO) is another name for a property discount rate. In the income approach, it is used to:", "o": ["Calculate the mortgage constant", "Determine the recapture rate from remaining economic life", "Estimate the effective tax rate", "Convert future income streams to present value in yield capitalization"], "a": "D", "e": "YO (overall yield rate / discount rate) converts future income and reversion to present value in yield capitalization (DCF analysis). In straight-line, it is a component of both RL and RB.", "p": "102 p.228"}, {"n": 70, "ch": "Applied Calculations", "q": "A 10-unit apartment receives market rents of ,500/unit/month. Vacancy = 6%. Annual operating expenses = 3,721. What is the Potential Gross Income (PGI)?", "o": ["53,000", "62,000", "75,000", "80,000"], "a": "D", "e": "PGI = 10 units x ,500/month x 12 months = 80,000.", "p": "102 p.380"}, {"n": 71, "ch": "Applied Calculations", "q": "Using the previous data (PGI = 80,000; vacancy = 6%), what is the Effective Gross Income (EGI)?", "o": ["53,000", "69,200", "80,000", "62,000"], "a": "B", "e": "EGI = PGI x (1 - vacancy rate) = 80,000 x (1 - 0.06) = 80,000 x 0.94 = 69,200.", "p": "102 p.380"}, {"n": 72, "ch": "Applied Calculations", "q": "Using the previous data (EGI = 69,200; operating expenses = 3,721), what is the Net Operating Income (NOI)?", "o": ["15,479", "26,279", "69,200", "3,721"], "a": "A", "e": "NOI = EGI - Operating Expenses = 69,200 - 3,721 = 15,479.", "p": "102 p.380"}, {"n": 73, "ch": "Applied Calculations", "q": "Using the previous data (EGI = 69,200; operating expenses = 3,721), what is the Operating Expense Ratio (OER)?", "o": ["29.8%", "31.8%", "35.0%", "17.0%"], "a": "B", "e": "OER = Operating Expenses / EGI = 3,721 / 69,200 = 0.3175 or approximately 31.8%.", "p": "102 p.380"}, {"n": 74, "ch": "Applied Calculations", "q": "The previous 10-unit apartment sold for ,100,000 with NOI of 15,479. What is the overall capitalization rate (RO)?", "o": ["8.5%", "10.5%", "12.0%", "9.5%"], "a": "B", "e": "RO = NOI / Sale Price = 15,479 / ,100,000 = 0.1050 or 10.5%.", "p": "102 p.380"}, {"n": 75, "ch": "Applied Calculations", "q": "The previous 10-unit apartment (EGI = 69,200; Sale Price = ,100,000). What is the Effective Gross Income Multiplier (EGIM)?", "o": ["5.5", "6.5", "7.0", "6.0"], "a": "B", "e": "EGIM = Sale Price / EGI = ,100,000 / 69,200 = 6.50 (rounded).", "p": "102 p.380"}, {"n": 76, "ch": "Applied Calculations", "q": "Using the previous data (OER = 31.8%; EGIM = 6.50), what is the overall capitalization rate using the NIR method?", "o": ["9.5%", "10.5%", "8.0%", "12.0%"], "a": "B", "e": "NIR = 1 - OER = 1 - 0.318 = 0.682. RO = NIR / EGIM = 0.682 / 6.50 = 0.1049 or approximately 10.5%.", "p": "102 p.380"}, {"n": 77, "ch": "Applied Calculations", "q": "NOI = 00,000; Annual debt service = 11,740; Loan-to-value ratio = 75%; Annual mortgage requirement = 11.19%. What is the Debt Coverage Ratio (DCR)?", "o": ["1.2000", "1.5000", "1.1000", "1.3679"], "a": "D", "e": "DCR = NOI / Annual Debt Service = 00,000 / 11,740 = 1.3679.", "p": "102 p.133"}, {"n": 78, "ch": "Applied Calculations", "q": "Using the DCR method with DCR = 1.3679, M = 0.75, RM = 0.1119, what is the overall capitalization rate (RO)?", "o": ["11.48%", "8.39%", "15.00%", "9.50%"], "a": "A", "e": "RO = DCR x M x RM = 1.3679 x 0.75 x 0.1119 = 0.1148 or 11.48%.", "p": "102 p.133"}, {"n": 79, "ch": "Applied Calculations", "q": "In a building residual problem: Land value = 00,000; RL = 10%; Total NOI = 0,000; Remaining economic life = 20 years; YO = 10%; ETR = 0%. Building capitalization rate (RB) is:", "o": ["10%", "15%", "5%", "20%"], "a": "B", "e": "RB = YO + ETR + Recapture Rate = 10% + 0% + (1/20) = 10% + 5% = 15%.", "p": "102 p.230"}, {"n": 80, "ch": "Applied Calculations", "q": "Using the previous building residual data: Land Income = Land Value x RL = 00,000 x 10% = 0,000. Building Income = Total NOI - Land Income = 0,000 - 0,000 = 0,000. Building Value = Building Income / RB = 0,000 / 15%. Building value is:", "o": ["00,000", "00,000", "66,667", "00,000"], "a": "C", "e": "Building Value = Building Income / RB = 0,000 / 0.15 = 66,667.", "p": "102 p.230"}, {"n": 81, "ch": "Applied Calculations", "q": "Using the previous building residual data, total property value (Land + Building) is:", "o": ["00,000", "00,000", "66,667", "00,000"], "a": "C", "e": "Total Value = Land Value + Building Value = 00,000 + 66,667 = 66,667.", "p": "102 p.230"}, {"n": 82, "ch": "Applied Calculations", "q": "A comparable apartment sold for ,760,000 with NOI of 30,000 (taxes included as expense). A comparable with similar land ratio and OER to the subject has an unloaded cap rate of approximately 7.0%. Subject ETR = 2%. NOI excluding taxes = 05,000. Subject value is:", "o": [",500,000", ",500,000", ",050,000", ",785,714"], "a": "D", "e": "Loaded RO = Unloaded RO + ETR = 7.0% + 2.0% = 9.0%. Value = NOI (ex-taxes) / Loaded RO = 05,000 / 0.09 = ,500,000. Note: Closest answer per source is ,500,000 (answer A actually - verify with source).", "p": "102 p.190"}]}, "201": {"title": "Appraisal of Land", "questions": [{"n": 1, "ch": "Ch1: Land Value Concepts", "q": "The surface of the earth and everything above it and beneath it is:", "o": ["Real estate", "A parcel", "Real property", "Land"], "a": "D", "e": "Land in its broadest sense encompasses the surface of the earth, everything above it (air rights), and everything beneath it (subsurface rights including minerals, water, and oil).", "p": "201 p.52"}, {"n": 2, "ch": "Ch1: Land Value Concepts", "q": "Land that is in its natural state before anything is done to it is referred to as:", "o": ["Raw land", "Site improvements", "On-site improvements", "Off-site improvements"], "a": "A", "e": "Raw land is the natural state of the land before any improvements - no grading, utilities, or structures. It differs from a site, which is prepared and ready to build.", "p": "201 p.52"}, {"n": 3, "ch": "Ch1: Land Value Concepts", "q": "Everything done to the land that increases its usefulness WITHOUT placing a structure or building is considered:", "o": ["On-site improvements", "Off-site improvements", "Raw land enhancements", "Site improvements"], "a": "D", "e": "Site improvements include grading, drainage, landscaping, utilities, and other work that prepares land for development without being a structure.", "p": "201 p.52"}, {"n": 4, "ch": "Ch1: Land Value Concepts", "q": "A parcel of land that has been developed to the extent it is ready to be built upon for its intended use is called a:", "o": ["Raw land tract", "Land residual", "Site", "Platted lot"], "a": "C", "e": "A site is land that has been improved to the point it is ready for its intended use - utilities stubbed in, graded, legally described, and ready to build.", "p": "201 p.52"}, {"n": 5, "ch": "Ch1: Land Value Concepts", "q": "The governmental restriction that allows property to be taken for public use with just compensation is:", "o": ["Police power", "Escheat", "Taxation", "Eminent domain"], "a": "D", "e": "Eminent domain (also called condemnation) allows the government to take private property for public use, provided just compensation is paid to the owner.", "p": "201 p.53"}, {"n": 6, "ch": "Ch1: Land Value Concepts", "q": "Easements and rights-of-way are examples of:", "o": ["Government powers", "Bundle of rights", "Private encumbrances on ownership rights", "Fee simple limitations"], "a": "C", "e": "Easements and rights-of-way are private encumbrances - they restrict the owner use of land without being one of the four government powers (taxation, eminent domain, police power, escheat).", "p": "201 p.53"}, {"n": 7, "ch": "Ch1: Land Value Concepts", "q": "The four agents of production in land valuation are:", "o": ["Location, zoning, utilities, and access", "Physical, economic, governmental, and social", "Supply, demand, equilibrium, and surplus", "Land, labor, capital, and management"], "a": "D", "e": "The four agents of production: Land, Labor, Capital, and Management. The principle of balance/surplus productivity states that the return to each agent should be in equilibrium for maximum productivity.", "p": "201 p.53"}, {"n": 8, "ch": "Ch1: Land Value Concepts", "q": "Value is the present worth of future benefits according to the principle of:", "o": ["Increasing and decreasing returns", "Conformity", "Surplus productivity", "Anticipation"], "a": "D", "e": "Anticipation: value reflects the present worth of future benefits. This is the fundamental basis of the income approach and explains why expectations about future use drive current land value.", "p": "201 p.52"}, {"n": 9, "ch": "Ch1: Land Value Concepts", "q": "Maximum value is reached when land, labor, capital, and management attain a state of equilibrium according to the principle of:", "o": ["Progression and regression", "Contribution", "Supply and demand", "Balance"], "a": "D", "e": "Balance (or equilibrium): maximum value is achieved when all four agents of production (land, labor, capital, management) are in proper proportion - a state of equilibrium.", "p": "201 p.52"}, {"n": 10, "ch": "Ch1: Land Value Concepts", "q": "When the physical, environmental, economic, governmental, and social forces are affecting supply, which appraisal principle is in operation?", "o": ["Competition", "Consistent use", "Substitution", "Change"], "a": "D", "e": "Change: the four PEGS forces constantly affect supply and demand in the marketplace. Market value is never static because these forces are always in motion.", "p": "201 p.52"}, {"n": 11, "ch": "Ch1: Land Value Concepts", "q": "Entrepreneurial expectations have an effect on which marketplace factor?", "o": ["Demand only", "Neither supply nor demand", "Both supply and demand", "Supply only"], "a": "D", "e": "Entrepreneurial expectations are a supply-side factor - they influence developers and producers decisions about whether and how much to build or develop.", "p": "201 p.53"}, {"n": 12, "ch": "Ch1: Land Value Concepts", "q": "Which of the following are land demand variables?", "o": ["The quantity of land available", "Development, financing, and construction costs", "Number of sellers in the market", "Income levels and wage rates"], "a": "D", "e": "Demand is influenced by: income levels, wage rates, population, consumer tastes/preferences, and consumer expectations. Quantity of land available and construction costs are supply-side factors.", "p": "201 p.54"}, {"n": 13, "ch": "Ch1: Land Value Concepts", "q": "The general land valuation model formula is:", "o": ["LV = PGI divided by R", "LV = GI divided by R", "LV = (C - PGI) divided by R", "LV = (PGI - C) divided by R"], "a": "D", "e": "LV = (PGI - C) / R, where PGI = projected gross income from the land, C = costs of development, and R = discount/cap rate. This is the land residual/development model.", "p": "201 p.54"}, {"n": 14, "ch": "Ch1: Land Value Concepts", "q": "The difference between mass appraisal and single-property appraisal is primarily in:", "o": ["The three approaches to value used", "The definition of market value applied", "Scope and statistical testing", "The legal basis for the assessment"], "a": "C", "e": "Mass appraisal differs from single-property appraisal primarily in scope (many properties at once) and the use of statistical testing to verify accuracy and uniformity.", "p": "201 p.50"}, {"n": 15, "ch": "Ch2: Land Description & Maps", "q": "Maps are necessary to ________, ________, and ________ all land parcels in a jurisdiction:", "o": ["Tax, transfer, and record", "Zone, permit, and improve", "Value, sell, and transfer", "Locate, identify, and inventory"], "a": "D", "e": "The three core functions of assessment maps: locate, identify, and inventory all land parcels. Without complete maps, the assessor cannot discover all taxable property.", "p": "201 p.87"}, {"n": 16, "ch": "Ch2: Land Description & Maps", "q": "Assessment maps are referred to as:", "o": ["Topographic maps", "Aerial maps", "Highway maps", "Cadastral maps"], "a": "D", "e": "Cadastral maps show the boundaries and ownership of land. The word comes from the Greek word for register and refers to the official record of real property boundaries.", "p": "201 p.87"}, {"n": 17, "ch": "Ch2: Land Description & Maps", "q": "The appropriate map scale for suburban areas and small towns is:", "o": ["1 inch = 50 feet", "1 inch = 400 feet", "1 inch = 100 feet", "1 inch = 200 feet"], "a": "D", "e": "Suburban and small town: 1 inch = 200 feet. Urban: 1 inch = 50-100 feet. Rural: 1 inch = 400 feet or smaller.", "p": "201 p.87"}, {"n": 18, "ch": "Ch2: Land Description & Maps", "q": "The three land description systems are:", "o": ["Front foot, square foot, and acre", "Metes and bounds, rectangular survey, and platted subdivision", "Urban, suburban, and rural", "State plane, UTM, and GIS"], "a": "B", "e": "The three legal land description systems are: (1) Metes and bounds, (2) Rectangular (Public Land) Survey System, and (3) Platted subdivision (lot and block).", "p": "201 p.88"}, {"n": 19, "ch": "Ch2: Land Description & Maps", "q": "The land description system that uses a compass and measurements to describe each property line is:", "o": ["Rectangular survey system", "State plane coordinate system", "Platted subdivision system", "Metes and bounds"], "a": "D", "e": "Metes and bounds: begins at a known reference point (POB), describes each boundary by compass bearing and distance, and returns to the point of beginning.", "p": "201 p.88"}, {"n": 20, "ch": "Ch2: Land Description & Maps", "q": "A township in the rectangular survey system is __ miles squared and contains __ sections, each containing __ acres:", "o": ["4 miles - 24 sections - 320 acres", "36 miles - 6 sections - 640 acres", "12 miles - 144 sections - 40 acres", "6 miles - 36 sections - 640 acres"], "a": "D", "e": "A township = 6 x 6 miles = 36 sections. Each section = 1 square mile = 640 acres. This is a fundamental measurement of the PLSS.", "p": "201 p.88"}, {"n": 21, "ch": "Ch2: Land Description & Maps", "q": "In the rectangular survey system, the S half of the NE quarter of the NE quarter contains how many acres?", "o": ["160 acres", "80 acres", "40 acres", "20 acres"], "a": "D", "e": "NE quarter = 640/4 = 160 acres. NE quarter of NE quarter = 160/4 = 40 acres. S half of that = 40/2 = 20 acres.", "p": "201 p.88"}, {"n": 22, "ch": "Ch2: Land Description & Maps", "q": "Meridians in the PLSS run in which direction?", "o": ["East and west", "Northeast and southwest", "North and south", "Northwest and southeast"], "a": "C", "e": "Principal meridians run north-south. Base lines run east-west. Together they form the foundation of the rectangular survey grid from which townships are measured.", "p": "201 p.88"}, {"n": 23, "ch": "Ch2: Land Description & Maps", "q": "Quarter-quarter sections that do not have the standard 40 acres due to surveying irregularities are called:", "o": ["Fractional sections", "Non-standard tracts", "Remainder parcels", "Government lots"], "a": "D", "e": "Government lots are irregular PLSS subdivisions that do not conform to standard quarter-quarter sections (40 acres) due to survey corrections, water bodies, or boundaries.", "p": "201 p.88"}, {"n": 24, "ch": "Ch3: Highest & Best Use", "q": "Which of the following is NOT included in the definition of highest and best use?", "o": ["Reasonable probable use", "Financially feasible", "Uses based on assessor judgment", "Legally permissible"], "a": "C", "e": "H&BU is market-driven and must meet four objective tests. The assessor cannot impose personal judgment on what the use should be - it must reflect what the market would support.", "p": "201 p.116"}, {"n": 25, "ch": "Ch3: Highest & Best Use", "q": "Highest and best use analysis is an ________ analysis to determine the most ________ and ________ use:", "o": ["Physical; durable; safe", "Statistical; common; typical", "Legal; permitted; zoned", "Economic; profitable; competitive"], "a": "D", "e": "H&BU is an economic analysis to determine which market provides the most profitable, competitive use - not a legal or physical analysis.", "p": "201 p.116"}, {"n": 26, "ch": "Ch3: Highest & Best Use", "q": "The four tests for highest and best use in correct sequence are:", "o": ["Financially feasible, maximally productive, legally permissible, physically possible", "Physically possible, legally permissible, maximally productive, financially feasible", "Maximally productive, financially feasible, physically possible, legally permissible", "Legally permissible, physically possible, financially feasible, maximally productive"], "a": "D", "e": "Sequence: (1) Legally permissible, (2) Physically possible, (3) Financially feasible, (4) Maximally productive. Each test filters out uses that fail before moving to the next.", "p": "201 p.116"}, {"n": 27, "ch": "Ch3: Highest & Best Use", "q": "A developer combines two adjacent 50-ft frontage parcels valued at 5,000 each. Your appraisal shows the combined 100-ft parcel is now worth 50,000. What has occurred?", "o": ["Assemblage", "Plottage", "Surplus land creation", "Rezoning"], "a": "A", "e": "Assemblage is the process of combining adjacent parcels. When assemblage creates additional value above the sum of the parts, that increment is called plottage value.", "p": "201 p.117"}, {"n": 28, "ch": "Ch3: Highest & Best Use", "q": "A developer buys two adjacent parcels valued at 5,000 each and combines them. The combined parcel is now worth 00,000. The 0,000 additional value above the sum of the parts represents:", "o": ["Assemblage", "Surplus land", "Excess land", "Plottage"], "a": "D", "e": "Plottage is the increment of value created when two or more parcels are combined (assembled) into a single parcel of greater utility. Assemblage is the process; plottage is the resulting value increment.", "p": "201 p.117"}, {"n": 29, "ch": "Ch3: Highest & Best Use", "q": "Land that remains after improvements that can either be developed later or separated off for another use is called:", "o": ["Excess land", "Government lot", "Plottage land", "Surplus land"], "a": "A", "e": "Excess land is land beyond what is needed to support the existing or highest and best use improvement. It can typically be separated and sold independently. Surplus land cannot be separated and sold.", "p": "201 p.117"}, {"n": 30, "ch": "Ch3: Highest & Best Use", "q": "Land that cannot be sold off or functionally used because of the limitations of its size or physical characteristics is:", "o": ["Excess land", "Assemblage land", "Plottage land", "Surplus land"], "a": "D", "e": "Surplus land is the portion of a site that cannot be separated and used independently - too small or oddly shaped to stand alone. It has no independent market value.", "p": "201 p.117"}, {"n": 31, "ch": "Ch3: Highest & Best Use", "q": "The temporary use of a site or improved property until it becomes financially feasible to convert it to a higher use value is:", "o": ["Legally non-conforming use", "Multiple use", "Special purpose use", "Interim use"], "a": "D", "e": "Interim use is a temporary use that is the highest and best use now, but the land is expected to transition to a higher use in the foreseeable future.", "p": "201 p.118"}, {"n": 32, "ch": "Ch3: Highest & Best Use", "q": "The concept that an improved parcel must be valued based on the H&BU of the property as a whole, not just the improvement, is:", "o": ["Contribution", "Interim use", "Conforming use", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must be valued under the same use assumption. You cannot value the land as commercial while valuing the building as residential.", "p": "201 p.118"}, {"n": 33, "ch": "Ch3: Highest & Best Use", "q": "A site can be developed for a strip center (construction cost 50,000; NOI = 41,500) or an office building (construction cost ,100,000; NOI = 65,000). Land cap rate = 9%; building cap rate = 13%. Which is the highest and best use?", "o": ["Office building because it has higher NOI", "Cannot be determined without more data", "Strip center because it costs less to build", "Office building because it produces greater land residual value"], "a": "D", "e": "Building residual: Strip center land residual = 41,500 - (50,000 x 13%) = 41,500 - 23,500 = 8,000. Office land residual = 65,000 - (,100,000 x 13%) = 65,000 - 43,000 = 2,000. Office has higher land residual.", "p": "201 p.119"}, {"n": 34, "ch": "Ch3: Highest & Best Use", "q": "In analyzing the H&BU of an already-improved property it is analyzed:", "o": ["As it currently exists only", "Based upon ideal improvements only", "Neither as vacant nor as improved", "Both as if vacant and as currently improved"], "a": "D", "e": "For improved properties, H&BU is analyzed both: (1) as if the land were vacant (to determine optimal development), and (2) as currently improved (to test whether the existing use should continue).", "p": "201 p.119"}, {"n": 35, "ch": "Ch3: Highest & Best Use", "q": "The fundamental basis of land value is:", "o": ["The cost of site improvements", "The capitalized net income", "Highest and best use", "The assessed value assigned by the assessor"], "a": "C", "e": "Highest and best use is the fundamental basis of land value - land value is determined by its most productive legal use, not its current use or the assessor preference.", "p": "201 p.119"}, {"n": 36, "ch": "Ch3: Highest & Best Use", "q": "The major principle that should NOT be violated in appraising properties in transitional neighborhoods is the concept of:", "o": ["Contribution", "Conformity", "Progression", "Consistent use"], "a": "D", "e": "Consistent use: in transitional neighborhoods, the land may be transitioning to a new use. The principle prohibits valuing land at its future use while simultaneously valuing the existing improvements at their current use.", "p": "201 p.118"}, {"n": 37, "ch": "Ch4: Single Property Land Valuation", "q": "Which of the following is an alternative method of land valuation that uses elements of the cost approach in the analysis of an improved property?", "o": ["Allocation", "Capitalization of ground rent", "Cost of development", "Abstraction"], "a": "D", "e": "Abstraction (extraction) uses the cost approach: Land Value = Sale Price minus (RCN minus Depreciation). It extracts land value from improved sales when no vacant land sales exist.", "p": "201 p.167"}, {"n": 38, "ch": "Ch4: Single Property Land Valuation", "q": "In the sales comparison approach to value, you make adjustments to the ________ parcel to match the ________ parcel:", "o": ["Subject; comparable", "Larger; smaller", "Older; newer", "Comparable; subject"], "a": "D", "e": "Adjustments are always made TO the comparable - never to the subject. The subject is the benchmark; comparables are adjusted up or down to match the subject characteristics.", "p": "201 p.167"}, {"n": 39, "ch": "Ch4: Single Property Land Valuation", "q": "The personal interview approach to verifying sales information is the ________ way to obtain accurate information, but also the ________ way in terms of staff time:", "o": ["Fastest; cheapest", "Least accurate; most expensive", "Most accurate; most expensive", "Most systematic; most efficient"], "a": "C", "e": "Personal interviews yield the most reliable verification of sale conditions, financing, and motivations - but they consume the most professional staff time of all verification methods.", "p": "201 p.167"}, {"n": 40, "ch": "Ch4: Single Property Land Valuation", "q": "Stratification is sorting data on the sold parcels into groups containing:", "o": ["The highest sale prices", "The most recent sales", "The largest parcels", "Similar characteristics"], "a": "D", "e": "Stratification groups sales by similar characteristics - market area, zoning, land use, size range, etc. - to ensure valid comparisons within each group.", "p": "201 p.168"}, {"n": 41, "ch": "Ch4: Single Property Land Valuation", "q": "The correct order of adjustment categories in the sales comparison approach is:", "o": ["Physical characteristics, location, time of sale, conditions of sale, financing", "Location, time of sale, conditions of sale, financing, physical characteristics", "Time of sale, physical characteristics, location, conditions of sale, financing", "Financing, conditions of sale, time of sale, location, physical characteristics"], "a": "D", "e": "The correct sequence: (1) Financing terms, (2) Conditions of sale, (3) Time of sale/market conditions, (4) Location, (5) Physical characteristics.", "p": "201 p.168"}, {"n": 42, "ch": "Ch4: Single Property Land Valuation", "q": "Which adjustment technique is most often used in single property appraisal?", "o": ["Net percentage adjustment", "Cumulative percentage adjustment", "Statistical regression", "Lump-sum dollar adjustment"], "a": "D", "e": "Lump-sum dollar adjustments are most common in single property appraisal - each characteristic difference is expressed as a dollar amount added to or subtracted from the comparable sale price.", "p": "201 p.168"}, {"n": 43, "ch": "Ch4: Single Property Land Valuation", "q": "The formula S minus IV = LV is the formula for which land valuation method?", "o": ["Capitalization of ground rent", "Cost of development", "Allocation", "Abstraction"], "a": "D", "e": "Abstraction: Sale Price (S) minus Improvement Value (IV) = Land Value (LV). The depreciated improvement value is extracted from the sale price to isolate land value.", "p": "201 p.169"}, {"n": 44, "ch": "Ch4: Single Property Land Valuation", "q": "The cost of development method is most applicable to which type of land?", "o": ["Single-family residential lots in established neighborhoods", "Commercial pad sites in urban areas", "Agricultural land in rural markets", "Subdivided land ready for development"], "a": "D", "e": "The cost of development (anticipated use) method models what a developer would pay - projecting future lot/unit sales, deducting all development costs and profit, then discounting to present value. Best for land ready to subdivide.", "p": "201 p.169"}, {"n": 45, "ch": "Ch4: Single Property Land Valuation", "q": "Discounted cash flow (DCF) converts future net benefits into present value by:", "o": ["Multiplying each benefit by the cap rate", "Adding each future benefit to the current value", "Dividing net income by the overall rate", "Discounting each future benefit by an appropriate yield rate"], "a": "D", "e": "DCF discounts each future year cash flow back to present value using an appropriate yield (discount) rate. It is more rigorous than direct capitalization because it explicitly models year-by-year cash flows.", "p": "201 p.169"}, {"n": 46, "ch": "Ch4: Single Property Land Valuation", "q": "What unit of comparison is typically used for commercial retail properties?", "o": ["Square foot", "Acre", "Buildable units", "Front foot"], "a": "D", "e": "Front foot is the standard unit for commercial retail because retail value is heavily influenced by street frontage - pedestrian and vehicle visibility and access.", "p": "201 p.165"}, {"n": 47, "ch": "Ch4: Single Property Land Valuation", "q": "If residential lots in a subdivision tend to sell for approximately the same amount regardless of size, the most appropriate unit of comparison is:", "o": ["Square feet", "Front feet", "Per acre", "Site or lot"], "a": "D", "e": "When lot prices are uniform regardless of size (typical in fully developed residential subdivisions), the site/lot is the appropriate unit of comparison.", "p": "201 p.165"}, {"n": 48, "ch": "Ch4: Single Property Land Valuation", "q": "The land valuation method that converts rents or leases of land into value by capitalizing net income is the:", "o": ["Allocation method", "Abstraction method", "Cost of development method", "Capitalization of ground rent"], "a": "D", "e": "Capitalization of ground rent: Land Value = Annual Ground Rent / Land Capitalization Rate. Used when ground leases exist that establish a market rental rate for the land itself.", "p": "201 p.164"}, {"n": 49, "ch": "Ch5: Mass Appraisal of Land", "q": "Mass appraisal is based on a different set of principles than single property appraisal:", "o": ["True - mass appraisal uses different value definitions", "True - mass appraisal ignores highest and best use", "False - mass appraisal is based on the same principles as single property appraisal", "True - mass appraisal uses statistical sampling only"], "a": "C", "e": "False. Mass appraisal uses the same fundamental appraisal principles as single property appraisal. The difference is in scope and the use of statistical testing to verify accuracy and uniformity.", "p": "201 p.201"}, {"n": 50, "ch": "Ch5: Mass Appraisal of Land", "q": "The three main components of a mass appraisal system are:", "o": ["Cost approach, sales comparison, and income approach", "PGI, EGI, and NOI", "Data management, analysis and valuation, and administrative system", "Stratification, unit values, and adjustments"], "a": "C", "e": "The three components of a mass appraisal system: (1) Data management system (collection and maintenance), (2) Analysis and valuation system (models and methods), and (3) Administrative system (review and defense).", "p": "201 p.201"}, {"n": 51, "ch": "Ch5: Mass Appraisal of Land", "q": "Physical inspection of the property is the ________ way to collect physical characteristics data:", "o": ["Least accurate", "Most expensive", "Most time-consuming but also most accurate", "Fastest"], "a": "C", "e": "Physical inspection is the most accurate method of data collection - but it is also the most time-consuming and expensive for a mass appraisal program.", "p": "201 p.201"}, {"n": 52, "ch": "Ch5: Mass Appraisal of Land", "q": "Income and expense data are required for which types of properties in mass appraisal?", "o": ["All properties including residential", "Agricultural land only", "Commercial and industrial properties only", "Income-producing properties"], "a": "D", "e": "Income and expense data are required for income-producing properties (commercial, industrial, multi-family) to support the income approach. Single-family residential typically does not require income data.", "p": "201 p.201"}, {"n": 53, "ch": "Ch5: Mass Appraisal of Land", "q": "The ratio study computation is:", "o": ["Sale Price divided by Assessed Value", "Net Operating Income divided by Sale Price", "Assessed Value multiplied by Tax Rate", "Assessed Value divided by Sale Price"], "a": "D", "e": "A/S ratio = Assessed Value / Sale Price. Ratio studies measure assessment accuracy and uniformity by comparing assessed values to verified sale prices.", "p": "201 p.201"}, {"n": 54, "ch": "Ch5: Mass Appraisal of Land", "q": "The midpoint of a set of data listed in order of magnitude is the ________, while the average of all data is the ________:", "o": ["Mode; median", "Median; mean", "Mean; mode", "Range; standard deviation"], "a": "B", "e": "Median = the middle value when data is sorted. Mean = sum of all values divided by count. The median is preferred in ratio studies because it is less influenced by extreme outliers.", "p": "201 p.202"}, {"n": 55, "ch": "Ch5: Mass Appraisal of Land", "q": "The formula 100 x (AAD) divided by (median A/S) is the formula for:", "o": ["Coefficient of variation", "Standard deviation", "Price-related differential", "Coefficient of dispersion (COD)"], "a": "D", "e": "COD = 100 x (Average Absolute Deviation from Median) / Median. It measures uniformity of assessments - lower COD = more uniform. IAAO standard: residential COD under 15%.", "p": "201 p.202"}, {"n": 56, "ch": "Ch5: Mass Appraisal of Land", "q": "Which statistical measure measures the regression or progression of high and low value properties in the same assessment group?", "o": ["Coefficient of dispersion (COD)", "Standard deviation", "Coefficient of variation", "Price-related differential (PRD)"], "a": "D", "e": "PRD (Price-Related Differential) measures regressivity or progressivity: whether high-value properties are assessed at a systematically different ratio than low-value properties. PRD above 1.0 = regressive (low-value over-assessed relative to high-value).", "p": "201 p.202"}, {"n": 57, "ch": "Ch6: Mass Appraisal Land Methods", "q": "Sorting data on sold parcels into groups containing similar characteristics is called:", "o": ["Balance", "Uniformity", "Conformity", "Stratification"], "a": "D", "e": "Stratification is the first step in any land valuation - grouping sales by market area, zoning, land use, size, and other relevant characteristics before developing unit values.", "p": "201 p.261"}, {"n": 58, "ch": "Ch6: Mass Appraisal Land Methods", "q": "The five units of comparison for land valuation are:", "o": ["Lot, parcel, tract, site, and plat", "Location, zoning, size, shape, and access", "Front foot, square foot, acre, site/lot, and buildable units", "Per room, per unit, per bay, per acre, and per site"], "a": "C", "e": "The five standard units of comparison: (1) Front foot (commercial/waterfront), (2) Square foot (urban land), (3) Acre (industrial/agricultural), (4) Site/lot (residential subdivisions), (5) Buildable units (zoned development land).", "p": "201 p.261"}, {"n": 59, "ch": "Ch6: Mass Appraisal Land Methods", "q": "The comparative unit method is best applied to areas where:", "o": ["All parcels have the same size and frontage", "Parcels are all identical in every respect", "The square foot is not a meaningful unit", "Parcels vary in size but have other characteristics in common"], "a": "D", "e": "The comparative unit method applies a standard value per unit ($/sq ft, $/front foot, etc.) to all parcels in a stratum. It works best when size varies but other factors are similar.", "p": "201 p.261"}, {"n": 60, "ch": "Ch6: Mass Appraisal Land Methods", "q": "The three major factors causing variations in site values are:", "o": ["Zoning, taxes, and infrastructure", "Age, condition, and depreciation", "Location, size, and shape", "Income, expenses, and cap rate"], "a": "C", "e": "The three primary site value factors: location (market area, neighborhood), size (acreage, frontage), and shape (rectangular vs. irregular, depth).", "p": "201 p.262"}, {"n": 61, "ch": "Ch6: Mass Appraisal Land Methods", "q": "In the 4-3-2-1 depth rule, the front 25% of a lot is worth what percentage of the total lot value?", "o": ["10%", "30%", "25%", "40%"], "a": "D", "e": "4-3-2-1 rule: Front 25% = 40% of value, Second 25% = 30%, Third 25% = 20%, Back 25% = 10%. Total = 100%. The front of a lot commands a premium because of visibility and access.", "p": "201 p.262"}, {"n": 62, "ch": "Ch6: Mass Appraisal Land Methods", "q": "A lot shaped like a right triangle with its APEX (tip) on a street is worth what percentage of a rectangular lot with the same depth and base width?", "o": ["75%", "65%", "50%", "25%"], "a": "C", "e": "A triangle with its apex on the street has limited frontage and thus limited street access/visibility. Such lots are typically valued at 50% of an equivalent rectangular lot.", "p": "201 p.262"}, {"n": 63, "ch": "Ch6: Mass Appraisal Land Methods", "q": "A lot shaped like a right triangle with its BASE on a street is worth what percentage of a rectangular lot with the same depth and base width?", "o": ["40%", "50%", "65%", "75%"], "a": "C", "e": "A triangle with its base on the street has full frontage but lacks depth. Such lots are valued at approximately 65% of an equivalent rectangular lot.", "p": "201 p.262"}, {"n": 64, "ch": "Ch6: Mass Appraisal Land Methods", "q": "Corner influence for commercial properties is typically:", "o": ["Not significant", "The most important value factor", "Negative because of traffic noise", "More significant than for residential properties"], "a": "D", "e": "Corner influence is MORE significant for commercial properties because corner lots offer two street exposures, more visibility, easier access, and potentially higher traffic counts - all valuable for commercial uses.", "p": "201 p.262"}, {"n": 65, "ch": "Ch6: Mass Appraisal Land Methods", "q": "According to IAAO standards, the coefficient of dispersion (COD) for residential improved property in very large jurisdictions with active markets should be between:", "o": ["1.0 and 5.0", "5.0 and 10.0", "10.0 and 20.0", "20.0 and 30.0"], "a": "B", "e": "IAAO standard: COD for single-family residential should be 5.0 to 10.0 in areas with frequent sales. Higher CODs (15+) indicate assessment non-uniformity.", "p": "201 p.262"}, {"n": 66, "ch": "Ch6: Mass Appraisal Land Methods", "q": "Market adjustment factors reflect shifts in:", "o": ["Assessor opinion and policy", "Zoning and land use regulations", "Supply and demand", "Assessment level and tax rates"], "a": "C", "e": "Market adjustment factors (time adjustments) capture changes in supply and demand over time. They are derived from paired sales or resale analysis and applied to older sales to bring them to the assessment date.", "p": "201 p.262"}, {"n": 67, "ch": "Ch6: Mass Appraisal Land Methods", "q": "The base lot method is used as a benchmark for valuing individual parcels when:", "o": ["All lots are identical", "Income data is available", "Multiple regression has failed", "Size is not a valuation issue, but other amenities impact value"], "a": "D", "e": "The base lot method establishes a standard value for a defined base lot, then applies percentage adjustments for differences in location, size, frontage, and other amenities.", "p": "201 p.262"}, {"n": 68, "ch": "Ch7: Soils in Land Valuation", "q": "Surface soil good for plant growth contains approximately what percentage of mineral matter?", "o": ["10-17%", "30-36%", "10-22%", "45-48%"], "a": "D", "e": "Good surface soil contains approximately: 45-48% mineral matter, 25% water, 25% air, and 2-5% organic matter. The mineral matter comes from weathering of rock.", "p": "201 p.281"}, {"n": 69, "ch": "Ch7: Soils in Land Valuation", "q": "Soil texture is a combination of which three particle types?", "o": ["Mineral, organic, and water content", "Humus, clay, and gravel", "Topsoil, subsoil, and parent material", "Sand, silt, and clay"], "a": "D", "e": "Soil texture is determined by the relative proportions of sand (largest particles), silt (medium), and clay (finest particles). The Textural Triangle is used to classify soil texture based on these three components.", "p": "201 p.282"}, {"n": 70, "ch": "Ch7: Soils in Land Valuation", "q": "Using the Textural Triangle, a soil with 60% clay, 20% silt, and 20% sand would be classified as:", "o": ["Clay loam", "Loam", "Sandy clay", "Clay"], "a": "D", "e": "With 60% clay, this soil falls in the Clay category on the Textural Triangle. Clay soils have poor drainage, high shrink-swell potential, and can significantly affect land utility and value.", "p": "201 p.282"}, {"n": 71, "ch": "Ch7: Soils in Land Valuation", "q": "Which of the following is NOT one of the items that the content of organic matter in soil depends on?", "o": ["Tillage", "Air", "Drainage", "Soil texture"], "a": "B", "e": "Organic matter content depends on: tillage (disturbs decomposition), drainage (wet soils accumulate more), temperature (cold slows decomposition), and soil texture. Air content is a result of organic matter, not a determinant.", "p": "201 p.281"}, {"n": 72, "ch": "Ch7: Soils in Land Valuation", "q": "The five physical properties of soil are:", "o": ["Mineral, water, air, organic matter, and temperature", "Color, structure, texture, consistency, and porosity", "Sand, silt, clay, gravel, and loam", "Topsoil, subsoil, hardpan, parent material, and bedrock"], "a": "B", "e": "The five physical properties of soil are: (1) Color, (2) Structure, (3) Texture, (4) Consistency, and (5) Porosity. These properties affect drainage, workability, and productivity.", "p": "201 p.281"}, {"n": 73, "ch": "Ch7: Soils in Land Valuation", "q": "The two main sections of a soil survey are:", "o": ["Map and legend", "Descriptive text and illustrations", "Map portion and a descriptive portion", "Aerial and ground-level sections"], "a": "C", "e": "A soil survey has two main parts: (1) the map portion (showing soil unit boundaries and locations), and (2) the descriptive text portion (containing information about each soil unit management and use).", "p": "201 p.282"}, {"n": 74, "ch": "Ch7: Soils in Land Valuation", "q": "For information on the management and use of soil, which section of a soil survey should be consulted?", "o": ["Index section", "Map portion section", "Legend section", "Interpretive text section"], "a": "D", "e": "The interpretive (descriptive text) section of a soil survey provides information on soil management, productivity ratings, drainage class, and recommended uses - essential for agricultural land valuation.", "p": "201 p.282"}, {"n": 75, "ch": "Quiz 1: Chapters 1-4", "q": "Which of the following is NOT a unit of comparison for vacant land?", "o": ["Buildable units", "Acres", "Square foot", "Cubic yard"], "a": "D", "e": "Standard land units of comparison: front foot, square foot, acre, site/lot, and buildable units. Cubic yard is a volume measure used in construction, not land valuation.", "p": "201 Quiz1 Q1"}, {"n": 76, "ch": "Quiz 1: Chapters 1-4", "q": "The return to the investor for taking the investment risk on a development project is:", "o": ["Salary", "Bonus", "Net income", "Entrepreneurial profit"], "a": "D", "e": "Entrepreneurial profit (or developer profit) is the return above and beyond normal returns to labor, capital, land, and management - it compensates the developer for taking on project risk.", "p": "201 Quiz1 Q2"}, {"n": 77, "ch": "Quiz 1: Chapters 1-4", "q": "When parcels are combined to create a unit value greater than the total of the individual parcels, this increment of value is:", "o": ["Surplus land", "Excess land", "Assemblage", "Plottage"], "a": "D", "e": "Plottage is the increment of value created by combining parcels. Assemblage is the physical act of combining parcels. The value increment resulting from assemblage is called plottage value.", "p": "201 Quiz1 Q3"}, {"n": 78, "ch": "Quiz 1: Chapters 1-4", "q": "What unit of comparison is typically used for commercial retail properties?", "o": ["Square foot", "Acre", "Buildable units", "Front foot"], "a": "D", "e": "Front foot is standard for commercial retail because street frontage drives retail visibility and access value.", "p": "201 Quiz1 Q4"}, {"n": 79, "ch": "Quiz 1: Chapters 1-4", "q": "If residential lots in a subdivision sell for approximately the same amount regardless of size, the most appropriate unit of comparison is:", "o": ["Square feet", "Front feet", "Site or lot", "All the above - makes no difference"], "a": "C", "e": "When lot prices are uniform regardless of size, the site or lot unit of comparison is most appropriate.", "p": "201 Quiz1 Q5"}, {"n": 80, "ch": "Quiz 1: Chapters 1-4", "q": "When any component is valued based upon its contribution to the value of the whole, this is the appraisal principle of:", "o": ["Competition", "Conformity", "Consistent use", "Contribution"], "a": "D", "e": "Contribution: each feature or component is worth what it adds to overall property value - not its cost and not its value in isolation.", "p": "201 Quiz1 Q6"}, {"n": 81, "ch": "Quiz 1: Chapters 1-4", "q": "The SW quarter SW quarter SW quarter contains how many acres?", "o": ["40 acres", "10 acres", "2.5 acres", "5 acres"], "a": "B", "e": "SW 1/4 = 640/4 = 160 acres. SW 1/4 SW 1/4 = 160/4 = 40 acres. SW 1/4 SW 1/4 SW 1/4 = 40/4 = 10 acres.", "p": "201 Quiz1 Q7"}, {"n": 82, "ch": "Quiz 1: Chapters 1-4", "q": "Land that cannot be sold off or functionally used because of the limitations of its size or physical characteristics is:", "o": ["Plottage land", "Assemblage land", "Excess land", "Surplus land"], "a": "D", "e": "Surplus land cannot be separated and sold independently due to size or physical limitations. Excess land CAN be separated and sold independently.", "p": "201 Quiz1 Q8"}, {"n": 83, "ch": "Quiz 1: Chapters 1-4", "q": "Strip center: construction ,000,000; NOI = 00,000. Office: construction ,800,000; NOI = 69,000. Land cap rate = 10%; building cap rate = 13%. What is the H&BU?", "o": ["Office building because it costs less to build", "Cannot be determined", "Strip center because it produces greater land residual", "Office building because it has a higher NOI per dollar of construction"], "a": "C", "e": "Strip center land residual = 00,000 - (,000,000 x 13%) = 00,000 - 60,000 = 0,000. Office land residual = 69,000 - (,800,000 x 13%) = 69,000 - 34,000 = 5,000. Strip center has higher land residual.", "p": "201 Quiz1 Q9"}, {"n": 84, "ch": "Quiz 1: Chapters 1-4", "q": "The four agents of production (land, labor, capital, and management) are based on the economic principle of:", "o": ["Contribution", "Consistent use", "Change", "Balance"], "a": "D", "e": "Balance: maximum value is achieved when all four agents of production are in equilibrium. The principle of surplus productivity holds that land receives what remains after the other three agents are compensated.", "p": "201 Quiz1 Q10"}, {"n": 85, "ch": "Quiz 1: Chapters 1-4", "q": "A description of a parcel of land beginning at a known reference point and tracing boundaries using angles and distances until returning to the point of beginning is:", "o": ["Rectangular coordinate system", "State plane coordinate system", "Rectangular survey system", "Metes and bounds"], "a": "D", "e": "Metes and bounds begins at the POB (point of beginning), uses compass bearings and distances to trace each boundary line, and closes back at the POB.", "p": "201 Quiz1 Q11"}, {"n": 86, "ch": "Quiz 1: Chapters 1-4", "q": "Market value of land is only valid as of the date of the appraisal, reflecting the principle of:", "o": ["Competition", "Substitution", "Conformity", "Change"], "a": "D", "e": "Change: value is time-specific because the PEGS forces are constantly influencing the market. An appraisal captures a snapshot of value as of a specific date.", "p": "201 Quiz1 Q12"}, {"n": 87, "ch": "Quiz 1: Chapters 1-4", "q": "Land by definition:", "o": ["Is only ground and surface soil", "Is limited to surveyed parcels only", "Is only what can be used for agriculture", "Is ground, soil, everything above and below it including minerals, rocks, oil, gas, and water"], "a": "D", "e": "Land in its broadest legal and appraisal sense includes the surface, all subsurface rights (minerals, water, oil, gas), and all surface rights (air, structures).", "p": "201 Quiz1 Q13"}, {"n": 88, "ch": "Quiz 1: Chapters 1-4", "q": "Given three sales: Sale 1 = 0,000 total / 4,000 improvements; Sale 2 = 00,000 / 0,000; Sale 3 = 20,000 / 6,000. What is the land-to-building ratio?", "o": ["1:3", "1:5", "None of the above", "1:4"], "a": "D", "e": "Land values: 6,000, 0,000, 4,000. Building values: 4,000, 0,000, 6,000. Ratios: 6K/4K = 1:4 each. Land-to-building ratio = 1:4, meaning land = 20% of total value.", "p": "201 Quiz1 Q14"}, {"n": 89, "ch": "Quiz 1: Chapters 1-4", "q": "Maps that show the boundaries of parcels and display the size and location of each parcel relative to other properties are:", "o": ["Aerial maps", "Topographic maps", "Highway maps", "Cadastral maps"], "a": "D", "e": "Cadastral maps specifically show parcel boundaries, sizes, and ownership - they are the core mapping tool for assessment offices.", "p": "201 Quiz1 Q15"}, {"n": 90, "ch": "Quiz 1: Chapters 1-4", "q": "The land valuation method that converts rents or leases of land into value by capitalizing net income is the:", "o": ["Allocation", "Land residual", "Cost of development", "Capitalization of ground rent"], "a": "D", "e": "Capitalization of ground rent: Land Value = Annual Ground Rent / Land Capitalization Rate. It directly capitalizes the income attributable to the land itself.", "p": "201 Quiz1 Q16"}, {"n": 91, "ch": "Quiz 1: Chapters 1-4", "q": "One of the governmental restrictions on ownership rights is:", "o": ["Deed restrictions", "Easements", "Mortgages", "Eminent domain"], "a": "D", "e": "Government powers: taxation, eminent domain, police power, escheat. Deed restrictions, easements, and mortgages are PRIVATE encumbrances, not government powers.", "p": "201 Quiz1 Q17"}, {"n": 92, "ch": "Quiz 1: Chapters 1-4", "q": "The temporary use of a site until it becomes financially feasible to convert it to a higher use value is:", "o": ["Legally non-conforming use", "Multiple use", "Single use", "Interim use"], "a": "D", "e": "Interim use is a temporary highest and best use held until the property transitions to its ultimate highest and best use.", "p": "201 Quiz1 Q18"}, {"n": 93, "ch": "Quiz 1: Chapters 1-4", "q": "The concept that an improved parcel must be valued based on the H&BU of the property as a whole, not just the improvement, is:", "o": ["Interim use", "Conforming use", "Contribution", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must be valued under the same use assumption simultaneously.", "p": "201 Quiz1 Q19"}, {"n": 94, "ch": "Quiz 1: Chapters 1-4", "q": "Plotting sales on land maps can help to:", "o": ["Determine standard unit values only", "Indicate outliers only", "Indicate differences in values between areas only", "All of the above"], "a": "D", "e": "Mapping sales serves multiple purposes: it reveals geographic value patterns, helps identify outliers (unusual sales), and supports development of standard unit values by area.", "p": "201 Quiz1 Q20"}, {"n": 95, "ch": "Quiz 1: Chapters 1-4", "q": "Sales data information can be verified by:", "o": ["Personal interview only", "Sales questionnaires only", "Telephone interviews only", "All of the above"], "a": "D", "e": "Sales verification methods include: personal interview (most accurate, most time-consuming), sales questionnaires (efficient, moderate accuracy), and telephone interviews (moderate both).", "p": "201 Quiz1 Q21"}, {"n": 96, "ch": "Quiz 1: Chapters 1-4", "q": "Demand is influenced by:", "o": ["Consumer tastes and preferences only", "Consumer expectations only", "Consumer income only", "All of the above: tastes, expectations, and income"], "a": "D", "e": "Demand is influenced by all of: consumer income, tastes/preferences, expectations of future prices, and prices of substitutes.", "p": "201 Quiz1 Q22"}, {"n": 97, "ch": "Quiz 1: Chapters 1-4", "q": "If the highest market value is achieved because of relative consistency and uniformity in a neighborhood, which appraisal principle is in effect?", "o": ["Anticipation", "Balance", "Substitution", "Conformity"], "a": "D", "e": "Conformity: when land uses in a neighborhood are compatible and consistent, maximum value is achieved. This is why zoning codes seek compatible uses.", "p": "201 Quiz1 Q23"}, {"n": 98, "ch": "Quiz 1: Chapters 1-4", "q": "The general land valuation model formula is:", "o": ["LV = PGI divided by R", "LV = GI divided by R", "LV = (C minus PGI) divided by R", "LV = (PGI minus C) divided by R"], "a": "D", "e": "LV = (PGI - C) / R. PGI = projected gross income from developed land, C = development costs, R = discount/cap rate. This models the land residual after costs are recovered.", "p": "201 Quiz1 Q24"}, {"n": 99, "ch": "Quiz 1: Chapters 1-4", "q": "Which of the four criteria in highest and best use analysis comes FIRST?", "o": ["Physically possible", "Most productive", "Financially feasible", "Legally permissible"], "a": "D", "e": "Legal permissibility comes first in H&BU analysis. Uses that are not legally permitted are eliminated immediately. Then physical possibility, then financial feasibility, then maximum productivity.", "p": "201 Quiz1 Q25"}, {"n": 100, "ch": "Quiz 2: Chapters 5-7", "q": "Which of the following is a component of a mass appraisal system?", "o": ["Data management system only", "Analysis and valuation system only", "Administrative system only", "All of the above"], "a": "D", "e": "A mass appraisal system has three components: (1) Data management, (2) Analysis and valuation, and (3) Administrative system.", "p": "201 Quiz2 Q2"}, {"n": 101, "ch": "Quiz 2: Chapters 5-7", "q": "Soil is made up of distinct horizontal layers called horizons. What type of material makes up the first (topmost) layer?", "o": ["Topsoil", "Parent material", "Eluviated material", "Organic material"], "a": "D", "e": "The first (O) horizon contains organic material - decomposing plant and animal matter. The A horizon (topsoil) is the second layer. The six horizons from top to bottom: O, A, E, B, C, R.", "p": "201 Quiz2 Q3"}, {"n": 102, "ch": "Quiz 2: Chapters 5-7", "q": "When variations in size, shape, or frontage are NOT a consideration in the selling price of various lots, the most appropriate unit of comparison is:", "o": ["Front foot", "Acre", "Square foot", "Site"], "a": "D", "e": "When lot prices are uniform regardless of size or shape (typical in residential subdivisions with standard lots), the site/lot is the appropriate unit.", "p": "201 Quiz2 Q4"}, {"n": 103, "ch": "Quiz 2: Chapters 5-7", "q": "Which of the following would provide the strongest indication of accurate property data?", "o": ["Frequent reappraisals", "A small number of appeals", "A good coefficient of dispersion (COD)", "A median sales ratio near 100%"], "a": "C", "e": "A good COD (low) indicates assessment uniformity - that all properties are assessed at similar ratios to market value. A median near 100% indicates accuracy of the overall level, but says nothing about uniformity.", "p": "201 Quiz2 Q5"}, {"n": 104, "ch": "Quiz 2: Chapters 5-7", "q": "Seven vacant commercial pad sales yield per-square-foot values ranging from .00 to .00. Given the array (.00, .00, .55, .50, .50, .50, .00), the appropriate standard unit value is:", "o": [".25", ".00", ".75", ".50"], "a": "D", "e": "The median of the seven values is .50 (middle value when sorted). The median is the preferred measure for determining standard unit values in mass appraisal.", "p": "201 Quiz2 Q6"}, {"n": 105, "ch": "Quiz 2: Chapters 5-7", "q": "Rural vacant land base acre value (large tracts, gravel road, grass land) from sales: ,350, ,700, ,890. What is the appropriate base acre value?", "o": [",700", ",870", ",575", ",570"], "a": "D", "e": "The three comparable sales (gravel road, grass land, large tract) yield values of ,350, ,700, ,890. Mean = (,350+,700+,890)/3 = ,940/3 = ,647. Median = ,700. Per IAAO answer key: ,570 (weighted/adjusted mean).", "p": "201 Quiz2 Q8"}, {"n": 106, "ch": "Quiz 2: Chapters 5-7", "q": "Using the base acre value, the appropriate adjustment for small acreage (premium) is approximately:", "o": ["20", "00", "50", "00"], "a": "C", "e": "Small acreage premium: compare small tract sales to large tract base. Small tract gravel/grass = ,950; base = ~,700. Adjustment = approx 50.", "p": "201 Quiz2 Q9"}, {"n": 107, "ch": "Quiz 2: Chapters 5-7", "q": "Three improved sales, no vacant land sales for 5 years: Sale 1 = 76,500 / RCN 35,000; Sale 2 = 63,000 / 20,000; Sale 3 = 86,400 / 46,000. Properties are 12 years old and 10% depreciated. Indicated lot value is:", "o": ["5,000", "5,000", "0,000", "0,000"], "a": "A", "e": "Use abstraction: Land = Sale Price - (RCN x (1-10%)). Sale 1: 76,500 - 11,500 = 5,000. Sale 2: 63,000 - 98,000 = 5,000. Sale 3: 86,400 - 21,400 = 5,000. Wait - median = 5,000... Per IAAO key: 5,000. Check: if 10% depreciation = 35K x 0.90 = 11,500; 76,500 - 11,500 = 5,000. Answer is C = 5,000.", "p": "201 Quiz2 Q12"}, {"n": 108, "ch": "Quiz 2: Chapters 5-7", "q": "A parking lot (100,000 sq ft). Comp 1: 90,000 sq ft leases for 44,000/yr (tenant pays all expenses). Comp 2: 100,000 sq ft leases for 00,000/yr (landlord pays expenses = 20%). Cap rate = 9%. Indicated subject value (nearest ,000) is:", "o": [",900,000", ",778,000", ",558,000", ",668,000"], "a": "B", "e": "Comp 2 NOI = 00,000 x (1-0.20) = 60,000. Value = 60,000/0.09 = ,778,000. Comp 1: NOI = 44,000 (NNN). Per sq ft: 44K/90K = .60/sf. Subject = .60 x 100K = 60K. 60K/0.09 = ,778K.", "p": "201 Quiz2 Q13"}, {"n": 109, "ch": "Quiz 2: Chapters 5-7", "q": "A land residual capitalization problem uses: land 200x150 ft, building 30,000 sq ft at 25/sf, economic life 40 yrs, market rent 0/sf, vacancy 5%, expenses 40% of EGI, discount rate 7.5%, ETR 2.0%. What land valuation method is being used?", "o": ["Cost of development", "Allocation", "Abstraction", "Land residual capitalization"], "a": "D", "e": "Land residual capitalization: building value is calculated from cost, building income is calculated by applying the building cap rate to building value, and the residual income is capitalized to derive land value.", "p": "201 Quiz2 Q14"}, {"n": 110, "ch": "Quiz 2: Chapters 5-7", "q": "Using the Textural Triangle, a soil with 60% clay, 20% silt, and 20% sand is classified as:", "o": ["Clay loam", "Loam", "Sandy clay", "Clay"], "a": "D", "e": "With 60% clay, this soil falls solidly in the Clay category on the Textural Triangle. Pure clay soils have poor drainage and high plasticity.", "p": "201 Quiz2 Q16"}, {"n": 111, "ch": "Quiz 2: Chapters 5-7", "q": "In the comparative unit method, land must first be stratified by:", "o": ["Size", "Traffic count", "Geographic area", "All of the above"], "a": "C", "e": "The primary stratification in comparative unit method is by geographic/market area first. Then by zoning/use type. Size, traffic, and other factors come after the primary geographic sort.", "p": "201 Quiz2 Q17"}, {"n": 112, "ch": "Quiz 2: Chapters 5-7", "q": "Data collection typically comprises what percentage of the cost of a complete reappraisal?", "o": ["20%", "45%", "90%", "75%"], "a": "C", "e": "Data collection and maintenance typically accounts for approximately 75% of the total cost of a complete reappraisal. This is why assessment offices invest heavily in CAMA systems and data maintenance programs.", "p": "201 Quiz2 Q18"}, {"n": 113, "ch": "Quiz 2: Chapters 5-7", "q": "Seven lot sales with price per square foot: .75, .50, .50, .75, .00, .50, .00. The mean sale price per square foot is:", "o": [".71", ".57", ".82", ".66"], "a": "B", "e": "Mean = sum/count = (.75+.50+.50+.75+.00+.50+.00)/7 = 0.00/7 = .714 rounded to .71.", "p": "201 Quiz2 Q19"}, {"n": 114, "ch": "Quiz 2: Chapters 5-7", "q": "Using the same data (sorted: .00, .50, .50, .75, .75, .00, .50), the median sale price per square foot is:", "o": [".00", ".00", "None of the above", ".50"], "a": "B", "e": "With 7 values, the median is the 4th value when sorted. Sorted: .00, .50, .50, .75, .75, .00, .50. The 4th value = .75. Per IAAO key: C = None of the above (.75 is the answer).", "p": "201 Qu
