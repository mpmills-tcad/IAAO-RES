iz2 Q20"}, {"n": 115, "ch": "Quiz 2: Chapters 5-7", "q": "Depth tables should be considered when which unit of comparison is being used?", "o": ["Square foot only", "Front foot only", "Parcel only", "Front foot unit of comparison"], "a": "D", "e": "Depth tables adjust for the diminishing value of additional depth when the front foot is the unit of comparison. When depth varies, the front-foot price must be adjusted using a depth table.", "p": "201 Quiz2 Q23"}, {"n": 116, "ch": "Quiz 2: Chapters 5-7", "q": "In the 4-3-2-1 depth rule, the THIRD 25% of the depth of a lot is worth what percentage of the total lot value?", "o": ["25%", "30%", "35%", "20%"], "a": "D", "e": "4-3-2-1 rule: Front 25% = 40%, Second 25% = 30%, Third 25% = 20%, Back 25% = 10%. The third quarter adds 20% of total value.", "p": "201 Quiz2 Q24"}, {"n": 117, "ch": "Quiz 2: Chapters 5-7", "q": "Three sales: Sale 1 = 50,000 total / 20,000 improvements; Sale 2 = 80,000 / 44,000; Sale 3 = 60,000 / 28,000. What percentage is land to total value?", "o": ["25%", "12%", "15%", "20%"], "a": "D", "e": "Land values: 0K, 6K, 2K. Total values: 50K, 80K, 60K. Ratios: 0/50 = 20%, 6/80 = 20%, 2/60 = 20%. Land = 20% of total value.", "p": "201 Quiz2 Q25"}, {"n": 118, "ch": "Quiz 2: Chapters 5-7", "q": "Which alternative land valuation method employs elements of the cost approach in the analysis of an improved property?", "o": ["Allocation", "Assemblage", "None of the above", "Abstraction"], "a": "D", "e": "Abstraction uses cost approach logic: Land Value = Sale Price - Depreciated Improvement Value. It employs the cost approach to separate land and building value from an improved sale.", "p": "201 Quiz2 Q26"}, {"n": 119, "ch": "Quiz 2: Chapters 5-7", "q": "Sale 2: 12 months ago at 0,000. Sale 3: current sale at 9,600. Both sites are average. Indicated monthly time adjustment is:", "o": ["0.1%", "0.6%", "6%", "1%"], "a": "D", "e": "Change = (9,600 - 0,000) / 0,000 = 12%. Over 12 months = 12%/12 = 1% per month.", "p": "201 Quiz2 Q27"}, {"n": 120, "ch": "Quiz 2: Chapters 5-7", "q": "An irregularly shaped tract comprised of two rectangles: 180x242 ft and 180x484 ft. Total acres is:", "o": ["2.0 acres", "1.0 acre", "0.5 acres", "3.0 acres"], "a": "D", "e": "Area 1 = 180 x 242 = 43,560 sq ft = 1.0 acre. Area 2 = 180 x 484 = 87,120 sq ft = 2.0 acres. Total = 3.0 acres.", "p": "201 Quiz2 Q28"}, {"n": 121, "ch": "Quiz 2: Chapters 5-7", "q": "40-acre parcel; zoning allows 6 residences per acre; lots expected to sell for 2,000 each. Development costs: streets 00K, sewer/water 50K, grading 10K, indirect 60K. Indicated value per building site is:", "o": [",000", ",000", ",500", ",750"], "a": "A", "e": "Total lots = 40 x 6 = 240 lots. Gross proceeds = 240 x 2,000 = ,880,000. Total development costs = ,020,000. Net to land = ,880,000 - ,020,000 = ,860,000 (before profit/discount). Value per site (simplified) = roughly ,750 or ,000 depending on profit assumption. Per IAAO key: ,750.", "p": "201 Quiz2 Q29"}, {"n": 122, "ch": "Quiz 2: Chapters 5-7", "q": "A lot shaped like a right triangle with its BASE on a street is worth what percentage of a rectangular lot with the same depth and base width?", "o": ["50%", "35%", "40%", "65%"], "a": "A", "e": "A triangle with its base on the street has full frontage but tapers to a point at the rear. Per the IAAO standard: triangle with base on street = 50% of equivalent rectangular lot.", "p": "201 Quiz2 Q30"}]}, "300": {"title": "Fundamentals of Mass Appraisal", "questions": [{"n": 1, "ch": "Ch1: Intro to Mass Appraisal", "q": "Mass appraisal is defined as the systematic appraisal of groups of properties as of a given date using standardized procedures and:", "o": ["Single property inspection techniques", "Appraiser judgment for each parcel", "Statistical testing", "Comparable sales analysis only"], "a": "C", "e": "Mass appraisal = systematic appraisal of groups of properties using standardized procedures AND statistical testing to measure and calibrate results - the key distinction from single-property appraisal.", "p": "300 p.18"}, {"n": 2, "ch": "Ch1: Intro to Mass Appraisal", "q": "Building costs, economic conditions, and interest rates are classified as what type of factors in mass appraisal models?", "o": ["Property-specific factors", "Location factors", "Market factors", "Qualitative factors"], "a": "C", "e": "Market (economic) factors include building costs, economic conditions, and interest rates - they affect all properties in a market simultaneously rather than being property-specific.", "p": "300 p.18"}, {"n": 3, "ch": "Ch1: Intro to Mass Appraisal", "q": "Location, condition, and construction quality are classified as what type of factors?", "o": ["Market factors", "Economic factors", "Statistical factors", "Property-specific factors"], "a": "D", "e": "Property-specific (physical) factors - location, condition, construction quality, age, size - are unique to each parcel and explain differences in value between individual properties.", "p": "300 p.18"}, {"n": 4, "ch": "Ch1: Intro to Mass Appraisal", "q": "The basic model structure for the sales comparison approach is:", "o": ["MV = LV + BV", "MV = GI x GIM", "V = I / R", "MVS = SC + ADJC"], "a": "D", "e": "MVS = SC + ADJC: Market Value of Subject = Comparable Sales + Adjustments to Comparables. This mirrors the single-property sales comparison grid structure.", "p": "300 p.18"}, {"n": 5, "ch": "Ch1: Intro to Mass Appraisal", "q": "MV = LV + BV is the basic model structure for which approach to value?", "o": ["Sales comparison approach", "Income approach", "Mass appraisal approach", "Cost approach"], "a": "D", "e": "MV = LV + BV: Market Value = Land Value + Building Value. This additive structure is the basis of the cost approach in mass appraisal.", "p": "300 p.18"}, {"n": 6, "ch": "Ch1: Intro to Mass Appraisal", "q": "Net operating incomes and capitalization rates are requirements for which type of mass appraisal model?", "o": ["Cost model", "Sales comparison model", "Land residual model", "Income capitalization model"], "a": "D", "e": "The income model (V = I / R) requires net operating income (I) and a capitalization rate (R) to produce value. NOI and cap rates are the key inputs.", "p": "300 p.18"}, {"n": 7, "ch": "Ch1: Intro to Mass Appraisal", "q": "Property valuation models seek to explain or predict the ________ of properties from real estate sales and related data:", "o": ["Assessed values", "Tax rates", "Market values", "Replacement costs"], "a": "C", "e": "Mass appraisal models use market sales and property characteristic data to explain and predict market values across the entire assessment roll.", "p": "300 p.18"}, {"n": 8, "ch": "Ch1: Intro to Mass Appraisal", "q": "The hybrid (additive/multiplicative) cost model structure is:", "o": ["V = I / R", "MVS = SC + ADJC", "MV = GI x GIM", "MVS = GQ x [(PI x QI) + (PL x QL)] + OA"], "a": "D", "e": "The generic hybrid model: MVS = GQ x [(PI x QI) + (PL x QL)] + OA. It combines multiplicative (GQ qualitative factors) with additive (PI x QI improvement costs plus PL x QL land value) components.", "p": "300 p.18"}, {"n": 9, "ch": "Ch1: Intro to Mass Appraisal", "q": "Model specification in mass appraisal involves:", "o": ["Calibrating rates to match current market", "Determining statistical significance of each variable", "Determining what data to include in the model and in what format", "Reviewing and adjusting individual parcel values"], "a": "C", "e": "Model specification involves selecting which variables to include in the model and how to code and format them. Calibration comes after specification.", "p": "300 p.18"}, {"n": 10, "ch": "Ch1: Intro to Mass Appraisal", "q": "Determining the rates used in a model, adjusting formulas, tables, or schedules to the current market is known as:", "o": ["Model specification", "Model review", "Model calibration", "Model validation"], "a": "C", "e": "Model calibration = adjusting model coefficients, rates, tables, and schedules to reflect current market conditions. Specification decides what to include; calibration determines the values.", "p": "300 p.18"}, {"n": 11, "ch": "Ch1: Intro to Mass Appraisal", "q": "The standard of care in mass appraisal is acceptable when it:", "o": ["Produces a COD below 15%", "Meets all USPAP requirements", "Is approved by the state assessment agency", "Meets or exceeds the expectations of intended users and what an appraiser peers actions would be in a similar assignment"], "a": "D", "e": "The standard of care test: would the work meet the expectations of regularly intended users and be consistent with what peer appraisers would do in the same situation? This is the USPAP-based standard.", "p": "300 p.18"}, {"n": 12, "ch": "Ch1: Intro to Mass Appraisal", "q": "How many steps are in the general appraisal process?", "o": ["5 steps", "6 steps", "8 steps", "7 steps"], "a": "D", "e": "The general appraisal process has 7 steps: (1) Define the problem, (2) Determine scope of work, (3) Collect data, (4) Analyze data, (5) Apply approaches to value, (6) Reconcile value indicators, (7) Report the value.", "p": "300 p.18"}, {"n": 13, "ch": "Ch2: Overview of Mass Appraisal", "q": "The three components of a property tax system are:", "o": ["Discovery, listing, and valuation", "Cost, sales comparison, and income", "Data management, analysis, and administration", "Assessment, appeal, and collection"], "a": "D", "e": "The three components of the property tax system: (1) Assessment system (discovers, values, lists property), (2) Appeal system (resolves disputes), (3) Collection system (bills, receives payments, distributes funds).", "p": "300 p.37"}, {"n": 14, "ch": "Ch2: Overview of Mass Appraisal", "q": "Online systems update master files directly from computer workstations with edits built into data entry software. This describes which type of processing?", "o": ["Batch processing", "Real-time processing", "Statistical processing", "CAMA processing"], "a": "A", "e": "Online (real-time) processing updates the master file immediately as data is entered. Batch processing collects transactions and processes them all at once, typically overnight.", "p": "300 p.37"}, {"n": 15, "ch": "Ch2: Overview of Mass Appraisal", "q": "A ________ should be conducted to measure and evaluate the accuracy and uniformity of new values:", "o": ["Field review", "Data edit", "Reappraisal", "Ratio study"], "a": "D", "e": "A ratio study is the standard tool for measuring assessment accuracy (level) and uniformity (COD). It should be conducted after any reappraisal to verify the results meet IAAO standards.", "p": "300 p.37"}, {"n": 16, "ch": "Ch2: Overview of Mass Appraisal", "q": "The receipt of payments and distribution of funds is part of which system?", "o": ["Assessment system", "Appeal system", "Valuation system", "Collection system"], "a": "D", "e": "The collection system handles tax statements/bills, receives and accounts for payments, initiates collections for delinquent taxes, and distributes receipts to taxing jurisdictions.", "p": "300 p.37"}, {"n": 17, "ch": "Ch2: Overview of Mass Appraisal", "q": "The four components of the mass appraisal system are:", "o": ["Cost, sales, income, and land", "Field work, data entry, modeling, and review", "Market, property, legal, and statistical", "Data management, analysis/valuation, administrative, and customer service/communications"], "a": "D", "e": "The four components of the mass appraisal system: (1) Data management, (2) Analysis and valuation, (3) Administrative, and (4) Customer service/communications.", "p": "300 p.37"}, {"n": 18, "ch": "Ch2: Overview of Mass Appraisal", "q": "Sales data, cost data, and income data are components of which portion of data collection and maintenance?", "o": ["Property characteristics data", "Administrative data", "Market data", "Assessment roll data"], "a": "C", "e": "Market data includes sales data, cost data (for cost approach calibration), and income/expense data (for income approach). This differs from property characteristics data (physical attributes of parcels).", "p": "300 p.37"}, {"n": 19, "ch": "Ch2: Overview of Mass Appraisal", "q": "Property characteristics data should be thoroughly ________ and ________ to ensure quality control:", "o": ["Coded and filed", "Priced and adjusted", "Edited and reviewed", "Assessed and taxed"], "a": "C", "e": "Data quality control requires both editing (automated range and logic checks) and review (manual verification). Poor data quality is a primary cause of poor assessment uniformity.", "p": "300 p.37"}, {"n": 20, "ch": "Ch2: Overview of Mass Appraisal", "q": "Property owners who dispute the assessed property value engage which component of the property tax system?", "o": ["Assessment system", "Collection system", "Valuation system", "Appeal system"], "a": "D", "e": "The appeal system receives and processes owner disputes. It includes informal reviews, formal hearings, and judicial appeals as escalating levels of dispute resolution.", "p": "300 p.38"}, {"n": 21, "ch": "Ch3: Data Collection & Management", "q": "The three methods required to evaluate data accuracy in mass appraisal are:", "o": ["Range edits, logic edits, and consistency edits", "Mean, median, and weighted mean analysis", "Field study, ratio study, and pilot study", "Physical inspection, sales verification, and income analysis"], "a": "C", "e": "Three evaluation methods: (1) Field study - samples properties for quality cross-check, (2) Ratio study - poor uniformity often signals data quality issues, (3) Pilot study - models a test group to identify required data elements.", "p": "300 p.65"}, {"n": 22, "ch": "Ch3: Data Collection & Management", "q": "Data quality refers to how accurately recorded information used to estimate values reflects the current status of the property. This is the definition of:", "o": ["Quantity", "Completeness", "Reliability", "Quality"], "a": "D", "e": "Quality = accuracy of recorded data reflecting current property status. Quantity = completeness of data collected. Both must be adequate for valid mass appraisal results.", "p": "300 p.65"}, {"n": 23, "ch": "Ch3: Data Collection & Management", "q": "Qualitative items with three or more predefined values (e.g., topography: level, rolling, steep) are known as what type of data?", "o": ["Continuous data", "Binary data", "Ordinal data", "Discrete data"], "a": "C", "e": "Ordinal data has three or more ordered categories (e.g., poor/average/good/excellent condition). Binary data has exactly two values (yes/no). Continuous data takes any value within a range.", "p": "300 p.66"}, {"n": 24, "ch": "Ch3: Data Collection & Management", "q": "A consistency (logic) edit makes certain that the number of bedrooms does not exceed the total room count, or the basement sq ft is not greater than the finished area. This is an example of a:", "o": ["Range edit", "Ratio edit", "Qualitative edit", "Consistency (logic) edit"], "a": "D", "e": "Consistency edits check whether related fields are logically compatible. Range edits check whether individual fields fall within acceptable minimum/maximum bounds.", "p": "300 p.66"}, {"n": 25, "ch": "Ch3: Data Collection & Management", "q": "Data items where the proper value is a matter of judgment and difficult to verify are called:", "o": ["Continuous data", "Binary data", "Ordinal (qualitative) data", "Discrete data"], "a": "C", "e": "Qualitative/ordinal data (condition, quality grades, architectural style) requires judgment in assignment and is harder to verify than objective measurements like square footage.", "p": "300 p.66"}, {"n": 26, "ch": "Ch3: Data Collection & Management", "q": "Data quantity relates to what aspect of the data collection effort?", "o": ["How accurately data reflects property status", "The speed of data collection", "The number of appraisers assigned to the project", "The completeness of data collected to capture local market influences"], "a": "D", "e": "Quantity = completeness - do you have all the data needed to capture what the local market values? Missing key data elements reduces model effectiveness.", "p": "300 p.65"}, {"n": 27, "ch": "Ch3: Data Collection & Management", "q": "Data collectors should receive both what two types of training?", "o": ["Legal and administrative training", "Software and hardware training", "Office and field training", "Classroom and on-the-job training"], "a": "D", "e": "Data collectors need both classroom training (procedures, coding manuals, standards) and on-the-job/field training (supervised practical application).", "p": "300 p.66"}, {"n": 28, "ch": "Ch3: Data Collection & Management", "q": "Given: 40,000 parcels, 20 parcels per day, 260 working days per year, minus 30 non-productive days = 230 productive days. How many appraisers are required to complete in one year?", "o": ["6 appraisers", "7 appraisers", "8 appraisers", "9 appraisers"], "a": "D", "e": "Total days needed = 40,000 / 20 = 2,000 appraiser-days. Productive days per appraiser = 260 - 10 holidays - 10 vacation - 5 sick - 5 training = 230 days. Appraisers = 2,000 / 230 = 8.7, rounded up to 9.", "p": "300 p.67"}, {"n": 29, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "The listing of data in order of magnitude, either ascending or descending, is termed a/an:", "o": ["Frequency distribution", "Histogram", "Array", "Scatter diagram"], "a": "C", "e": "An array is a simple ordered listing of data values. It is the first step in most statistical analyses and useful for identifying the range, outliers, and central tendency of small datasets.", "p": "300 p.110"}, {"n": 30, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "A ________ illustrates the extent to which sales ratios are in a normal (bell-shaped) distribution when used to chart a frequency distribution:", "o": ["Scatter diagram", "Array", "Contingency table", "Histogram (bar chart)"], "a": "D", "e": "A histogram (bar chart) charts the frequency distribution. When sales ratios follow a bell curve, the histogram shows a roughly symmetrical mound shape, indicating a normal distribution.", "p": "300 p.110"}, {"n": 31, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "Crosstabulations show the distribution of values for which types of variables?", "o": ["Continuous variables only", "All quantitative variables", "Binary or discrete variables", "Dependent variables only"], "a": "C", "e": "Crosstabulations (contingency tables) are used for binary or discrete (categorical) variables - for example, showing the distribution of sale prices by neighborhood and property type.", "p": "300 p.110"}, {"n": 32, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "Scatter diagrams show the relationship between two quantitative variables with the dependent variable placed on which axis?", "o": ["Horizontal (X) axis", "Both axes equally", "Neither axis - scatter diagrams use color coding", "Vertical (Y) axis"], "a": "D", "e": "In a scatter diagram: dependent variable (sale price or ratio) on the Y (vertical) axis; independent variable (size, age, etc.) on the X (horizontal) axis. The pattern of dots reveals the relationship.", "p": "300 p.110"}, {"n": 33, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "A polygon (line chart) can be used to show several variables simultaneously or the same variable for different:", "o": ["Time periods only", "Different appraisers", "Different strata", "Different tax rates"], "a": "C", "e": "A polygon (line chart) is particularly useful for comparing the same variable (e.g., median ratio) across different strata (neighborhoods, property types, age ranges) on the same graph.", "p": "300 p.110"}, {"n": 34, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "Contingency tables compare statistics by strata, for example average sale price by neighborhood. They are also called:", "o": ["Arrays", "Scatter diagrams", "Three-way comparisons", "Crosstabulations"], "a": "D", "e": "Contingency tables and crosstabulations are the same tool - showing how values of one variable are distributed across categories of another variable.", "p": "300 p.110"}, {"n": 35, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "The coefficient of variation (COV) expresses the standard deviation as a percentage of the:", "o": ["Median", "Weighted mean", "Range", "Mean"], "a": "D", "e": "COV = (Standard Deviation / Mean) x 100. It normalizes the standard deviation to allow comparison across datasets with different means. Unlike COD (which uses the median), COV uses the mean.", "p": "300 p.110"}, {"n": 36, "ch": "Ch4: Data Analysis in Mass Appraisal", "q": "Cases beyond the whiskers in box plots are called:", "o": ["Adjustments and corrections", "Averages and outliers", "Normal values and extremes", "Outliers and far outliers"], "a": "D", "e": "In a box plot: values beyond the whiskers are outliers; values far beyond the outer fences are called far outliers (extreme values). These are candidates for verification or exclusion from analysis.", "p": "300 p.110"}, {"n": 37, "ch": "Ch5: Sales Ratio Studies", "q": "A ratio study is the most effective means of evaluating assessment accuracy. The ratio is developed by:", "o": ["Dividing sale price by assessed value", "Dividing assessed value by replacement cost", "Dividing assessed value by sale price", "Dividing net income by sale price"], "a": "C", "e": "A/S Ratio = Assessed Value / Sale Price. A ratio of 1.00 (or 100%) means the assessment equals the sale price - perfectly accurate. The median ratio reflects the overall assessment level.", "p": "300 p.163"}, {"n": 38, "ch": "Ch5: Sales Ratio Studies", "q": "Three ways of obtaining sales data from buyers and sellers are:", "o": ["Field inspection, mail survey, and deed recording", "Personal interview, telephone interview, and sales questionnaire", "Comparable sales analysis, ratio study, and trend analysis", "CAMA system, MLS database, and county recorder"], "a": "B", "e": "The three basic sales verification methods: personal interview (most accurate), telephone interview (moderate accuracy and efficiency), and sales questionnaire by mail (most efficient but lowest response and accuracy).", "p": "300 p.163"}, {"n": 39, "ch": "Ch5: Sales Ratio Studies", "q": "A frequency distribution shows the number of ratios falling within specified intervals and also reveals:", "o": ["The assessed value of each parcel", "Patterns and trends in the data sample", "The tax rate needed to meet the budget", "The individual appraiser performance"], "a": "B", "e": "A frequency distribution reveals patterns and trends: whether ratios are clustered, skewed, bimodal, or normally distributed. It is an essential tool for understanding the overall assessment level and uniformity.", "p": "300 p.163"}, {"n": 40, "ch": "Ch5: Sales Ratio Studies", "q": "The median in a ratio study is:", "o": ["The most frequently occurring ratio", "The average of all ratios weighted by sale price", "The arithmetic mean of all ratios", "The midpoint when ratios are arrayed in order of magnitude"], "a": "D", "e": "The median is the middle value when data is sorted - 50% of ratios fall above it and 50% below. It is preferred over the mean in ratio studies because it is less influenced by extreme outliers.", "p": "300 p.163"}, {"n": 41, "ch": "Ch5: Sales Ratio Studies", "q": "A histogram is defined as:", "o": ["A listing of data in order of magnitude", "A graph showing relationship between two variables", "A bar chart or graph of a frequency distribution", "A three-dimensional visualization of assessment data"], "a": "C", "e": "A histogram is a bar chart where each bar represents an interval and the height shows the frequency (number of observations) in that interval. Used to visualize the distribution of ratios.", "p": "300 p.163"}, {"n": 42, "ch": "Ch5: Sales Ratio Studies", "q": "The most common measure of appraisal uniformity in ratio studies is the:", "o": ["Standard deviation", "Price-related differential (PRD)", "Coefficient of variation (COV)", "Coefficient of dispersion (COD)"], "a": "D", "e": "The COD (Coefficient of Dispersion) is the IAAO standard measure of assessment uniformity. COD = 100 x (Average Absolute Deviation from Median) / Median. Lower COD = more uniform assessments.", "p": "300 p.163"}, {"n": 43, "ch": "Ch5: Sales Ratio Studies", "q": "The price-related differential (PRD) is a measure of:", "o": ["Horizontal equity between neighborhoods", "The overall assessment level compared to market", "Vertical equity between high-value and low-value properties", "The uniformity within each property class"], "a": "C", "e": "PRD measures vertical equity - whether high-value and low-value properties are assessed at similar ratios. PRD > 1.03 suggests regressivity (low-value properties over-assessed relative to high-value); PRD < 0.98 suggests progressivity.", "p": "300 p.163"}, {"n": 44, "ch": "Ch5: Sales Ratio Studies", "q": "According to IAAO standards, the level of appraisal (median ratio) should fall between:", "o": ["85% and 95%", "80% and 120%", "95% and 105%", "90% and 110%"], "a": "C", "e": "IAAO standard: the median assessment ratio should fall between 0.90 and 1.10 (90% and 110% of market value) for the overall assessment level to be acceptable.", "p": "300 p.163"}, {"n": 45, "ch": "Ch5: Sales Ratio Studies", "q": "According to IAAO standards, for older heterogeneous residential property the COD should be between 5.0 and:", "o": ["10.0", "20.0", "25.0", "15.0"], "a": "D", "e": "IAAO COD standards: newer homogeneous residential = 5-10; older heterogeneous residential = 5-15; rural residential and seasonal = 5-20; income-producing = 5-20.", "p": "300 p.163"}, {"n": 46, "ch": "Ch5: Sales Ratio Studies", "q": "Line charts (polygons) differ from other charts in that they can:", "o": ["Show three-dimensional data", "Be used only for ratio studies", "Calculate the mean and median simultaneously", "Accommodate multiple data sets on the same graph"], "a": "D", "e": "Line charts/polygons can show multiple data series (e.g., median ratios for several neighborhoods) on the same graph, making visual comparisons easy.", "p": "300 p.163"}, {"n": 47, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Cost models in mass appraisal follow the structure of which single-property appraisal approach?", "o": ["Sales comparison approach models", "Income approach models", "Regression approach models", "Cost approach models"], "a": "D", "e": "Mass appraisal cost models parallel single-property cost approach: Depreciated Cost = Reproduction/Replacement Cost New minus Depreciation. The mass appraisal difference is scale and statistical calibration.", "p": "300 p.199"}, {"n": 48, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Cost manuals should contain:", "o": ["Tax rates and assessment ratios", "Market rent schedules and cap rates", "Sale prices and adjustment grids", "Replacement cost tables, depreciation schedules, classification guidelines, and building feature codes"], "a": "D", "e": "A mass appraisal cost manual provides: replacement cost tables (by building type and class), depreciation schedules, building classification guidelines, and codes for features and extras.", "p": "300 p.199"}, {"n": 49, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Material, labor, and supervision are classified as what type of construction costs?", "o": ["Indirect costs", "Soft costs", "Overhead costs", "Direct (hard) costs"], "a": "D", "e": "Direct costs are on-site construction expenses: materials, labor, and supervision. Indirect costs (soft costs) include architectural/engineering fees, permits, insurance, and financing.", "p": "300 p.199"}, {"n": 50, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "The cost of constructing an IDENTICAL structure is called:", "o": ["Replacement cost new (RCN)", "Depreciated cost", "Historical cost", "Reproduction cost new"], "a": "D", "e": "Reproduction cost new = cost to construct an exact replica using the same materials, design, and methods as the original. Replacement cost new uses modern materials and methods to achieve equivalent utility.", "p": "300 p.199"}, {"n": 51, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Insurance, architectural and engineering fees are classified as what type of construction costs?", "o": ["Direct costs", "Variable costs", "Replacement costs", "Indirect (soft) costs"], "a": "D", "e": "Indirect/soft costs include: architectural fees, engineering fees, permit fees, financing costs during construction, insurance, real estate taxes during construction, and developer overhead.", "p": "300 p.199"}, {"n": 52, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "The cost of constructing a SUBSTITUTE structure of EQUAL UTILITY is:", "o": ["Reproduction cost new", "Historical cost indexed", "Depreciated cost", "Replacement cost new (RCN)"], "a": "D", "e": "Replacement cost new (RCN) = cost to produce a building with equal utility using modern materials and methods. Most mass appraisal cost manuals are based on replacement cost rather than reproduction cost.", "p": "300 p.199"}, {"n": 53, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Depreciation schedules in mass appraisal must be derived from:", "o": ["The cost index", "Published national tables only", "The effective tax rate", "The market (actual sales data)"], "a": "D", "e": "Depreciation schedules must be derived from the market through analysis of sales data - comparing what improved properties sell for vs. their RCN. Market-derived schedules reflect actual buyer behavior.", "p": "300 p.199"}, {"n": 54, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Floors and roofing are examples of what type of cost components?", "o": ["Indirect cost components", "Land cost components", "Long-lived cost components", "Short-lived cost components"], "a": "D", "e": "Short-lived components (floors, roofing, HVAC, kitchen fixtures) have limited useful lives and are replaced before the building is retired. They require separate depreciation schedules from the long-lived structural components.", "p": "300 p.199"}, {"n": 55, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "When applying the comparative unit method in cost approach, costs are expressed on a per ________ basis:", "o": ["Per room", "Per unit", "Per parcel", "Per square foot"], "a": "D", "e": "The comparative unit (square foot) method expresses costs per square foot of building area. It is the most widely used cost estimation method in mass appraisal due to its simplicity and efficiency.", "p": "300 p.199"}, {"n": 56, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Proper application of the ________ method requires detailed knowledge of construction:", "o": ["Comparative unit (square foot) method", "Trended historical cost method", "Unit-in-place method", "Abstraction method"], "a": "C", "e": "The unit-in-place method prices each component separately (foundation, framing, roofing, etc.) requiring detailed construction knowledge. It is more accurate than the square foot method but requires greater expertise.", "p": "300 p.199"}, {"n": 57, "ch": "Ch6: Cost Approach in Mass Appraisal", "q": "Entrepreneurial profit is the amount one expects to receive for contribution to a project that includes:", "o": ["Normal labor costs", "Management fees only", "Property tax liability", "Risk compensation"], "a": "D", "e": "Entrepreneurial profit (entrepreneurial incentive) compensates the developer for taking on project risk above normal returns. It is a legitimate cost component in the cost approach.", "p": "300 p.199"}, {"n": 58, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "The three approaches to stratification and location analysis in mass appraisal are:", "o": ["Cost, sales, and income approaches", "Mean, median, and mode stratification", "Field, office, and statistical stratification", "Geographic areas, neighborhood identification, and response surface analysis"], "a": "D", "e": "Three location analysis approaches in mass appraisal: (1) Geographic stratification (drawing boundaries), (2) Cluster analysis/neighborhood identification, and (3) Global response surface analysis (using coordinates).", "p": "300 p.223"}, {"n": 59, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "Per unit value analyses can be very effective for which type of properties?", "o": ["Large commercial complexes", "Unique one-of-a-kind properties", "Income-producing commercial properties", "Homogeneous properties"], "a": "D", "e": "Per unit value analysis ($/sq ft, $/front foot, $/acre) works best for homogeneous properties where size is the primary value driver and other characteristics are similar within the stratum.", "p": "300 p.219"}, {"n": 60, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "A statistical technique used for estimating unknown data based on known and available data is:", "o": ["Cluster analysis", "Stratification", "Frequency distribution", "Multiple regression analysis (MRA)"], "a": "D", "e": "Multiple regression analysis (MRA) estimates the value of a dependent variable (market value) from multiple independent variables (property characteristics) using statistical relationship modeling.", "p": "300 p.219"}, {"n": 61, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "The formula MVS = SC + ADJC is the formula for which type of model?", "o": ["Income model", "Cost model", "Hybrid model", "Sales comparison model"], "a": "D", "e": "MVS = SC + ADJC: Market Value of Subject = Comparable Sales + Adjustments to Comparable. This is the direct sales comparison model structure, mirroring single-property sales comparison analysis.", "p": "300 p.219"}, {"n": 62, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "The three basic types of mass appraisal model structures are:", "o": ["Cost, income, and sales comparison", "Manual, statistical, and hybrid", "Additive, multiplicative, and hybrid (generic)", "Linear, logarithmic, and exponential"], "a": "C", "e": "Three model structures: (1) Additive: MV = b0 + (b1 x X1)... (2) Multiplicative: MV = R0 x SIZE x F1..., (3) Hybrid/Generic: MV = GQ x [(PI x QI) + (PL x QL)] + OA.", "p": "300 p.219"}, {"n": 63, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "MVS = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is known as which model type?", "o": ["Hybrid model", "Multiplicative model", "Income model", "Additive model"], "a": "D", "e": "The additive model: each property feature contributes a dollar amount to total value. b0 is the base value; each coefficient (b1, b2...) represents the dollar value of one unit of the corresponding feature.", "p": "300 p.219"}, {"n": 64, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "When geographically stratifying properties, boundaries should be drawn to correspond with:", "o": ["Assessment level targets", "Appraiser assignments", "Statistical significance levels", "Natural or political boundaries"], "a": "D", "e": "Geographic strata boundaries should follow natural (rivers, highways, topography) or political (city/county lines, zoning districts) boundaries to reflect areas with homogeneous market influences.", "p": "300 p.219"}, {"n": 65, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "Broad geographic areas subject to the same economic influences are known as:", "o": ["Subdivisions", "Neighborhoods", "Economic (market) areas", "Assessment districts"], "a": "C", "e": "Economic (market) areas are broad geographic areas where properties are subject to similar economic forces. They form the first level of stratification, within which neighborhoods are identified.", "p": "300 p.219"}, {"n": 66, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "A technique that can be used to group similar subdivisions into neighborhoods is:", "o": ["Paired sales analysis", "Multiple regression analysis", "Ratio study analysis", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar observations (subdivisions or parcels) into categories based on multiple variables simultaneously - useful for identifying homogeneous neighborhoods from market data.", "p": "300 p.219"}, {"n": 67, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "MV = GQ x [(PI x QI) + (PL x QL)] + OA is known as which model type?", "o": ["Additive model", "Income model", "Multiplicative model", "Hybrid (generic) model"], "a": "D", "e": "The hybrid model combines multiplicative elements (GQ qualitative factor applied globally) with additive elements (improvement value + land value). This is the generic cost model structure used in most CAMA systems.", "p": "300 p.219"}, {"n": 68, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "q": "In developing per unit values, the most appropriate units would have low measures of:", "o": ["Mean and median", "Standard error and regression coefficient", "COD and PRD", "Dispersion (variation)"], "a": "D", "e": "Low dispersion within a per-unit-value stratum means properties in that group have similar values per unit - validating the unit as the appropriate measure. High dispersion suggests the stratum needs further refinement.", "p": "300 p.219"}, {"n": 69, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "The formula for the net income model in mass appraisal is:", "o": ["MV = GI x GIM", "V = I / R", "MVS = SC + ADJC", "MV = LV + BV"], "a": "B", "e": "V = I / R: Market Value = Net Operating Income / Overall Capitalization Rate. This is the direct capitalization income model - the foundation of income approach mass appraisal.", "p": "300 p.237"}, {"n": 70, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "When estimating gross income in mass appraisal, the first step is to:", "o": ["Apply the GIM to the subject", "Calculate the capitalization rate", "Determine the net income ratio", "Stratify properties by use, class, location, etc."], "a": "D", "e": "Stratification is the first step in any mass appraisal income analysis - grouping similar properties to develop meaningful market rent and expense ratio benchmarks for each stratum.", "p": "300 p.237"}, {"n": 71, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "When estimating operating expenses for ad valorem tax purposes, what should NOT be included?", "o": ["Management fees", "Reserves for replacement", "Capital expenditures", "Property taxes"], "a": "D", "e": "For ad valorem appraisal, property taxes are excluded from operating expenses (because the taxes are not yet known) and instead an effective tax rate (ETR) is loaded into the capitalization rate.", "p": "300 p.237"}, {"n": 72, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "The formula for the gross income model in mass appraisal is:", "o": ["V = I / R", "MVS = SC + ADJC", "MV = LV + BV", "MV = GI x GIM"], "a": "D", "e": "MV = GI x GIM: Market Value = Gross Income x Gross Income Multiplier. This is an alternative to direct NOI capitalization, useful when expense data is limited but gross income is well-established.", "p": "300 p.237"}, {"n": 73, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "The two basic methods of estimating gross income in mass appraisal are:", "o": ["Direct capitalization and yield capitalization", "Derivation from sales and band of investment", "Income and expense analysis", "Stratification and modeling"], "a": "D", "e": "Gross income can be estimated through: (1) Stratification - grouping by type/location and computing median rent per unit, and (2) Modeling - using regression to predict rent from property characteristics.", "p": "300 p.237"}, {"n": 74, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "The dependent variable in gross income models should be:", "o": ["Overall capitalization rate", "Net operating income per unit", "Sale price per square foot", "Gross income per unit of comparison"], "a": "D", "e": "In gross income models, the dependent variable (what you are predicting) is gross income per unit (per sq ft, per room, per unit). Property characteristics (location, size, age, amenities) are the independent variables.", "p": "300 p.237"}, {"n": 75, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "Independent variables in gross income models should be:", "o": ["Sale prices and cap rates", "COD and PRD statistics", "Property characteristics important in explaining differences in gross income", "Assessment ratios and tax rates"], "a": "C", "e": "Independent variables in gross income models include property characteristics that drive rental differences: location, size, age, quality class, amenities, and condition.", "p": "300 p.237"}, {"n": 76, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "The dependent variable in expense ratio models should be the:", "o": ["Net operating income", "Overall capitalization rate", "Expense ratio (operating expenses / gross income)", "Gross income multiplier"], "a": "C", "e": "In expense ratio models, the dependent variable is the expense ratio itself. The model predicts what expense ratio is typical for properties with given characteristics (property type, age, amenities, etc.).", "p": "300 p.237"}, {"n": 77, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "In developing GIMs and OARs, three factors that should be considered when stratifying properties are:", "o": ["Mean, median, and mode", "Direct, indirect, and total costs", "Quality, quantity, and condition", "Property type, location, and income level"], "a": "D", "e": "When stratifying for GIM/OAR development: (1) property type/use (apartments vs. retail vs. office), (2) location/market area, and (3) income level/class. These factors drive differences in investor expectations.", "p": "300 p.237"}, {"n": 78, "ch": "Ch8: Income Approach in Mass Appraisal", "q": "In developing GIMs in mass appraisal, the appraiser should first stratify then compute measures of ________ and ________ for each stratum:", "o": ["Quality and quantity", "Cost and income", "Maximum and minimum", "Central tendency and dispersion"], "a": "D", "e": "After stratifying: compute measures of central tendency (median GIM) and dispersion (COD) for each stratum. Low dispersion validates the stratum; high dispersion suggests further refinement is needed.", "p": "300 p.237"}, {"n": 79, "ch": "Applied Statistics & Ratio Studies", "q": "Seven sales: AV = 08K, 5K, 54K, 23.5K, 20K, 05K, 26.5K; SP = 20K, 00K, 40K, 30K, 50K, 05K, 10K. Ratios are: 0.900, 0.850, 1.100, 0.950, 0.800, 1.000, 1.150. The MEDIAN ratio is:", "o": ["0.900", "0.950", "0.850", "1.000"], "a": "B", "e": "Sorted ratios: 0.800, 0.850, 0.900, 0.950, 1.000, 1.100, 1.150. With 7 values, the median is the 4th = 0.950.", "p": "300 p.165"}, {"n": 80, "ch": "Applied Statistics & Ratio Studies", "q": "Using the same 7 ratios (0.800, 0.850, 0.900, 0.950, 1.000, 1.100, 1.150), the MEAN ratio is:", "o": ["0.950", "1.000", "0.964", "0.936"], "a": "C", "e": "Mean = sum/count = (0.800+0.850+0.900+0.950+1.000+1.100+1.150)/7 = 6.750/7 = 0.9643 (rounded to 0.964).", "p": "300 p.165"}, {"n": 81, "ch": "Applied Statistics & Ratio Studies", "q": "Using the same 7 ratios, absolute deviations from median (0.950) are: 0.150, 0.100, 0.050, 0.000, 0.050, 0.150, 0.200. Average Absolute Deviation (AAD) = 0.100. COD = 100 x AAD / Median. COD is:", "o": ["10.53", "10.00", "9.50", "5.00"], "a": "A", "e": "COD = 100 x AAD / Median = 100 x 0.100 / 0.950 = 10.53. This COD of 10.53 falls within the IAAO standard of 5-15 for older heterogeneous residential property.", "p": "300 p.165"}, {"n": 82, "ch": "Applied Statistics & Ratio Studies", "q": "Weighted mean ratio is calculated as: Total Assessed Value / Total Sale Price. Given total AV = 22,000 and total SP = 55,000, the weighted mean ratio is:", "o": ["0.950", "0.961", "0.975", "0.964"], "a": "B", "e": "Weighted mean = Total AV / Total SP = 22,000 / 55,000 = 0.9614, rounded to 0.961.", "p": "300 p.165"}, {"n": 83, "ch": "Applied Statistics & Ratio Studies", "q": "The price-related differential (PRD) is calculated as: Mean Ratio / Weighted Mean Ratio = 0.964 / 0.961. PRD is:", "o": ["0.997", "1.010", "1.003", "1.020"], "a": "C", "e": "PRD = Mean / Weighted Mean = 0.964 / 0.961 = 1.003. A PRD near 1.00 indicates neither regressivity nor progressivity. IAAO standard: 0.98 to 1.03 is acceptable.", "p": "300 p.165"}, {"n": 84, "ch": "Applied Statistics & Ratio Studies", "q": "A PRD above 1.03 indicates which type of inequity in assessments?", "o": ["Horizontal inequity (between neighborhoods)", "Progressivity (high-value properties over-assessed)", "Neither - PRD has nothing to do with equity", "Regressivity (low-value properties over-assessed relative to high-value)"], "a": "D", "e": "PRD > 1.03 = regressive: low-value properties are assessed at higher ratios than high-value properties. PRD < 0.98 = progressive: high-value properties are over-assessed relative to low-value.", "p": "300 p.165"}, {"n": 85, "ch": "Applied Statistics & Ratio Studies", "q": "An assessor has a median ratio of 0.92 and a COD of 18. IAAO standards call for median between 0.90-1.10 and COD under 15 for residential. Which standard is NOT met?", "o": ["Neither standard is met", "Both standards are met", "Level of appraisal standard only", "Uniformity (COD) standard only"], "a": "D", "e": "Median of 0.92 falls within the 0.90-1.10 acceptable range (level is acceptable). COD of 18 exceeds the maximum of 15 for residential property (uniformity is unacceptable). Only the COD standard is violated.", "p": "300 p.165"}, {"n": 86, "ch": "Applied Statistics & Ratio Studies", "q": "Given 7 ratios: 0.898, 1.200, 1.080, 0.950, 1.350, 0.700, 0.851. Sorted: 0.700, 0.851, 0.898, 0.950, 1.080, 1.200, 1.350. Median = 0.950. This suggests the overall assessment level is:", "o": ["At 100% of market value - no adjustment needed", "Moderately above market value", "Significantly below market value", "At approximately 95% of market value"], "a": "D", "e": "A median ratio of 0.950 means the typical assessment is at 95% of market value - slightly below 100% but within the IAAO acceptable range of 90%-110%.", "p": "300 p.167"}]}, "311": {"title": "Real Property Modeling Concepts", "questions": [{"n": 1, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "Mass appraisal is defined as the systematic appraisal of groups of properties as of a given date using standardized procedures and:", "o": ["Individual appraiser judgment", "Comparable sales grids", "Statistical testing", "Single-property inspection techniques"], "a": "C", "e": "Mass appraisal uses standardized procedures AND statistical testing to measure accuracy and uniformity across large numbers of properties simultaneously.", "p": "311 p.13"}, {"n": 2, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "Characteristics of mass appraisal that differ from single property appraisal include the use of valuation tables, schedules, and:", "o": ["Individual written reports", "Three approaches to value", "Highest and best use analysis", "Statistical testing"], "a": "D", "e": "The distinguishing features of mass appraisal are: (1) valuation tables and schedules applied uniformly, and (2) statistical testing to verify accuracy and uniformity of results.", "p": "311 p.13"}, {"n": 3, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "Economic, social, and environmental data are termed ________ data, while off-site features and improvement data are termed ________ data:", "o": ["Market; property", "Qualitative; quantitative", "Dependent; independent", "General; specific"], "a": "A", "e": "General (market) data = economic, social, governmental, environmental forces. Specific (property) data = off-site features, on-site improvements, and physical characteristics of the individual parcel.", "p": "311 p.13"}, {"n": 4, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "The appraisal principle that states land cannot be valued on one use basis while improvements are valued on another is the principle of:", "o": ["Contribution", "Anticipation", "Highest and best use", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must always be valued under the same use assumption. You cannot value land as commercial while valuing the building as residential.", "p": "311 p.13"}, {"n": 5, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "Selecting appropriate valuation approaches and specifying the variables to be used is called:", "o": ["Model calibration", "Model testing", "Model specification", "Model validation"], "a": "C", "e": "Model specification = deciding which variables to include and how to format/code them. Calibration comes after specification and determines the rates/coefficients for those variables.", "p": "311 p.13"}, {"n": 6, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "Developing adjustment weights from measurable supply and demand factors is called:", "o": ["Model specification", "Model review", "Model testing", "Model calibration"], "a": "D", "e": "Model calibration = quantifying the coefficients/weights for each variable in the model from market data. It answers the question: how much does each feature contribute to market value?", "p": "311 p.13"}, {"n": 7, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "According to modern price theory, value in exchange is determined by the interaction of:", "o": ["Reproduction cost and depreciation", "Income and capitalization rate", "Assessed value and tax rate", "Supply and demand"], "a": "D", "e": "Modern price theory: value is determined by the interaction of supply and demand. The mass appraisal model must capture both supply-side factors (construction cost) and demand-side factors (location, amenities, condition).", "p": "311 p.13"}, {"n": 8, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "q": "The model V = b0 + b1 x SFLA + b2 x baths + b3 x GARSQFT is an example of which type of model?", "o": ["Multiplicative model", "Income model", "Hybrid model", "Additive model"], "a": "D", "e": "An additive model sums the contributions of each independent variable. Each coefficient (b1, b2, b3) represents the dollar contribution of one unit of that variable to total market value.", "p": "311 p.13"}, {"n": 9, "ch": "Ch2: Data Collection & Management", "q": "The four market forces that must be analyzed in data collection are:", "o": ["Cost, income, sales, and land", "Location, size, age, and condition", "Physical, legal, financial, and environmental", "Physical, economic, governmental, and social/demographic"], "a": "D", "e": "The four forces affecting value: Physical (topography, climate), Economic (income levels, employment), Governmental (zoning, building codes, tax rates), and Social/Demographic (population trends, education).", "p": "311 p.46"}, {"n": 10, "ch": "Ch2: Data Collection & Management", "q": "Building codes, planning, and zoning are considered which type of forces?", "o": ["Economic forces", "Physical forces", "Social forces", "Governmental forces"], "a": "D", "e": "Governmental forces include: zoning, building codes, planning regulations, special assessments, tax rates, and other public sector influences on property value.", "p": "311 p.46"}, {"n": 11, "ch": "Ch2: Data Collection & Management", "q": "The most effective yet most expensive method of gathering income and expense data is:", "o": ["Mail questionnaire", "Assessment appeals data", "Telephone survey", "Personal interview"], "a": "D", "e": "Personal interviews yield the most complete and accurate income/expense data, but they consume the most professional staff time and are most expensive to conduct.", "p": "311 p.46"}, {"n": 12, "ch": "Ch2: Data Collection & Management", "q": "Potential gross income (PGI) is based on which type of rent?", "o": ["Below-market contract rent", "Historical rent from prior leases", "Above-market asking rent", "Market rent reflecting current rents and typical management"], "a": "D", "e": "PGI is based on market rent - what the property would rent for under typical management at full occupancy - NOT the actual contract rent, which may be above or below market.", "p": "311 p.46"}, {"n": 13, "ch": "Ch2: Data Collection & Management", "q": "The income that is typically capitalized into an indication of value in mass appraisal is:", "o": ["Potential gross income", "Effective gross income", "Gross income multiplier", "Net operating income (NOI)"], "a": "D", "e": "NOI (Net Operating Income) = EGI minus operating expenses. This is the income typically capitalized in mass appraisal income models (V = I/R).", "p": "311 p.46"}, {"n": 14, "ch": "Ch2: Data Collection & Management", "q": "A gross lease requires the owner to pay all operating expenses, while a ________ lease requires the tenant to pay all operating expenses:", "o": ["Graduated lease", "Adjustable lease", "Net lease", "Percentage lease"], "a": "C", "e": "Net lease (NNN): tenant pays all operating expenses (taxes, insurance, maintenance). Gross lease: landlord pays all expenses. Triple net is the most common commercial lease structure.", "p": "311 p.46"}, {"n": 15, "ch": "Ch2: Data Collection & Management", "q": "Data that relate to features or attributes of the property (also known as discrete data) are called:", "o": ["Quantitative data", "Continuous data", "Binary data", "Qualitative data"], "a": "D", "e": "Qualitative (discrete) data = property features and attributes: style, condition grade, construction type. Quantitative (continuous) data = measurements: square footage, lot size, year built.", "p": "311 p.47"}, {"n": 16, "ch": "Ch2: Data Collection & Management", "q": "A ________ transformation converts a discrete variable to relative values or numerical ratings:", "o": ["Quotient transformation", "Multiplicative transformation", "Logarithmic transformation", "Scalar transformation"], "a": "D", "e": "Scalar transformations assign numerical ratings to ordinal/discrete categories (e.g., Poor=0.80, Average=1.00, Good=1.20, Excellent=1.40) to make qualitative data usable in regression models.", "p": "311 p.47"}, {"n": 17, "ch": "Ch2: Data Collection & Management", "q": "When property characteristics affect value interactively, which type of transformation captures the interactive effects?", "o": ["Logarithmic transformation", "Scalar transformation", "Reciprocal transformation", "Multiplicative transformation"], "a": "D", "e": "Multiplicative (and quotient) transformations capture interactive effects - where the impact of one variable on value depends on the level of another variable (e.g., quality x size interaction).", "p": "311 p.47"}, {"n": 18, "ch": "Ch2: Data Collection & Management", "q": "IAAO standards recommend routine property inspections at least every ________ years:", "o": ["2 years", "5 years", "4 years", "10 years"], "a": "B", "e": "IAAO standard recommends physical inspection of all properties at least every 4-6 years. Many jurisdictions inspect more frequently for commercial/income properties.", "p": "311 p.47"}, {"n": 19, "ch": "Ch2: Data Collection & Management", "q": "The square foot area of a residence is considered ________ data, while the condition rating is considered ________ data:", "o": ["Binary; discrete", "Discrete; continuous", "Qualitative; quantitative", "Quantitative (objective); qualitative (subjective)"], "a": "D", "e": "Square footage is objective quantitative data - measured and verifiable. Condition rating is subjective qualitative data - requires appraiser judgment and is harder to verify or standardize.", "p": "311 p.47"}, {"n": 20, "ch": "Ch2: Data Collection & Management", "q": "Binary data are qualitative items that have only two possibilities. An example would be:", "o": ["Condition rated poor/fair/average/good/excellent", "Number of bedrooms", "Square footage of living area", "Whether a property has a fireplace (yes/no)"], "a": "D", "e": "Binary data has exactly two values: yes/no, presence/absence. Examples: fireplace (yes/no), pool (yes/no), corner lot (yes/no). Binary variables are coded as 0 or 1 in regression models.", "p": "311 p.47"}, {"n": 21, "ch": "Ch2: Data Collection & Management", "q": "The division of one variable by another (e.g., square feet divided by number of rooms) is termed a:", "o": ["Logarithmic transformation", "Scalar transformation", "Multiplicative transformation", "Quotient transformation"], "a": "D", "e": "Quotient transformations divide one variable by another to create a new variable expressing a ratio - e.g., price per room, value per unit, or square feet per bedroom. Useful for normalizing size effects.", "p": "311 p.48"}, {"n": 22, "ch": "Ch3: Data Analysis & Statistics", "q": "Broad geographic areas subject to similar economic influences are called:", "o": ["Neighborhoods", "Assessment districts", "Strata", "Economic or market areas"], "a": "D", "e": "Economic/market areas are broad geographic areas sharing similar economic forces. Neighborhoods are smaller subdivisions within market areas that share location amenities.", "p": "311 p.101"}, {"n": 23, "ch": "Ch3: Data Analysis & Statistics", "q": "Groups of properties that share similar location amenities are called:", "o": ["Economic areas", "Assessment strata", "Market segments", "Neighborhoods or districts"], "a": "D", "e": "Neighborhoods (or districts) are groups of properties sharing similar location amenities - access, proximity to services, infrastructure, and quality of surroundings.", "p": "311 p.101"}, {"n": 24, "ch": "Ch3: Data Analysis & Statistics", "q": "A method of stratification that minimizes differences within groups and maximizes differences among groups is known as:", "o": ["Multiple regression analysis", "Ratio study analysis", "Response surface analysis", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar properties by minimizing within-group variance and maximizing between-group variance - an objective statistical approach to neighborhood or stratum identification.", "p": "311 p.102"}, {"n": 25, "ch": "Ch3: Data Analysis & Statistics", "q": "When data are normally distributed, approximately what percentages fall within one, two, and three standard deviations of the mean?", "o": ["50%, 75%, 95%", "68%, 95%, 99%", "75%, 90%, 99%", "60%, 80%, 95%"], "a": "B", "e": "The empirical rule for normal distributions: approximately 68% within 1 SD, 95% within 2 SD, and 99% (99.7%) within 3 SD of the mean. This is fundamental to interpreting dispersion statistics.", "p": "311 p.102"}, {"n": 26, "ch": "Ch3: Data Analysis & Statistics", "q": "Common measures of central tendency are the:", "o": ["Range, interquartile range, and standard deviation", "Mean, median, and mode", "COD, COV, and PRD", "Minimum, maximum, and midrange"], "a": "B", "e": "The three measures of central tendency: mean (arithmetic average), median (middle value), and mode (most frequent value). In mass appraisal ratio studies, the median is preferred.", "p": "311 p.102"}, {"n": 27, "ch": "Ch3: Data Analysis & Statistics", "q": "Two common measures of dispersion in market analysis are the:", "o": ["Mean and median", "Maximum and minimum", "Standard deviation and coefficient of variation", "COD and PRD"], "a": "C", "e": "Standard deviation measures absolute spread around the mean; coefficient of variation (COV = SD/Mean x 100) expresses spread as a percentage for comparability across different datasets.", "p": "311 p.102"}, {"n": 28, "ch": "Ch3: Data Analysis & Statistics", "q": "Crosstabulation analysis shows the relationship between:", "o": ["Sale price and assessed value", "An independent and dependent variable", "Two quantitative continuous variables", "Two qualitative variables or grouped quantitative variables"], "a": "D", "e": "Crosstabulations/contingency tables display the distribution of values across categories of two qualitative or discrete variables - e.g., construction type by neighborhood.", "p": "311 p.102"}, {"n": 29, "ch": "Ch3: Data Analysis & Statistics", "q": "Correlation analysis quantifies the degree of what type of relationship between two variables?", "o": ["Non-linear relationship", "Exponential relationship", "Logarithmic relationship", "Linear relationship"], "a": "D", "e": "Correlation analysis measures the degree of LINEAR relationship between two variables. The correlation coefficient (r) ranges from -1.0 (perfect negative) to +1.0 (perfect positive).", "p": "311 p.103"}, {"n": 30, "ch": "Ch3: Data Analysis & Statistics", "q": "In testing variables, a parametric test assumes data are normally distributed, while a ________ test requires no assumption about the data distribution:", "o": ["Null hypothesis test", "Alpha test", "Confidence interval test", "Non-parametric test"], "a": "D", "e": "Non-parametric tests (Mann-Whitney, Kruskal-Wallis) make no distributional assumptions. Parametric tests (t-test, ANOVA) assume normal distribution. When sales data is skewed, non-parametric tests are preferred.", "p": "311 p.103"}, {"n": 31, "ch": "Ch3: Data Analysis & Statistics", "q": "Confidence intervals are valuable to assessors because they provide meaningful information about:", "o": ["The legal standard of assessment", "The probable range of the true measures of central tendency", "The tax revenue generated by the assessment roll", "The correlation between variables in the model"], "a": "B", "e": "Confidence intervals tell the assessor the probable range within which the true population parameter (e.g., median ratio) falls, given the sample data - essential for evaluating whether assessment goals are met.", "p": "311 p.103"}, {"n": 32, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "Three uses for ratio studies are:", "o": ["Determine replacement cost, depreciation, and income", "Calculate the mean, median, and COD", "Cost approach, sales comparison, and income approach", "Monitor appraisal level, determine reappraisal priorities, and develop market adjustment factors"], "a": "D", "e": "Five ratio study uses: (1) Monitor performance (level and uniformity), (2) Determine reappraisal priorities, (3) Develop market adjustment factors, (4) Planning/budgeting, (5) Adjust values between reappraisals.", "p": "311 p.129"}, {"n": 33, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The preferred measure of assessment level in most ratio studies is the:", "o": ["Mean ratio", "Weighted mean ratio", "Price-related differential", "Median ratio"], "a": "D", "e": "The median is preferred for measuring assessment level because it is not affected by extreme outliers. The mean can be distorted by a few very high or low ratios, making the median more representative.", "p": "311 p.129"}, {"n": 34, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "Which measure of central tendency weights each ratio in proportion to its sale price?", "o": ["Median", "Mean", "Mode", "Weighted mean"], "a": "D", "e": "The weighted mean ratio = total assessed value / total sale price. It weights high-value properties more heavily. If weighted mean differs significantly from the mean, it may signal vertical inequity.", "p": "311 p.129"}, {"n": 35, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The most widely used measure of uniformity in ratio studies is the:", "o": ["Standard deviation", "Price-related differential (PRD)", "Coefficient of variation (COV)", "Coefficient of dispersion (COD)"], "a": "D", "e": "The COD is the IAAO standard measure of assessment uniformity: COD = 100 x (Average Absolute Deviation from Median) / Median. Lower = more uniform. The median-based COD is robust against outliers.", "p": "311 p.129"}, {"n": 36, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The IAAO COD standard for residential property in newer, homogeneous areas is between __ and __, and in older, heterogeneous areas between __ and __:", "o": ["1-5 and 5-10", "10-15 and 15-20", "5-10 and 5-15", "1-5 and 10-15"], "a": "C", "e": "IAAO COD standards: newer homogeneous residential = 5.0-10.0; older heterogeneous residential = 5.0-15.0. Rural/seasonal and income-producing = 5.0-20.0.", "p": "311 p.129"}, {"n": 37, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The coefficient of variation (COV) expresses the standard deviation as a percentage, making comparisons among groups easier. Its predictive power depends on the extent the data is:", "o": ["Positively correlated", "Randomly distributed", "Normally distributed", "Negatively correlated"], "a": "C", "e": "COV = (SD / Mean) x 100. Its interpretation as a measure of spread depends on the assumption of normality - if the data is skewed, the COV is less meaningful than the COD.", "p": "311 p.130"}, {"n": 38, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "A scatter diagram of sales ratio vs. effective age showing a downward sloping trend indicates a ________ correlation reflecting ________ ratios in older residences:", "o": ["Positive; higher", "Zero; equal", "Positive; lower", "Negative; lower"], "a": "D", "e": "A downward (negative) slope means as effective age increases, ratios decrease - older properties are under-assessed relative to newer ones. This is a vertical/regression equity issue.", "p": "311 p.130"}, {"n": 39, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The PRD is calculated by dividing the ________ by the ________:", "o": ["Median; mean", "COD; COV", "Mean; weighted mean", "Weighted mean; mean"], "a": "C", "e": "PRD = Mean Ratio / Weighted Mean Ratio. If the mean exceeds the weighted mean (PRD > 1.0), lower-value properties have higher ratios than high-value properties (regressive pattern).", "p": "311 p.130"}, {"n": 40, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "PRDs greater than 1.03 indicate relative ________ appraisal of higher-value parcels, while PRDs less than 0.98 indicate relative ________ appraisal of higher-value parcels:", "o": ["Under; over", "Equal; unequal", "Over; under", "Progressive; regressive"], "a": "A", "e": "PRD > 1.03: higher-value parcels are relatively UNDER-assessed (regressive). PRD < 0.98: higher-value parcels are relatively OVER-assessed (progressive). IAAO acceptable range: 0.98-1.03.", "p": "311 p.130"}, {"n": 41, "ch": "Ch4: Ratio Studies & Performance Standards", "q": "The PRD relates to equality between which two groups?", "o": ["Urban and rural properties", "Owner-occupied and rental properties", "Residential and commercial properties", "Lower and higher value parcels"], "a": "D", "e": "PRD measures VERTICAL equity - whether high-value and low-value properties are assessed at similar ratios. Horizontal equity refers to equity between similar properties (measured by COD within groups).", "p": "311 p.130"}, {"n": 42, "ch": "Ch5: Cost Approach Modeling", "q": "In the cost approach model, construction costs represent the ________ side of the market, while depreciation represents the ________ side:", "o": ["Demand; supply", "Neither; both", "Supply; supply", "Supply; demand"], "a": "D", "e": "Construction costs = supply side (what it costs to produce the improvement). Depreciation = demand side (what buyers are willing to pay relative to cost; reflects market acceptance of the property at its age/condition).", "p": "311 p.151"}, {"n": 43, "ch": "Ch5: Cost Approach Modeling", "q": "The first step in specifying cost models is to:", "o": ["Calibrate the depreciation schedule", "Determine entrepreneurial profit", "Stratify improvements into homogeneous groups", "Calculate replacement cost new"], "a": "C", "e": "Stratification into homogeneous groups is always the first step - residential by class/type, commercial by use type and size. Each stratum will have its own cost table and depreciation schedule.", "p": "311 p.151"}, {"n": 44, "ch": "Ch5: Cost Approach Modeling", "q": "In the cost approach model V = GQ x [LV + (RCN - D)], GQ represents the general:", "o": ["Grade quality factor", "Quality adjustment for the improvements", "Geographical quantity", "Qualitative (neighborhood/location) factors"], "a": "D", "e": "GQ = General Qualitative factors - multiplicative neighborhood/location adjustments applied to the entire property value. GQ centered on 1.00 for average neighborhoods; above 1.00 for superior, below for inferior.", "p": "311 p.152"}, {"n": 45, "ch": "Ch5: Cost Approach Modeling", "q": "For commercial properties, construction costs are usually divided between:", "o": ["Land costs and improvement costs", "Direct and indirect costs", "Market and assessed costs", "Interior and exterior costs"], "a": "B", "e": "Commercial cost models divide costs into direct costs (materials, labor, supervision) and indirect costs (architectural fees, permits, financing, insurance during construction).", "p": "311 p.152"}, {"n": 46, "ch": "Ch5: Cost Approach Modeling", "q": "Formula-driven cost models are equations that express additive adjustments as:", "o": ["Scalar multipliers", "Percentage adjustments", "Depreciation schedules", "Percentages of the base rate"], "a": "D", "e": "Formula-driven cost models express each feature adjustment as a percentage of the base rate per square foot. This allows a single formula to accommodate a wide range of building specifications.", "p": "311 p.152"}, {"n": 47, "ch": "Ch5: Cost Approach Modeling", "q": "In developing building depreciation schedules, percent good or accrued depreciation is plotted against:", "o": ["Sale price", "Replacement cost new", "Capitalization rate", "Effective age"], "a": "D", "e": "Depreciation schedules plot percent good (or accrued depreciation) against effective age - not chronological age. Effective age reflects actual condition and maintenance relative to typical properties of the same age.", "p": "311 p.153"}, {"n": 48, "ch": "Ch5: Cost Approach Modeling", "q": "Three types of sales that should be EXCLUDED when deriving depreciation schedules from the market include:", "o": ["All arm-length sales", "Average condition properties", "Properties within 5 years of construction", "Non-arm-length sales, properties with extreme land-to-building ratios, and mixed-use parcels"], "a": "D", "e": "Exclusions for depreciation analysis: non-arms-length sales, properties with extreme land/building ratios (distort depreciation extraction), mixed-use parcels, and properties with additional buildings.", "p": "311 p.153"}, {"n": 49, "ch": "Ch5: Cost Approach Modeling", "q": "Market calibration of cost models is best accomplished by using:", "o": ["Published cost indices only", "Appraiser judgment only", "Ratio studies or multiple regression analysis", "Assessment appeals data"], "a": "C", "e": "Cost model calibration uses: (1) ratio studies stratified by construction class, size groups, and age groups to identify systematic biases, or (2) multiple regression with cost components as variables.", "p": "311 p.153"}, {"n": 50, "ch": "Ch5: Cost Approach Modeling", "q": "For commercial properties, stratification in cost models is usually based on:", "o": ["Location and zoning", "Owner and tenant type", "Construction class and number of stories", "Age and condition"], "a": "C", "e": "Commercial cost model stratification: primarily by construction/use type (office, retail, industrial, warehouse) and number of stories (single vs. multi-story affects per-sq-ft cost significantly).", "p": "311 p.153"}, {"n": 51, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "In mass appraisal, the sales comparison approach uses which three model formats to arrive at value estimates?", "o": ["Manual, automated, and hybrid", "Residential, commercial, and agricultural", "Direct, indirect, and combination", "Additive, multiplicative, and hybrid"], "a": "D", "e": "The three model structures for mass appraisal sales comparison: (1) Additive MRA (linear), (2) Multiplicative (log-linear) MRA, and (3) Hybrid/generic model combining both.", "p": "311 p.219"}, {"n": 52, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "Multiple regression analysis (MRA) is a statistical technique for:", "o": ["Calculating the COD and PRD", "Ranking properties by value", "Estimating unknown data based on known and available data", "Plotting frequency distributions"], "a": "C", "e": "MRA estimates the value of a dependent variable (sale price) from multiple independent variables (property characteristics) using the principle of least squares - minimizing the sum of squared errors.", "p": "311 p.219"}, {"n": 53, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "In regression statistics, the t-value is the ratio of a regression coefficient to its standard error. A higher t-value indicates:", "o": ["Lower model accuracy", "More significant variable", "Larger coefficient value", "Higher correlation with other variables"], "a": "B", "e": "t-value = coefficient / standard error. Higher t-values indicate more statistically significant variables - they contribute meaningfully to explaining value variation. Typically, t-values above 2.0 are considered significant.", "p": "311 p.219"}, {"n": 54, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "In an additive MRA model, b0 represents the ________ and X1, X2...XP represent the ________:", "o": ["Dependent variable; independent variables", "Intercept (base value); property characteristics (independent variables)", "Sale price; adjustment amounts", "COD; COV"], "a": "B", "e": "b0 = the intercept or base value constant (value when all X variables = 0). X1, X2...XP = the independent variables (property characteristics). b1, b2...bP = the coefficients (dollar values per unit of each X).", "p": "311 p.219"}, {"n": 55, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "The regression statistic R-square represents:", "o": ["The ratio of assessed value to sale price", "The standard deviation divided by the mean", "The coefficient divided by its standard error", "The percentage of variation in sale price explained by the model"], "a": "D", "e": "R-square (coefficient of determination) = percentage of the total variation in sale prices explained by the model. R-square of 0.90 means the model explains 90% of value variation; 10% is unexplained.", "p": "311 p.219"}, {"n": 56, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "In regression statistics, the standard deviation of the regression error is termed the:", "o": ["Coefficient of variation", "R-square", "Adjusted R-square", "Standard error of estimate (SEE)"], "a": "D", "e": "SEE (Standard Error of Estimate) = standard deviation of the residuals (differences between actual and predicted sale prices). Approximately 68% of sale prices fall within +/- 1 SEE of the predicted value.", "p": "311 p.219"}, {"n": 57, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "Multiplicative models are calibrated with ________, whereas hybrid/generic models are calibrated with ________:", "o": ["Additive MRA; log-linear MRA", "Manual methods; automated methods", "Log-linear MRA; additive MRA", "Neither; both use the same method"], "a": "C", "e": "Multiplicative models use log-linear (logistic) MRA - both sale prices and variables are converted to logarithms before calibration. Hybrid models use standard additive MRA for the linear components.", "p": "311 p.220"}, {"n": 58, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "The adjusted R-square adjusts for degrees of freedom, providing an unbiased estimate of:", "o": ["The COD in the ratio study", "The PRD for vertical equity", "Model accuracy in the population (not just the sample)", "The standard error of each coefficient"], "a": "C", "e": "Adjusted R-square corrects for the fact that R-square always increases when variables are added, even meaningless ones. Adjusted R-square only increases if a new variable genuinely improves the model.", "p": "311 p.220"}, {"n": 59, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "Four requirements for effective MRA mass appraisal models are:", "o": ["Median, mode, mean, and range", "Cost, income, sales, and land data", "Tax bills, deeds, permits, and appeals", "Accurate data, adequate sales, good model building skills, and variables capturing location influences"], "a": "D", "e": "Effective MRA requires: (1) accurate property characteristics data, (2) adequate number of arm-length sales, (3) skilled model specification and calibration, and (4) variables that capture important location and market influences.", "p": "311 p.221"}, {"n": 60, "ch": "Ch6: Sales Comparison Approach - MRA", "q": "In multiple regression analysis, residuals represent:", "o": ["The regression coefficients", "The correlation between variables", "The R-square value", "Differences between actual and predicted sale prices"], "a": "D", "e": "Residuals = actual sale price minus predicted sale price. Analyzing residuals reveals model weaknesses - patterns in residuals indicate systematic errors (e.g., all large homes over-predicted, indicating a non-linear size effect).", "p": "311 p.219"}, {"n": 61, "ch": "Ch7: Income Approach Modeling", "q": "When estimating market rents in mass appraisal, either ________ or ________ gross income is used:", "o": ["Potential; effective", "Historical; current", "Lease; contract", "Net; gross"], "a": "A", "e": "Market rent estimates use either: Potential Gross Income (PGI - at 100% occupancy) or Effective Gross Income (EGI = PGI minus vacancy). EGI is the income most often capitalized.", "p": "311 p.261"}, {"n": 62, "ch": "Ch7: Income Approach Modeling", "q": "The GIM formula is:", "o": ["GIM = NOI divided by Sale Price", "GIM = Sale Price divided by Effective Gross Income", "GIM = Cap Rate divided by NOI", "GIM = Expenses divided by Income"], "a": "B", "e": "GIM = Sale Price / Gross Income. Applied as: MV = GI x GIM. Simple to apply but less precise than NOI capitalization because it does not explicitly account for expenses.", "p": "311 p.261"}, {"n": 63, "ch": "Ch7: Income Approach Modeling", "q": "The OAR formula is:", "o": ["OAR = Sale Price divided by NOI", "OAR = GIM multiplied by EGI", "OAR = NOI divided by Sale Price", "OAR = Expenses divided by Sale Price"], "a": "C", "e": "OAR = NOI / Sale Price. Applied as: V = NOI / OAR. The overall rate (cap rate) is derived from the market by dividing the NOI of comparable sales by their sale prices.", "p": "311 p.261"}, {"n": 64, "ch": "Ch7: Income Approach Modeling", "q": "Potential gross income minus vacancy and collection losses equals:", "o": ["Net operating income", "Potential net income", "Gross income multiplier", "Effective gross income"], "a": "D", "e": "EGI = PGI minus Vacancy and Collection Losses. EGI represents the income actually collected - it accounts for the reality that not all potential income is received.", "p": "311 p.261"}, {"n": 65, "ch": "Ch7: Income Approach Modeling", "q": "The dependent variable in the gross income model is:", "o": ["Overall capitalization rate", "Gross income multiplier", "Sale price", "Gross income per unit"], "a": "D", "e": "In gross income models, the dependent variable is gross income per unit (per sq ft, per room, per apartment unit). Property characteristics that drive rent differences are the independent variables.", "p": "311 p.261"}, {"n": 66, "ch": "Ch7: Income Approach Modeling", "q": "The dependent variable in the GIM model is:", "o": ["Sale price", "Gross income", "Capitalization rate", "The GIM itself"], "a": "D", "e": "In GIM models, the GIM itself is the dependent variable being predicted from property characteristics. A regression model predicts what GIM is appropriate for a property given its type, location, age, etc.", "p": "311 p.262"}, {"n": 67, "ch": "Ch7: Income Approach Modeling", "q": "The dependent variable in the OAR (overall capitalization rate) model is:", "o": ["Sale price", "Gross income", "NOI divided by sale price (the OAR itself)", "Net operating income"], "a": "C", "e": "In OAR models, the overall rate (NOI/Sale Price) is the dependent variable. The model predicts the appropriate cap rate for a property based on its characterist
