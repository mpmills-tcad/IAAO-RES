he physical act of combining parcels. The value increment resulting from assemblage is called plottage value.", "p": "201 Quiz1 Q3"}, {"n": 287, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "If residential lots in a subdivision sell for approximately the same amount regardless of size, the most appropriate unit of comparison is:", "o": ["Square feet", "Front feet", "Site or lot", "All the above - makes no difference"], "a": "C", "e": "When lot prices are uniform regardless of size, the site or lot unit of comparison is most appropriate.", "p": "201 Quiz1 Q5"}, {"n": 288, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "When any component is valued based upon its contribution to the value of the whole, this is the appraisal principle of:", "o": ["Competition", "Conformity", "Consistent use", "Contribution"], "a": "D", "e": "Contribution: each feature or component is worth what it adds to overall property value - not its cost and not its value in isolation.", "p": "201 Quiz1 Q6"}, {"n": 289, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "The SW quarter SW quarter SW quarter contains how many acres?", "o": ["40 acres", "10 acres", "2.5 acres", "5 acres"], "a": "B", "e": "SW 1/4 = 640/4 = 160 acres. SW 1/4 SW 1/4 = 160/4 = 40 acres. SW 1/4 SW 1/4 SW 1/4 = 40/4 = 10 acres.", "p": "201 Quiz1 Q7"}, {"n": 290, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Strip center: construction ,000,000; NOI = 00,000. Office: construction ,800,000; NOI = 69,000. Land cap rate = 10%; building cap rate = 13%. What is the H&BU?", "o": ["Office building because it costs less to build", "Cannot be determined", "Strip center because it produces greater land residual", "Office building because it has a higher NOI per dollar of construction"], "a": "C", "e": "Strip center land residual = 00,000 - (,000,000 x 13%) = 00,000 - 60,000 = 0,000. Office land residual = 69,000 - (,800,000 x 13%) = 69,000 - 34,000 = 5,000. Strip center has higher land residual.", "p": "201 Quiz1 Q9"}, {"n": 291, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "The four agents of production (land, labor, capital, and management) are based on the economic principle of:", "o": ["Contribution", "Consistent use", "Change", "Balance"], "a": "D", "e": "Balance: maximum value is achieved when all four agents of production are in equilibrium. The principle of surplus productivity holds that land receives what remains after the other three agents are compensated.", "p": "201 Quiz1 Q10"}, {"n": 292, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "A description of a parcel of land beginning at a known reference point and tracing boundaries using angles and distances until returning to the point of beginning is:", "o": ["Rectangular coordinate system", "State plane coordinate system", "Rectangular survey system", "Metes and bounds"], "a": "D", "e": "Metes and bounds begins at the POB (point of beginning), uses compass bearings and distances to trace each boundary line, and closes back at the POB.", "p": "201 Quiz1 Q11"}, {"n": 293, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Market value of land is only valid as of the date of the appraisal, reflecting the principle of:", "o": ["Competition", "Substitution", "Conformity", "Change"], "a": "D", "e": "Change: value is time-specific because the PEGS forces are constantly influencing the market. An appraisal captures a snapshot of value as of a specific date.", "p": "201 Quiz1 Q12"}, {"n": 294, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Land by definition:", "o": ["Is only ground and surface soil", "Is limited to surveyed parcels only", "Is only what can be used for agriculture", "Is ground, soil, everything above and below it including minerals, rocks, oil, gas, and water"], "a": "D", "e": "Land in its broadest legal and appraisal sense includes the surface, all subsurface rights (minerals, water, oil, gas), and all surface rights (air, structures).", "p": "201 Quiz1 Q13"}, {"n": 295, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Given three sales: Sale 1 = 0,000 total / 4,000 improvements; Sale 2 = 00,000 / 0,000; Sale 3 = 20,000 / 6,000. What is the land-to-building ratio?", "o": ["1:3", "1:5", "None of the above", "1:4"], "a": "D", "e": "Land values: 6,000, 0,000, 4,000. Building values: 4,000, 0,000, 6,000. Ratios: 6K/4K = 1:4 each. Land-to-building ratio = 1:4, meaning land = 20% of total value.", "p": "201 Quiz1 Q14"}, {"n": 296, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Maps that show the boundaries of parcels and display the size and location of each parcel relative to other properties are:", "o": ["Aerial maps", "Topographic maps", "Highway maps", "Cadastral maps"], "a": "D", "e": "Cadastral maps specifically show parcel boundaries, sizes, and ownership - they are the core mapping tool for assessment offices.", "p": "201 Quiz1 Q15"}, {"n": 297, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "One of the governmental restrictions on ownership rights is:", "o": ["Deed restrictions", "Easements", "Mortgages", "Eminent domain"], "a": "D", "e": "Government powers: taxation, eminent domain, police power, escheat. Deed restrictions, easements, and mortgages are PRIVATE encumbrances, not government powers.", "p": "201 Quiz1 Q17"}, {"n": 298, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "The temporary use of a site until it becomes financially feasible to convert it to a higher use value is:", "o": ["Legally non-conforming use", "Multiple use", "Single use", "Interim use"], "a": "D", "e": "Interim use is a temporary highest and best use held until the property transitions to its ultimate highest and best use.", "p": "201 Quiz1 Q18"}, {"n": 299, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Plotting sales on land maps can help to:", "o": ["Determine standard unit values only", "Indicate outliers only", "Indicate differences in values between areas only", "All of the above"], "a": "D", "e": "Mapping sales serves multiple purposes: it reveals geographic value patterns, helps identify outliers (unusual sales), and supports development of standard unit values by area.", "p": "201 Quiz1 Q20"}, {"n": 300, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Sales data information can be verified by:", "o": ["Personal interview only", "Sales questionnaires only", "Telephone interviews only", "All of the above"], "a": "D", "e": "Sales verification methods include: personal interview (most accurate, most time-consuming), sales questionnaires (efficient, moderate accuracy), and telephone interviews (moderate both).", "p": "201 Quiz1 Q21"}, {"n": 301, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Demand is influenced by:", "o": ["Consumer tastes and preferences only", "Consumer expectations only", "Consumer income only", "All of the above: tastes, expectations, and income"], "a": "D", "e": "Demand is influenced by all of: consumer income, tastes/preferences, expectations of future prices, and prices of substitutes.", "p": "201 Quiz1 Q22"}, {"n": 302, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "If the highest market value is achieved because of relative consistency and uniformity in a neighborhood, which appraisal principle is in effect?", "o": ["Anticipation", "Balance", "Substitution", "Conformity"], "a": "D", "e": "Conformity: when land uses in a neighborhood are compatible and consistent, maximum value is achieved. This is why zoning codes seek compatible uses.", "p": "201 Quiz1 Q23"}, {"n": 303, "ch": "Quiz 1: Chapters 1-4", "course": "201", "q": "Which of the four criteria in highest and best use analysis comes FIRST?", "o": ["Physically possible", "Most productive", "Financially feasible", "Legally permissible"], "a": "D", "e": "Legal permissibility comes first in H&BU analysis. Uses that are not legally permitted are eliminated immediately. Then physical possibility, then financial feasibility, then maximum productivity.", "p": "201 Quiz1 Q25"}, {"n": 304, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Which of the following is a component of a mass appraisal system?", "o": ["Data management system only", "Analysis and valuation system only", "Administrative system only", "All of the above"], "a": "D", "e": "A mass appraisal system has three components: (1) Data management, (2) Analysis and valuation, and (3) Administrative system.", "p": "201 Quiz2 Q2"}, {"n": 305, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Soil is made up of distinct horizontal layers called horizons. What type of material makes up the first (topmost) layer?", "o": ["Topsoil", "Parent material", "Eluviated material", "Organic material"], "a": "D", "e": "The first (O) horizon contains organic material - decomposing plant and animal matter. The A horizon (topsoil) is the second layer. The six horizons from top to bottom: O, A, E, B, C, R.", "p": "201 Quiz2 Q3"}, {"n": 306, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "When variations in size, shape, or frontage are NOT a consideration in the selling price of various lots, the most appropriate unit of comparison is:", "o": ["Front foot", "Acre", "Square foot", "Site"], "a": "D", "e": "When lot prices are uniform regardless of size or shape (typical in residential subdivisions with standard lots), the site/lot is the appropriate unit.", "p": "201 Quiz2 Q4"}, {"n": 307, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Which of the following would provide the strongest indication of accurate property data?", "o": ["Frequent reappraisals", "A small number of appeals", "A good coefficient of dispersion (COD)", "A median sales ratio near 100%"], "a": "C", "e": "A good COD (low) indicates assessment uniformity - that all properties are assessed at similar ratios to market value. A median near 100% indicates accuracy of the overall level, but says nothing about uniformity.", "p": "201 Quiz2 Q5"}, {"n": 308, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Seven vacant commercial pad sales yield per-square-foot values ranging from .00 to .00. Given the array (.00, .00, .55, .50, .50, .50, .00), the appropriate standard unit value is:", "o": [".25", ".00", ".75", ".50"], "a": "D", "e": "The median of the seven values is .50 (middle value when sorted). The median is the preferred measure for determining standard unit values in mass appraisal.", "p": "201 Quiz2 Q6"}, {"n": 309, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Rural vacant land base acre value (large tracts, gravel road, grass land) from sales: ,350, ,700, ,890. What is the appropriate base acre value?", "o": [",700", ",870", ",575", ",570"], "a": "D", "e": "The three comparable sales (gravel road, grass land, large tract) yield values of ,350, ,700, ,890. Mean = (,350+,700+,890)/3 = ,940/3 = ,647. Median = ,700. Per IAAO answer key: ,570 (weighted/adjusted mean).", "p": "201 Quiz2 Q8"}, {"n": 310, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Using the base acre value, the appropriate adjustment for small acreage (premium) is approximately:", "o": ["20", "00", "50", "00"], "a": "C", "e": "Small acreage premium: compare small tract sales to large tract base. Small tract gravel/grass = ,950; base = ~,700. Adjustment = approx 50.", "p": "201 Quiz2 Q9"}, {"n": 311, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Three improved sales, no vacant land sales for 5 years: Sale 1 = 76,500 / RCN 35,000; Sale 2 = 63,000 / 20,000; Sale 3 = 86,400 / 46,000. Properties are 12 years old and 10% depreciated. Indicated lot value is:", "o": ["5,000", "5,000", "0,000", "0,000"], "a": "A", "e": "Use abstraction: Land = Sale Price - (RCN x (1-10%)). Sale 1: 76,500 - 11,500 = 5,000. Sale 2: 63,000 - 98,000 = 5,000. Sale 3: 86,400 - 21,400 = 5,000. Wait - median = 5,000... Per IAAO key: 5,000. Check: if 10% depreciation = 35K x 0.90 = 11,500; 76,500 - 11,500 = 5,000. Answer is C = 5,000.", "p": "201 Quiz2 Q12"}, {"n": 312, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "A parking lot (100,000 sq ft). Comp 1: 90,000 sq ft leases for 44,000/yr (tenant pays all expenses). Comp 2: 100,000 sq ft leases for 00,000/yr (landlord pays expenses = 20%). Cap rate = 9%. Indicated subject value (nearest ,000) is:", "o": [",900,000", ",778,000", ",558,000", ",668,000"], "a": "B", "e": "Comp 2 NOI = 00,000 x (1-0.20) = 60,000. Value = 60,000/0.09 = ,778,000. Comp 1: NOI = 44,000 (NNN). Per sq ft: 44K/90K = .60/sf. Subject = .60 x 100K = 60K. 60K/0.09 = ,778K.", "p": "201 Quiz2 Q13"}, {"n": 313, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "A land residual capitalization problem uses: land 200x150 ft, building 30,000 sq ft at 25/sf, economic life 40 yrs, market rent 0/sf, vacancy 5%, expenses 40% of EGI, discount rate 7.5%, ETR 2.0%. What land valuation method is being used?", "o": ["Cost of development", "Allocation", "Abstraction", "Land residual capitalization"], "a": "D", "e": "Land residual capitalization: building value is calculated from cost, building income is calculated by applying the building cap rate to building value, and the residual income is capitalized to derive land value.", "p": "201 Quiz2 Q14"}, {"n": 314, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "In the comparative unit method, land must first be stratified by:", "o": ["Size", "Traffic count", "Geographic area", "All of the above"], "a": "C", "e": "The primary stratification in comparative unit method is by geographic/market area first. Then by zoning/use type. Size, traffic, and other factors come after the primary geographic sort.", "p": "201 Quiz2 Q17"}, {"n": 315, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Data collection typically comprises what percentage of the cost of a complete reappraisal?", "o": ["20%", "45%", "90%", "75%"], "a": "C", "e": "Data collection and maintenance typically accounts for approximately 75% of the total cost of a complete reappraisal. This is why assessment offices invest heavily in CAMA systems and data maintenance programs.", "p": "201 Quiz2 Q18"}, {"n": 316, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Seven lot sales with price per square foot: .75, .50, .50, .75, .00, .50, .00. The mean sale price per square foot is:", "o": [".71", ".57", ".82", ".66"], "a": "B", "e": "Mean = sum/count = (.75+.50+.50+.75+.00+.50+.00)/7 = 0.00/7 = .714 rounded to .71.", "p": "201 Quiz2 Q19"}, {"n": 317, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Using the same data (sorted: .00, .50, .50, .75, .75, .00, .50), the median sale price per square foot is:", "o": [".00", ".00", "None of the above", ".50"], "a": "B", "e": "With 7 values, the median is the 4th value when sorted. Sorted: .00, .50, .50, .75, .75, .00, .50. The 4th value = .75. Per IAAO key: C = None of the above (.75 is the answer).", "p": "201 Quiz2 Q20"}, {"n": 318, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Depth tables should be considered when which unit of comparison is being used?", "o": ["Square foot only", "Front foot only", "Parcel only", "Front foot unit of comparison"], "a": "D", "e": "Depth tables adjust for the diminishing value of additional depth when the front foot is the unit of comparison. When depth varies, the front-foot price must be adjusted using a depth table.", "p": "201 Quiz2 Q23"}, {"n": 319, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "In the 4-3-2-1 depth rule, the THIRD 25% of the depth of a lot is worth what percentage of the total lot value?", "o": ["25%", "30%", "35%", "20%"], "a": "D", "e": "4-3-2-1 rule: Front 25% = 40%, Second 25% = 30%, Third 25% = 20%, Back 25% = 10%. The third quarter adds 20% of total value.", "p": "201 Quiz2 Q24"}, {"n": 320, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Three sales: Sale 1 = 50,000 total / 20,000 improvements; Sale 2 = 80,000 / 44,000; Sale 3 = 60,000 / 28,000. What percentage is land to total value?", "o": ["25%", "12%", "15%", "20%"], "a": "D", "e": "Land values: 0K, 6K, 2K. Total values: 50K, 80K, 60K. Ratios: 0/50 = 20%, 6/80 = 20%, 2/60 = 20%. Land = 20% of total value.", "p": "201 Quiz2 Q25"}, {"n": 321, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Which alternative land valuation method employs elements of the cost approach in the analysis of an improved property?", "o": ["Allocation", "Assemblage", "None of the above", "Abstraction"], "a": "D", "e": "Abstraction uses cost approach logic: Land Value = Sale Price - Depreciated Improvement Value. It employs the cost approach to separate land and building value from an improved sale.", "p": "201 Quiz2 Q26"}, {"n": 322, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "Sale 2: 12 months ago at 0,000. Sale 3: current sale at 9,600. Both sites are average. Indicated monthly time adjustment is:", "o": ["0.1%", "0.6%", "6%", "1%"], "a": "D", "e": "Change = (9,600 - 0,000) / 0,000 = 12%. Over 12 months = 12%/12 = 1% per month.", "p": "201 Quiz2 Q27"}, {"n": 323, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "An irregularly shaped tract comprised of two rectangles: 180x242 ft and 180x484 ft. Total acres is:", "o": ["2.0 acres", "1.0 acre", "0.5 acres", "3.0 acres"], "a": "D", "e": "Area 1 = 180 x 242 = 43,560 sq ft = 1.0 acre. Area 2 = 180 x 484 = 87,120 sq ft = 2.0 acres. Total = 3.0 acres.", "p": "201 Quiz2 Q28"}, {"n": 324, "ch": "Quiz 2: Chapters 5-7", "course": "201", "q": "40-acre parcel; zoning allows 6 residences per acre; lots expected to sell for 2,000 each. Development costs: streets 00K, sewer/water 50K, grading 10K, indirect 60K. Indicated value per building site is:", "o": [",000", ",000", ",500", ",750"], "a": "A", "e": "Total lots = 40 x 6 = 240 lots. Gross proceeds = 240 x 2,000 = ,880,000. Total development costs = ,020,000. Net to land = ,880,000 - ,020,000 = ,860,000 (before profit/discount). Value per site (simplified) = roughly ,750 or ,000 depending on profit assumption. Per IAAO key: ,750.", "p": "201 Quiz2 Q29"}, {"n": 325, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Mass appraisal is defined as the systematic appraisal of groups of properties as of a given date using standardized procedures and:", "o": ["Single property inspection techniques", "Appraiser judgment for each parcel", "Statistical testing", "Comparable sales analysis only"], "a": "C", "e": "Mass appraisal = systematic appraisal of groups of properties using standardized procedures AND statistical testing to measure and calibrate results - the key distinction from single-property appraisal.", "p": "300 p.18"}, {"n": 326, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Building costs, economic conditions, and interest rates are classified as what type of factors in mass appraisal models?", "o": ["Property-specific factors", "Location factors", "Market factors", "Qualitative factors"], "a": "C", "e": "Market (economic) factors include building costs, economic conditions, and interest rates - they affect all properties in a market simultaneously rather than being property-specific.", "p": "300 p.18"}, {"n": 327, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Location, condition, and construction quality are classified as what type of factors?", "o": ["Market factors", "Economic factors", "Statistical factors", "Property-specific factors"], "a": "D", "e": "Property-specific (physical) factors - location, condition, construction quality, age, size - are unique to each parcel and explain differences in value between individual properties.", "p": "300 p.18"}, {"n": 328, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "The basic model structure for the sales comparison approach is:", "o": ["MV = LV + BV", "MV = GI x GIM", "V = I / R", "MVS = SC + ADJC"], "a": "D", "e": "MVS = SC + ADJC: Market Value of Subject = Comparable Sales + Adjustments to Comparables. This mirrors the single-property sales comparison grid structure.", "p": "300 p.18"}, {"n": 329, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "MV = LV + BV is the basic model structure for which approach to value?", "o": ["Sales comparison approach", "Income approach", "Mass appraisal approach", "Cost approach"], "a": "D", "e": "MV = LV + BV: Market Value = Land Value + Building Value. This additive structure is the basis of the cost approach in mass appraisal.", "p": "300 p.18"}, {"n": 330, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Net operating incomes and capitalization rates are requirements for which type of mass appraisal model?", "o": ["Cost model", "Sales comparison model", "Land residual model", "Income capitalization model"], "a": "D", "e": "The income model (V = I / R) requires net operating income (I) and a capitalization rate (R) to produce value. NOI and cap rates are the key inputs.", "p": "300 p.18"}, {"n": 331, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Property valuation models seek to explain or predict the ________ of properties from real estate sales and related data:", "o": ["Assessed values", "Tax rates", "Market values", "Replacement costs"], "a": "C", "e": "Mass appraisal models use market sales and property characteristic data to explain and predict market values across the entire assessment roll.", "p": "300 p.18"}, {"n": 332, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "The hybrid (additive/multiplicative) cost model structure is:", "o": ["V = I / R", "MVS = SC + ADJC", "MV = GI x GIM", "MVS = GQ x [(PI x QI) + (PL x QL)] + OA"], "a": "D", "e": "The generic hybrid model: MVS = GQ x [(PI x QI) + (PL x QL)] + OA. It combines multiplicative (GQ qualitative factors) with additive (PI x QI improvement costs plus PL x QL land value) components.", "p": "300 p.18"}, {"n": 333, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Model specification in mass appraisal involves:", "o": ["Calibrating rates to match current market", "Determining statistical significance of each variable", "Determining what data to include in the model and in what format", "Reviewing and adjusting individual parcel values"], "a": "C", "e": "Model specification involves selecting which variables to include in the model and how to code and format them. Calibration comes after specification.", "p": "300 p.18"}, {"n": 334, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "Determining the rates used in a model, adjusting formulas, tables, or schedules to the current market is known as:", "o": ["Model specification", "Model review", "Model calibration", "Model validation"], "a": "C", "e": "Model calibration = adjusting model coefficients, rates, tables, and schedules to reflect current market conditions. Specification decides what to include; calibration determines the values.", "p": "300 p.18"}, {"n": 335, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "The standard of care in mass appraisal is acceptable when it:", "o": ["Produces a COD below 15%", "Meets all USPAP requirements", "Is approved by the state assessment agency", "Meets or exceeds the expectations of intended users and what an appraiser peers actions would be in a similar assignment"], "a": "D", "e": "The standard of care test: would the work meet the expectations of regularly intended users and be consistent with what peer appraisers would do in the same situation? This is the USPAP-based standard.", "p": "300 p.18"}, {"n": 336, "ch": "Ch1: Intro to Mass Appraisal", "course": "300", "q": "How many steps are in the general appraisal process?", "o": ["5 steps", "6 steps", "8 steps", "7 steps"], "a": "D", "e": "The general appraisal process has 7 steps: (1) Define the problem, (2) Determine scope of work, (3) Collect data, (4) Analyze data, (5) Apply approaches to value, (6) Reconcile value indicators, (7) Report the value.", "p": "300 p.18"}, {"n": 337, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "The three components of a property tax system are:", "o": ["Discovery, listing, and valuation", "Cost, sales comparison, and income", "Data management, analysis, and administration", "Assessment, appeal, and collection"], "a": "D", "e": "The three components of the property tax system: (1) Assessment system (discovers, values, lists property), (2) Appeal system (resolves disputes), (3) Collection system (bills, receives payments, distributes funds).", "p": "300 p.37"}, {"n": 338, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "Online systems update master files directly from computer workstations with edits built into data entry software. This describes which type of processing?", "o": ["Batch processing", "Real-time processing", "Statistical processing", "CAMA processing"], "a": "A", "e": "Online (real-time) processing updates the master file immediately as data is entered. Batch processing collects transactions and processes them all at once, typically overnight.", "p": "300 p.37"}, {"n": 339, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "A ________ should be conducted to measure and evaluate the accuracy and uniformity of new values:", "o": ["Field review", "Data edit", "Reappraisal", "Ratio study"], "a": "D", "e": "A ratio study is the standard tool for measuring assessment accuracy (level) and uniformity (COD). It should be conducted after any reappraisal to verify the results meet IAAO standards.", "p": "300 p.37"}, {"n": 340, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "The receipt of payments and distribution of funds is part of which system?", "o": ["Assessment system", "Appeal system", "Valuation system", "Collection system"], "a": "D", "e": "The collection system handles tax statements/bills, receives and accounts for payments, initiates collections for delinquent taxes, and distributes receipts to taxing jurisdictions.", "p": "300 p.37"}, {"n": 341, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "The four components of the mass appraisal system are:", "o": ["Cost, sales, income, and land", "Field work, data entry, modeling, and review", "Market, property, legal, and statistical", "Data management, analysis/valuation, administrative, and customer service/communications"], "a": "D", "e": "The four components of the mass appraisal system: (1) Data management, (2) Analysis and valuation, (3) Administrative, and (4) Customer service/communications.", "p": "300 p.37"}, {"n": 342, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "Sales data, cost data, and income data are components of which portion of data collection and maintenance?", "o": ["Property characteristics data", "Administrative data", "Market data", "Assessment roll data"], "a": "C", "e": "Market data includes sales data, cost data (for cost approach calibration), and income/expense data (for income approach). This differs from property characteristics data (physical attributes of parcels).", "p": "300 p.37"}, {"n": 343, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "Property characteristics data should be thoroughly ________ and ________ to ensure quality control:", "o": ["Coded and filed", "Priced and adjusted", "Edited and reviewed", "Assessed and taxed"], "a": "C", "e": "Data quality control requires both editing (automated range and logic checks) and review (manual verification). Poor data quality is a primary cause of poor assessment uniformity.", "p": "300 p.37"}, {"n": 344, "ch": "Ch2: Overview of Mass Appraisal", "course": "300", "q": "Property owners who dispute the assessed property value engage which component of the property tax system?", "o": ["Assessment system", "Collection system", "Valuation system", "Appeal system"], "a": "D", "e": "The appeal system receives and processes owner disputes. It includes informal reviews, formal hearings, and judicial appeals as escalating levels of dispute resolution.", "p": "300 p.38"}, {"n": 345, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "The three methods required to evaluate data accuracy in mass appraisal are:", "o": ["Range edits, logic edits, and consistency edits", "Mean, median, and weighted mean analysis", "Field study, ratio study, and pilot study", "Physical inspection, sales verification, and income analysis"], "a": "C", "e": "Three evaluation methods: (1) Field study - samples properties for quality cross-check, (2) Ratio study - poor uniformity often signals data quality issues, (3) Pilot study - models a test group to identify required data elements.", "p": "300 p.65"}, {"n": 346, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Data quality refers to how accurately recorded information used to estimate values reflects the current status of the property. This is the definition of:", "o": ["Quantity", "Completeness", "Reliability", "Quality"], "a": "D", "e": "Quality = accuracy of recorded data reflecting current property status. Quantity = completeness of data collected. Both must be adequate for valid mass appraisal results.", "p": "300 p.65"}, {"n": 347, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Qualitative items with three or more predefined values (e.g., topography: level, rolling, steep) are known as what type of data?", "o": ["Continuous data", "Binary data", "Ordinal data", "Discrete data"], "a": "C", "e": "Ordinal data has three or more ordered categories (e.g., poor/average/good/excellent condition). Binary data has exactly two values (yes/no). Continuous data takes any value within a range.", "p": "300 p.66"}, {"n": 348, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "A consistency (logic) edit makes certain that the number of bedrooms does not exceed the total room count, or the basement sq ft is not greater than the finished area. This is an example of a:", "o": ["Range edit", "Ratio edit", "Qualitative edit", "Consistency (logic) edit"], "a": "D", "e": "Consistency edits check whether related fields are logically compatible. Range edits check whether individual fields fall within acceptable minimum/maximum bounds.", "p": "300 p.66"}, {"n": 349, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Data items where the proper value is a matter of judgment and difficult to verify are called:", "o": ["Continuous data", "Binary data", "Ordinal (qualitative) data", "Discrete data"], "a": "C", "e": "Qualitative/ordinal data (condition, quality grades, architectural style) requires judgment in assignment and is harder to verify than objective measurements like square footage.", "p": "300 p.66"}, {"n": 350, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Data quantity relates to what aspect of the data collection effort?", "o": ["How accurately data reflects property status", "The speed of data collection", "The number of appraisers assigned to the project", "The completeness of data collected to capture local market influences"], "a": "D", "e": "Quantity = completeness - do you have all the data needed to capture what the local market values? Missing key data elements reduces model effectiveness.", "p": "300 p.65"}, {"n": 351, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Data collectors should receive both what two types of training?", "o": ["Legal and administrative training", "Software and hardware training", "Office and field training", "Classroom and on-the-job training"], "a": "D", "e": "Data collectors need both classroom training (procedures, coding manuals, standards) and on-the-job/field training (supervised practical application).", "p": "300 p.66"}, {"n": 352, "ch": "Ch3: Data Collection & Management", "course": "300", "q": "Given: 40,000 parcels, 20 parcels per day, 260 working days per year, minus 30 non-productive days = 230 productive days. How many appraisers are required to complete in one year?", "o": ["6 appraisers", "7 appraisers", "8 appraisers", "9 appraisers"], "a": "D", "e": "Total days needed = 40,000 / 20 = 2,000 appraiser-days. Productive days per appraiser = 260 - 10 holidays - 10 vacation - 5 sick - 5 training = 230 days. Appraisers = 2,000 / 230 = 8.7, rounded up to 9.", "p": "300 p.67"}, {"n": 353, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "The listing of data in order of magnitude, either ascending or descending, is termed a/an:", "o": ["Frequency distribution", "Histogram", "Array", "Scatter diagram"], "a": "C", "e": "An array is a simple ordered listing of data values. It is the first step in most statistical analyses and useful for identifying the range, outliers, and central tendency of small datasets.", "p": "300 p.110"}, {"n": 354, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "A ________ illustrates the extent to which sales ratios are in a normal (bell-shaped) distribution when used to chart a frequency distribution:", "o": ["Scatter diagram", "Array", "Contingency table", "Histogram (bar chart)"], "a": "D", "e": "A histogram (bar chart) charts the frequency distribution. When sales ratios follow a bell curve, the histogram shows a roughly symmetrical mound shape, indicating a normal distribution.", "p": "300 p.110"}, {"n": 355, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "Crosstabulations show the distribution of values for which types of variables?", "o": ["Continuous variables only", "All quantitative variables", "Binary or discrete variables", "Dependent variables only"], "a": "C", "e": "Crosstabulations (contingency tables) are used for binary or discrete (categorical) variables - for example, showing the distribution of sale prices by neighborhood and property type.", "p": "300 p.110"}, {"n": 356, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "Scatter diagrams show the relationship between two quantitative variables with the dependent variable placed on which axis?", "o": ["Horizontal (X) axis", "Both axes equally", "Neither axis - scatter diagrams use color coding", "Vertical (Y) axis"], "a": "D", "e": "In a scatter diagram: dependent variable (sale price or ratio) on the Y (vertical) axis; independent variable (size, age, etc.) on the X (horizontal) axis. The pattern of dots reveals the relationship.", "p": "300 p.110"}, {"n": 357, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "A polygon (line chart) can be used to show several variables simultaneously or the same variable for different:", "o": ["Time periods only", "Different appraisers", "Different strata", "Different tax rates"], "a": "C", "e": "A polygon (line chart) is particularly useful for comparing the same variable (e.g., median ratio) across different strata (neighborhoods, property types, age ranges) on the same graph.", "p": "300 p.110"}, {"n": 358, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "Contingency tables compare statistics by strata, for example average sale price by neighborhood. They are also called:", "o": ["Arrays", "Scatter diagrams", "Three-way comparisons", "Crosstabulations"], "a": "D", "e": "Contingency tables and crosstabulations are the same tool - showing how values of one variable are distributed across categories of another variable.", "p": "300 p.110"}, {"n": 359, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "The coefficient of variation (COV) expresses the standard deviation as a percentage of the:", "o": ["Median", "Weighted mean", "Range", "Mean"], "a": "D", "e": "COV = (Standard Deviation / Mean) x 100. It normalizes the standard deviation to allow comparison across datasets with different means. Unlike COD (which uses the median), COV uses the mean.", "p": "300 p.110"}, {"n": 360, "ch": "Ch4: Data Analysis in Mass Appraisal", "course": "300", "q": "Cases beyond the whiskers in box plots are called:", "o": ["Adjustments and corrections", "Averages and outliers", "Normal values and extremes", "Outliers and far outliers"], "a": "D", "e": "In a box plot: values beyond the whiskers are outliers; values far beyond the outer fences are called far outliers (extreme values). These are candidates for verification or exclusion from analysis.", "p": "300 p.110"}, {"n": 361, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "A ratio study is the most effective means of evaluating assessment accuracy. The ratio is developed by:", "o": ["Dividing sale price by assessed value", "Dividing assessed value by replacement cost", "Dividing assessed value by sale price", "Dividing net income by sale price"], "a": "C", "e": "A/S Ratio = Assessed Value / Sale Price. A ratio of 1.00 (or 100%) means the assessment equals the sale price - perfectly accurate. The median ratio reflects the overall assessment level.", "p": "300 p.163"}, {"n": 362, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "Three ways of obtaining sales data from buyers and sellers are:", "o": ["Field inspection, mail survey, and deed recording", "Personal interview, telephone interview, and sales questionnaire", "Comparable sales analysis, ratio study, and trend analysis", "CAMA system, MLS database, and county recorder"], "a": "B", "e": "The three basic sales verification methods: personal interview (most accurate), telephone interview (moderate accuracy and efficiency), and sales questionnaire by mail (most efficient but lowest response and accuracy).", "p": "300 p.163"}, {"n": 363, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "A frequency distribution shows the number of ratios falling within specified intervals and also reveals:", "o": ["The assessed value of each parcel", "Patterns and trends in the data sample", "The tax rate needed to meet the budget", "The individual appraiser performance"], "a": "B", "e": "A frequency distribution reveals patterns and trends: whether ratios are clustered, skewed, bimodal, or normally distributed. It is an essential tool for understanding the overall assessment level and uniformity.", "p": "300 p.163"}, {"n": 364, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "The median in a ratio study is:", "o": ["The most frequently occurring ratio", "The average of all ratios weighted by sale price", "The arithmetic mean of all ratios", "The midpoint when ratios are arrayed in order of magnitude"], "a": "D", "e": "The median is the middle value when data is sorted - 50% of ratios fall above it and 50% below. It is preferred over the mean in ratio studies because it is less influenced by extreme outliers.", "p": "300 p.163"}, {"n": 365, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "A histogram is defined as:", "o": ["A listing of data in order of magnitude", "A graph showing relationship between two variables", "A bar chart or graph of a frequency distribution", "A three-dimensional visualization of assessment data"], "a": "C", "e": "A histogram is a bar chart where each bar represents an interval and the height shows the frequency (number of observations) in that interval. Used to visualize the distribution of ratios.", "p": "300 p.163"}, {"n": 366, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "The most common measure of appraisal uniformity in ratio studies is the:", "o": ["Standard deviation", "Price-related differential (PRD)", "Coefficient of variation (COV)", "Coefficient of dispersion (COD)"], "a": "D", "e": "The COD (Coefficient of Dispersion) is the IAAO standard measure of assessment uniformity. COD = 100 x (Average Absolute Deviation from Median) / Median. Lower COD = more uniform assessments.", "p": "300 p.163"}, {"n": 367, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "The price-related differential (PRD) is a measure of:", "o": ["Horizontal equity between neighborhoods", "The overall assessment level compared to market", "Vertical equity between high-value and low-value properties", "The uniformity within each property class"], "a": "C", "e": "PRD measures vertical equity - whether high-value and low-value properties are assessed at similar ratios. PRD > 1.03 suggests regressivity (low-value properties over-assessed relative to high-value); PRD < 0.98 suggests progressivity.", "p": "300 p.163"}, {"n": 368, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "According to IAAO standards, the level of appraisal (median ratio) should fall between:", "o": ["85% and 95%", "80% and 120%", "95% and 105%", "90% and 110%"], "a": "C", "e": "IAAO standard: the median assessment ratio should fall between 0.90 and 1.10 (90% and 110% of market value) for the overall assessment level to be acceptable.", "p": "300 p.163"}, {"n": 369, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "According to IAAO standards, for older heterogeneous residential property the COD should be between 5.0 and:", "o": ["10.0", "20.0", "25.0", "15.0"], "a": "D", "e": "IAAO COD standards: newer homogeneous residential = 5-10; older heterogeneous residential = 5-15; rural residential and seasonal = 5-20; income-producing = 5-20.", "p": "300 p.163"}, {"n": 370, "ch": "Ch5: Sales Ratio Studies", "course": "300", "q": "Line charts (polygons) differ from other charts in that they can:", "o": ["Show three-dimensional data", "Be used only for ratio studies", "Calculate the mean and median simultaneously", "Accommodate multiple data sets on the same graph"], "a": "D", "e": "Line charts/polygons can show multiple data series (e.g., median ratios for several neighborhoods) on the same graph, making visual comparisons easy.", "p": "300 p.163"}, {"n": 371, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Cost models in mass appraisal follow the structure of which single-property appraisal approach?", "o": ["Sales comparison approach models", "Income approach models", "Regression approach models", "Cost approach models"], "a": "D", "e": "Mass appraisal cost models parallel single-property cost approach: Depreciated Cost = Reproduction/Replacement Cost New minus Depreciation. The mass appraisal difference is scale and statistical calibration.", "p": "300 p.199"}, {"n": 372, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Cost manuals should contain:", "o": ["Tax rates and assessment ratios", "Market rent schedules and cap rates", "Sale prices and adjustment grids", "Replacement cost tables, depreciation schedules, classification guidelines, and building feature codes"], "a": "D", "e": "A mass appraisal cost manual provides: replacement cost tables (by building type and class), depreciation schedules, building classification guidelines, and codes for features and extras.", "p": "300 p.199"}, {"n": 373, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Material, labor, and supervision are classified as what type of construction costs?", "o": ["Indirect costs", "Soft costs", "Overhead costs", "Direct (hard) costs"], "a": "D", "e": "Direct costs are on-site construction expenses: materials, labor, and supervision. Indirect costs (soft costs) include architectural/engineering fees, permits, insurance, and financing.", "p": "300 p.199"}, {"n": 374, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "The cost of constructing an IDENTICAL structure is called:", "o": ["Replacement cost new (RCN)", "Depreciated cost", "Historical cost", "Reproduction cost new"], "a": "D", "e": "Reproduction cost new = cost to construct an exact replica using the same materials, design, and methods as the original. Replacement cost new uses modern materials and methods to achieve equivalent utility.", "p": "300 p.199"}, {"n": 375, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Insurance, architectural and engineering fees are classified as what type of construction costs?", "o": ["Direct costs", "Variable costs", "Replacement costs", "Indirect (soft) costs"], "a": "D", "e": "Indirect/soft costs include: architectural fees, engineering fees, permit fees, financing costs during construction, insurance, real estate taxes during construction, and developer overhead.", "p": "300 p.199"}, {"n": 376, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "The cost of constructing a SUBSTITUTE structure of EQUAL UTILITY is:", "o": ["Reproduction cost new", "Historical cost indexed", "Depreciated cost", "Replacement cost new (RCN)"], "a": "D", "e": "Replacement cost new (RCN) = cost to produce a building with equal utility using modern materials and methods. Most mass appraisal cost manuals are based on replacement cost rather than reproduction cost.", "p": "300 p.199"}, {"n": 377, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Depreciation schedules in mass appraisal must be derived from:", "o": ["The cost index", "Published national tables only", "The effective tax rate", "The market (actual sales data)"], "a": "D", "e": "Depreciation schedules must be derived from the market through analysis of sales data - comparing what improved properties sell for vs. their RCN. Market-derived schedules reflect actual buyer behavior.", "p": "300 p.199"}, {"n": 378, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Floors and roofing are examples of what type of cost components?", "o": ["Indirect cost components", "Land cost components", "Long-lived cost components", "Short-lived cost components"], "a": "D", "e": "Short-lived components (floors, roofing, HVAC, kitchen fixtures) have limited useful lives and are replaced before the building is retired. They require separate depreciation schedules from the long-lived structural components.", "p": "300 p.199"}, {"n": 379, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "When applying the comparative unit method in cost approach, costs are expressed on a per ________ basis:", "o": ["Per room", "Per unit", "Per parcel", "Per square foot"], "a": "D", "e": "The comparative unit (square foot) method expresses costs per square foot of building area. It is the most widely used cost estimation method in mass appraisal due to its simplicity and efficiency.", "p": "300 p.199"}, {"n": 380, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Proper application of the ________ method requires detailed knowledge of construction:", "o": ["Comparative unit (square foot) method", "Trended historical cost method", "Unit-in-place method", "Abstraction method"], "a": "C", "e": "The unit-in-place method prices each component separately (foundation, framing, roofing, etc.) requiring detailed construction knowledge. It is more accurate than the square foot method but requires greater expertise.", "p": "300 p.199"}, {"n": 381, "ch": "Ch6: Cost Approach in Mass Appraisal", "course": "300", "q": "Entrepreneurial profit is the amount one expects to receive for contribution to a project that includes:", "o": ["Normal labor costs", "Management fees only", "Property tax liability", "Risk compensation"], "a": "D", "e": "Entrepreneurial profit (entrepreneurial incentive) compensates the developer for taking on project risk above normal returns. It is a legitimate cost component in the cost approach.", "p": "300 p.199"}, {"n": 382, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "The three approaches to stratification and location analysis in mass appraisal are:", "o": ["Cost, sales, and income approaches", "Mean, median, and mode stratification", "Field, office, and statistical stratification", "Geographic areas, neighborhood identification, and response surface analysis"], "a": "D", "e": "Three location analysis approaches in mass appraisal: (1) Geographic stratification (drawing boundaries), (2) Cluster analysis/neighborhood identification, and (3) Global response surface analysis (using coordinates).", "p": "300 p.223"}, {"n": 383, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "Per unit value analyses can be very effective for which type of properties?", "o": ["Large commercial complexes", "Unique one-of-a-kind properties", "Income-producing commercial properties", "Homogeneous properties"], "a": "D", "e": "Per unit value analysis ($/sq ft, $/front foot, $/acre) works best for homogeneous properties where size is the primary value driver and other characteristics are similar within the stratum.", "p": "300 p.219"}, {"n": 384, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "A statistical technique used for estimating unknown data based on known and available data is:", "o": ["Cluster analysis", "Stratification", "Frequency distribution", "Multiple regression analysis (MRA)"], "a": "D", "e": "Multiple regression analysis (MRA) estimates the value of a dependent variable (market value) from multiple independent variables (property characteristics) using statistical relationship modeling.", "p": "300 p.219"}, {"n": 385, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "The formula MVS = SC + ADJC is the formula for which type of model?", "o": ["Income model", "Cost model", "Hybrid model", "Sales comparison model"], "a": "D", "e": "MVS = SC + ADJC: Market Value of Subject = Comparable Sales + Adjustments to Comparable. This is the direct sales comparison model structure, mirroring single-property sales comparison analysis.", "p": "300 p.219"}, {"n": 386, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "The three basic types of mass appraisal model structures are:", "o": ["Cost, income, and sales comparison", "Manual, statistical, and hybrid", "Additive, multiplicative, and hybrid (generic)", "Linear, logarithmic, and exponential"], "a": "C", "e": "Three model structures: (1) Additive: MV = b0 + (b1 x X1)... (2) Multiplicative: MV = R0 x SIZE x F1..., (3) Hybrid/Generic: MV = GQ x [(PI x QI) + (PL x QL)] + OA.", "p": "300 p.219"}, {"n": 387, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "MVS = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is known as which model type?", "o": ["Hybrid model", "Multiplicative model", "Income model", "Additive model"], "a": "D", "e": "The additive model: each property feature contributes a dollar amount to total value. b0 is the base value; each coefficient (b1, b2...) represents the dollar value of one unit of the corresponding feature.", "p": "300 p.219"}, {"n": 388, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "When geographically stratifying properties, boundaries should be drawn to correspond with:", "o": ["Assessment level targets", "Appraiser assignments", "Statistical significance levels", "Natural or political boundaries"], "a": "D", "e": "Geographic strata boundaries should follow natural (rivers, highways, topography) or political (city/county lines, zoning districts) boundaries to reflect areas with homogeneous market influences.", "p": "300 p.219"}, {"n": 389, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "Broad geographic areas subject to the same economic influences are known as:", "o": ["Subdivisions", "Neighborhoods", "Economic (market) areas", "Assessment districts"], "a": "C", "e": "Economic (market) areas are broad geographic areas where properties are subject to similar economic forces. They form the first level of stratification, within which neighborhoods are identified.", "p": "300 p.219"}, {"n": 390, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "A technique that can be used to group similar subdivisions into neighborhoods is:", "o": ["Paired sales analysis", "Multiple regression analysis", "Ratio study analysis", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar observations (subdivisions or parcels) into categories based on multiple variables simultaneously - useful for identifying homogeneous neighborhoods from market data.", "p": "300 p.219"}, {"n": 391, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "MV = GQ x [(PI x QI) + (PL x QL)] + OA is known as which model type?", "o": ["Additive model", "Income model", "Multiplicative model", "Hybrid (generic) model"], "a": "D", "e": "The hybrid model combines multiplicative elements (GQ qualitative factor applied globally) with additive elements (improvement value + land value). This is the generic cost model structure used in most CAMA systems.", "p": "300 p.219"}, {"n": 392, "ch": "Ch7: Sales Comparison Approach in Mass Appraisal", "course": "300", "q": "In developing per unit values, the most appropriate units would have low measures of:", "o": ["Mean and median", "Standard error and regression coefficient", "COD and PRD", "Dispersion (variation)"], "a": "D", "e": "Low dispersion within a per-unit-value stratum means properties in that group have similar values per unit - validating the unit as the appropriate measure. High dispersion suggests the stratum needs further refinement.", "p": "300 p.219"}, {"n": 393, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "The formula for the net income model in mass appraisal is:", "o": ["MV = GI x GIM", "V = I / R", "MVS = SC + ADJC", "MV = LV + BV"], "a": "B", "e": "V = I / R: Market Value = Net Operating Income / Overall Capitalization Rate. This is the direct capitalization income model - the foundation of income approach mass appraisal.", "p": "300 p.237"}, {"n": 394, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "When estimating gross income in mass appraisal, the first step is to:", "o": ["Apply the GIM to the subject", "Calculate the capitalization rate", "Determine the net income ratio", "Stratify properties by use, class, location, etc."], "a": "D", "e": "Stratification is the first step in any mass appraisal income analysis - grouping similar properties to develop meaningful market rent and expense ratio benchmarks for each stratum.", "p": "300 p.237"}, {"n": 395, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "When estimating operating expenses for ad valorem tax purposes, what should NOT be included?", "o": ["Management fees", "Reserves for replacement", "Capital expenditures", "Property taxes"], "a": "D", "e": "For ad valorem appraisal, property taxes are excluded from operating expenses (because the taxes are not yet known) and instead an effective tax rate (ETR) is loaded into the capitalization rate.", "p": "300 p.237"}, {"n": 396, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "The formula for the gross income model in mass appraisal is:", "o": ["V = I / R", "MVS = SC + ADJC", "MV = LV + BV", "MV = GI x GIM"], "a": "D", "e": "MV = GI x GIM: Market Value = Gross Income x Gross Income Multiplier. This is an alternative to direct NOI capitalization, useful when expense data is limited but gross income is well-established.", "p": "300 p.237"}, {"n": 397, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "The two basic methods of estimating gross income in mass appraisal are:", "o": ["Direct capitalization and yield capitalization", "Derivation from sales and band of investment", "Income and expense analysis", "Stratification and modeling"], "a": "D", "e": "Gross income can be estimated through: (1) Stratification - grouping by type/location and computing median rent per unit, and (2) Modeling - using regression to predict rent from property characteristics.", "p": "300 p.237"}, {"n": 398, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "The dependent variable in gross income models should be:", "o": ["Overall capitalization rate", "Net operating income per unit", "Sale price per square foot", "Gross income per unit of comparison"], "a": "D", "e": "In gross income models, the dependent variable (what you are predicting) is gross income per unit (per sq ft, per room, per unit). Property characteristics (location, size, age, amenities) are the independent variables.", "p": "300 p.237"}, {"n": 399, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "Independent variables in gross income models should be:", "o": ["Sale prices and cap rates", "COD and PRD statistics", "Property characteristics important in explaining differences in gross income", "Assessment ratios and tax rates"], "a": "C", "e": "Independent variables in gross income models include property characteristics that drive rental differences: location, size, age, quality class, amenities, and condition.", "p": "300 p.237"}, {"n": 400, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "The dependent variable in expense ratio models should be the:", "o": ["Net operating income", "Overall capitalization rate", "Expense ratio (operating expenses / gross income)", "Gross income multiplier"], "a": "C", "e": "In expense ratio models, the dependent variable is the expense ratio itself. The model predicts what expense ratio is typical for properties with given characteristics (property type, age, amenities, etc.).", "p": "300 p.237"}, {"n": 401, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "In developing GIMs and OARs, three factors that should be considered when stratifying properties are:", "o": ["Mean, median, and mode", "Direct, indirect, and total costs", "Quality, quantity, and condition", "Property type, location, and income level"], "a": "D", "e": "When stratifying for GIM/OAR development: (1) property type/use (apartments vs. retail vs. office), (2) location/market area, and (3) income level/class. These factors drive differences in investor expectations.", "p": "300 p.237"}, {"n": 402, "ch": "Ch8: Income Approach in Mass Appraisal", "course": "300", "q": "In developing GIMs in mass appraisal, the appraiser should first stratify then compute measures of ________ and ________ for each stratum:", "o": ["Quality and quantity", "Cost and income", "Maximum and minimum", "Central tendency and dispersion"], "a": "D", "e": "After stratifying: compute measures of central tendency (median GIM) and dispersion (COD) for each stratum. Low dispersion validates the stratum; high dispersion suggests further refinement is needed.", "p": "300 p.237"}, {"n": 403, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "Seven sales: AV = 08K, 5K, 54K, 23.5K, 20K, 05K, 26.5K; SP = 20K, 00K, 40K, 30K, 50K, 05K, 10K. Ratios are: 0.900, 0.850, 1.100, 0.950, 0.800, 1.000, 1.150. The MEDIAN ratio is:", "o": ["0.900", "0.950", "0.850", "1.000"], "a": "B", "e": "Sorted ratios: 0.800, 0.850, 0.900, 0.950, 1.000, 1.100, 1.150. With 7 values, the median is the 4th = 0.950.", "p": "300 p.165"}, {"n": 404, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "Using the same 7 ratios (0.800, 0.850, 0.900, 0.950, 1.000, 1.100, 1.150), the MEAN ratio is:", "o": ["0.950", "1.000", "0.964", "0.936"], "a": "C", "e": "Mean = sum/count = (0.800+0.850+0.900+0.950+1.000+1.100+1.150)/7 = 6.750/7 = 0.9643 (rounded to 0.964).", "p": "300 p.165"}, {"n": 405, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "Using the same 7 ratios, absolute deviations from median (0.950) are: 0.150, 0.100, 0.050, 0.000, 0.050, 0.150, 0.200. Average Absolute Deviation (AAD) = 0.100. COD = 100 x AAD / Median. COD is:", "o": ["10.53", "10.00", "9.50", "5.00"], "a": "A", "e": "COD = 100 x AAD / Median = 100 x 0.100 / 0.950 = 10.53. This COD of 10.53 falls within the IAAO standard of 5-15 for older heterogeneous residential property.", "p": "300 p.165"}, {"n": 406, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "Weighted mean ratio is calculated as: Total Assessed Value / Total Sale Price. Given total AV = 22,000 and total SP = 55,000, the weighted mean ratio is:", "o": ["0.950", "0.961", "0.975", "0.964"], "a": "B", "e": "Weighted mean = Total AV / Total SP = 22,000 / 55,000 = 0.9614, rounded to 0.961.", "p": "300 p.165"}, {"n": 407, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "The price-related differential (PRD) is calculated as: Mean Ratio / Weighted Mean Ratio = 0.964 / 0.961. PRD is:", "o": ["0.997", "1.010", "1.003", "1.020"], "a": "C", "e": "PRD = Mean / Weighted Mean = 0.964 / 0.961 = 1.003. A PRD near 1.00 indicates neither regressivity nor progressivity. IAAO standard: 0.98 to 1.03 is acceptable.", "p": "300 p.165"}, {"n": 408, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "A PRD above 1.03 indicates which type of inequity in assessments?", "o": ["Horizontal inequity (between neighborhoods)", "Progressivity (high-value properties over-assessed)", "Neither - PRD has nothing to do with equity", "Regressivity (low-value properties over-assessed relative to high-value)"], "a": "D", "e": "PRD > 1.03 = regressive: low-value properties are assessed at higher ratios than high-value properties. PRD < 0.98 = progressive: high-value properties are over-assessed relative to low-value.", "p": "300 p.165"}, {"n": 409, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "An assessor has a median ratio of 0.92 and a COD of 18. IAAO standards call for median between 0.90-1.10 and COD under 15 for residential. Which standard is NOT met?", "o": ["Neither standard is met", "Both standards are met", "Level of appraisal standard only", "Uniformity (COD) standard only"], "a": "D", "e": "Median of 0.92 falls within the 0.90-1.10 acceptable range (level is acceptable). COD of 18 exceeds the maximum of 15 for residential property (uniformity is unacceptable). Only the COD standard is violated.", "p": "300 p.165"}, {"n": 410, "ch": "Applied Statistics & Ratio Studies", "course": "300", "q": "Given 7 ratios: 0.898, 1.200, 1.080, 0.950, 1.350, 0.700, 0.851. Sorted: 0.700, 0.851, 0.898, 0.950, 1.080, 1.200, 1.350. Median = 0.950. This suggests the overall assessment level is:", "o": ["At 100% of market value - no adjustment needed", "Moderately above market value", "Significantly below market value", "At approximately 95% of market value"], "a": "D", "e": "A median ratio of 0.950 means the typical assessment is at 95% of market value - slightly below 100% but within the IAAO acceptable range of 90%-110%.", "p": "300 p.167"}, {"n": 411, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "Characteristics of mass appraisal that differ from single property appraisal include the use of valuation tables, schedules, and:", "o": ["Individual written reports", "Three approaches to value", "Highest and best use analysis", "Statistical testing"], "a": "D", "e": "The distinguishing features of mass appraisal are: (1) valuation tables and schedules applied uniformly, and (2) statistical testing to verify accuracy and uniformity of results.", "p": "311 p.13"}, {"n": 412, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "Economic, social, and environmental data are termed ________ data, while off-site features and improvement data are termed ________ data:", "o": ["Market; property", "Qualitative; quantitative", "Dependent; independent", "General; specific"], "a": "A", "e": "General (market) data = economic, social, governmental, environmental forces. Specific (property) data = off-site features, on-site improvements, and physical characteristics of the individual parcel.", "p": "311 p.13"}, {"n": 413, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "The appraisal principle that states land cannot be valued on one use basis while improvements are valued on another is the principle of:", "o": ["Contribution", "Anticipation", "Highest and best use", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must always be valued under the same use assumption. You cannot value land as commercial while valuing the building as residential.", "p": "311 p.13"}, {"n": 414, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "Selecting appropriate valuation approaches and specifying the variables to be used is called:", "o": ["Model calibration", "Model testing", "Model specification", "Model validation"], "a": "C", "e": "Model specification = deciding which variables to include and how to format/code them. Calibration comes after specification and determines the rates/coefficients for those variables.", "p": "311 p.13"}, {"n": 415, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "Developing adjustment weights from measurable supply and demand factors is called:", "o": ["Model specification", "Model review", "Model testing", "Model calibration"], "a": "D", "e": "Model calibration = quantifying the coefficients/weights for each variable in the model from market data. It answers the question: how much does each feature contribute to market value?", "p": "311 p.13"}, {"n": 416, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "According to modern price theory, value in exchange is determined by the interaction of:", "o": ["Reproduction cost and depreciation", "Income and capitalization rate", "Assessed value and tax rate", "Supply and demand"], "a": "D", "e": "Modern price theory: value is determined by the interaction of supply and demand. The mass appraisal model must capture both supply-side factors (construction cost) and demand-side factors (location, amenities, condition).", "p": "311 p.13"}, {"n": 417, "ch": "Ch1: Introduction to Mass Appraisal Modeling", "course": "311", "q": "The model V = b0 + b1 x SFLA + b2 x baths + b3 x GARSQFT is an example of which type of model?", "o": ["Multiplicative model", "Income model", "Hybrid model", "Additive model"], "a": "D", "e": "An additive model sums the contributions of each independent variable. Each coefficient (b1, b2, b3) represents the dollar contribution of one unit of that variable to total market value.", "p": "311 p.13"}, {"n": 418, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "The four market forces that must be analyzed in data collection are:", "o": ["Cost, income, sales, and land", "Location, size, age, and condition", "Physical, legal, financial, and environmental", "Physical, economic, governmental, and social/demographic"], "a": "D", "e": "The four forces affecting value: Physical (topography, climate), Economic (income levels, employment), Governmental (zoning, building codes, tax rates), and Social/Demographic (population trends, education).", "p": "311 p.46"}, {"n": 419, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "Building codes, planning, and zoning are considered which type of forces?", "o": ["Economic forces", "Physical forces", "Social forces", "Governmental forces"], "a": "D", "e": "Governmental forces include: zoning, building codes, planning regulations, special assessments, tax rates, and other public sector influences on property value.", "p": "311 p.46"}, {"n": 420, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "The most effective yet most expensive method of gathering income and expense data is:", "o": ["Mail questionnaire", "Assessment appeals data", "Telephone survey", "Personal interview"], "a": "D", "e": "Personal interviews yield the most complete and accurate income/expense data, but they consume the most professional staff time and are most expensive to conduct.", "p": "311 p.46"}, {"n": 421, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "Potential gross income (PGI) is based on which type of rent?", "o": ["Below-market contract rent", "Historical rent from prior leases", "Above-market asking rent", "Market rent reflecting current rents and typical management"], "a": "D", "e": "PGI is based on market rent - what the property would rent for under typical management at full occupancy - NOT the actual contract rent, which may be above or below market.", "p": "311 p.46"}, {"n": 422, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "The income that is typically capitalized into an indication of value in mass appraisal is:", "o": ["Potential gross income", "Effective gross income", "Gross income multiplier", "Net operating income (NOI)"], "a": "D", "e": "NOI (Net Operating Income) = EGI minus operating expenses. This is the income typically capitalized in mass appraisal income models (V = I/R).", "p": "311 p.46"}, {"n": 423, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "A gross lease requires the owner to pay all operating expenses, while a ________ lease requires the tenant to pay all operating expenses:", "o": ["Graduated lease", "Adjustable lease", "Net lease", "Percentage lease"], "a": "C", "e": "Net lease (NNN): tenant pays all operating expenses (taxes, insurance, maintenance). Gross lease: landlord pays all expenses. Triple net is the most common commercial lease structure.", "p": "311 p.46"}, {"n": 424, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "Data that relate to features or attributes of the property (also known as discrete data) are called:", "o": ["Quantitative data", "Continuous data", "Binary data", "Qualitative data"], "a": "D", "e": "Qualitative (discrete) data = property features and attributes: style, condition grade, construction type. Quantitative (continuous) data = measurements: square footage, lot size, year built.", "p": "311 p.47"}, {"n": 425, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "A ________ transformation converts a discrete variable to relative values or numerical ratings:", "o": ["Quotient transformation", "Multiplicative transformation", "Logarithmic transformation", "Scalar transformation"], "a": "D", "e": "Scalar transformations assign numerical ratings to ordinal/discrete categories (e.g., Poor=0.80, Average=1.00, Good=1.20, Excellent=1.40) to make qualitative data usable in regression models.", "p": "311 p.47"}, {"n": 426, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "When property characteristics affect value interactively, which type of transformation captures the interactive effects?", "o": ["Logarithmic transformation", "Scalar transformation", "Reciprocal transformation", "Multiplicative transformation"], "a": "D", "e": "Multiplicative (and quotient) transformations capture interactive effects - where the impact of one variable on value depends on the level of another variable (e.g., quality x size interaction).", "p": "311 p.47"}, {"n": 427, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "IAAO standards recommend routine property inspections at least every ________ years:", "o": ["2 years", "5 years", "4 years", "10 years"], "a": "B", "e": "IAAO standard recommends physical inspection of all properties at least every 4-6 years. Many jurisdictions inspect more frequently for commercial/income properties.", "p": "311 p.47"}, {"n": 428, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "The square foot area of a residence is considered ________ data, while the condition rating is considered ________ data:", "o": ["Binary; discrete", "Discrete; continuous", "Qualitative; quantitative", "Quantitative (objective); qualitative (subjective)"], "a": "D", "e": "Square footage is objective quantitative data - measured and verifiable. Condition rating is subjective qualitative data - requires appraiser judgment and is harder to verify or standardize.", "p": "311 p.47"}, {"n": 429, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "Binary data are qualitative items that have only two possibilities. An example would be:", "o": ["Condition rated poor/fair/average/good/excellent", "Number of bedrooms", "Square footage of living area", "Whether a property has a fireplace (yes/no)"], "a": "D", "e": "Binary data has exactly two values: yes/no, presence/absence. Examples: fireplace (yes/no), pool (yes/no), corner lot (yes/no). Binary variables are coded as 0 or 1 in regression models.", "p": "311 p.47"}, {"n": 430, "ch": "Ch2: Data Collection & Management", "course": "311", "q": "The division of one variable by another (e.g., square feet divided by number of rooms) is termed a:", "o": ["Logarithmic transformation", "Scalar transformation", "Multiplicative transformation", "Quotient transformation"], "a": "D", "e": "Quotient transformations divide one variable by another to create a new variable expressing a ratio - e.g., price per room, value per unit, or square feet per bedroom. Useful for normalizing size effects.", "p": "311 p.48"}, {"n": 431, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Broad geographic areas subject to similar economic influences are called:", "o": ["Neighborhoods", "Assessment districts", "Strata", "Economic or market areas"], "a": "D", "e": "Economic/market areas are broad geographic areas sharing similar economic forces. Neighborhoods are smaller subdivisions within market areas that share location amenities.", "p": "311 p.101"}, {"n": 432, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Groups of properties that share similar location amenities are called:", "o": ["Economic areas", "Assessment strata", "Market segments", "Neighborhoods or districts"], "a": "D", "e": "Neighborhoods (or districts) are groups of properties sharing similar location amenities - access, proximity to services, infrastructure, and quality of surroundings.", "p": "311 p.101"}, {"n": 433, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "A method of stratification that minimizes differences within groups and maximizes differences among groups is known as:", "o": ["Multiple regression analysis", "Ratio study analysis", "Response surface analysis", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar properties by minimizing within-group variance and maximizing between-group variance - an objective statistical approach to neighborhood or stratum identification.", "p": "311 p.102"}, {"n": 434, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "When data are normally distributed, approximately what percentages fall within one, two, and three standard deviations of the mean?", "o": ["50%, 75%, 95%", "68%, 95%, 99%", "75%, 90%, 99%", "60%, 80%, 95%"], "a": "B", "e": "The empirical rule for normal distributions: approximately 68% within 1 SD, 95% within 2 SD, and 99% (99.7%) within 3 SD of the mean. This is fundamental to interpreting dispersion statistics.", "p": "311 p.102"}, {"n": 435, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Common measures of central tendency are the:", "o": ["Range, interquartile range, and standard deviation", "Mean, median, and mode", "COD, COV, and PRD", "Minimum, maximum, and midrange"], "a": "B", "e": "The three measures of central tendency: mean (arithmetic average), median (middle value), and mode (most frequent value). In mass appraisal ratio studies, the median is preferred.", "p": "311 p.102"}, {"n": 436, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Two common measures of dispersion in market analysis are the:", "o": ["Mean and median", "Maximum and minimum", "Standard deviation and coefficient of variation", "COD and PRD"], "a": "C", "e": "Standard deviation measures absolute spread around the mean; coefficient of variation (COV = SD/Mean x 100) expresses spread as a percentage for comparability across different datasets.", "p": "311 p.102"}, {"n": 437, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Crosstabulation analysis shows the relationship between:", "o": ["Sale price and assessed value", "An independent and dependent variable", "Two quantitative continuous variables", "Two qualitative variables or grouped quantitative variables"], "a": "D", "e": "Crosstabulations/contingency tables display the distribution of values across categories of two qualitative or discrete variables - e.g., construction type by neighborhood.", "p": "311 p.102"}, {"n": 438, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Correlation analysis quantifies the degree of what type of relationship between two variables?", "o": ["Non-linear relationship", "Exponential relationship", "Logarithmic relationship", "Linear relationship"], "a": "D", "e": "Correlation analysis measures the degree of LINEAR relationship between two variables. The correlation coefficient (r) ranges from -1.0 (perfect negative) to +1.0 (perfect positive).", "p": "311 p.103"}, {"n": 439, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "In testing variables, a parametric test assumes data are normally distributed, while a ________ test requires no assumption about the data distribution:", "o": ["Null hypothesis test", "Alpha test", "Confidence interval test", "Non-parametric test"], "a": "D", "e": "Non-parametric tests (Mann-Whitney, Kruskal-Wallis) make no distributional assumptions. Parametric tests (t-test, ANOVA) assume normal distribution. When sales data is skewed, non-parametric tests are preferred.", "p": "311 p.103"}, {"n": 440, "ch": "Ch3: Data Analysis & Statistics", "course": "311", "q": "Confidence intervals are valuable to assessors because they provide meaningful information about:", "o": ["The legal standard of assessment", "The probable range of the true measures of central tendency", "The tax revenue generated by the assessment roll", "The correlation between variables in the model"], "a": "B", "e": "Confidence intervals tell the assessor the probable range within which the true population parameter (e.g., median ratio) falls, given the sample data - essential for evaluating whether assessment goals are met.", "p": "311 p.103"}, {"n": 441, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "Three uses for ratio studies are:", "o": ["Determine replacement cost, depreciation, and income", "Calculate the mean, median, and COD", "Cost approach, sales comparison, and income approach", "Monitor appraisal level, determine reappraisal priorities, and develop market adjustment factors"], "a": "D", "e": "Five ratio study uses: (1) Monitor performance (level and uniformity), (2) Determine reappraisal priorities, (3) Develop market adjustment factors, (4) Planning/budgeting, (5) Adjust values between reappraisals.", "p": "311 p.129"}, {"n": 442, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "The preferred measure of assessment level in most ratio studies is the:", "o": ["Mean ratio", "Weighted mean ratio", "Price-related differential", "Median ratio"], "a": "D", "e": "The median is preferred for measuring assessment level because it is not affected by extreme outliers. The mean can be distorted by a few very high or low ratios, making the median more representative.", "p": "311 p.129"}, {"n": 443, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "Which measure of central tendency weights each ratio in proportion to its sale price?", "o": ["Median", "Mean", "Mode", "Weighted mean"], "a": "D", "e": "The weighted mean ratio = total assessed value / total sale price. It weights high-value properties more heavily. If weighted mean differs significantly from the mean, it may signal vertical inequity.", "p": "311 p.129"}, {"n": 444, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "The most widely used measure of uniformity in ratio studies is the:", "o": ["Standard deviation", "Price-related differential (PRD)", "Coefficient of variation (COV)", "Coefficient of dispersion (COD)"], "a": "D", "e": "The COD is the IAAO standard measure of assessment uniformity: COD = 100 x (Average Absolute Deviation from Median) / Median. Lower = more uniform. The median-based COD is robust against outliers.", "p": "311 p.129"}, {"n": 445, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "The IAAO COD standard for residential property in newer, homogeneous areas is between __ and __, and in older, heterogeneous areas between __ and __:", "o": ["1-5 and 5-10", "10-15 and 15-20", "5-10 and 5-15", "1-5 and 10-15"], "a": "C", "e": "IAAO COD standards: newer homogeneous
