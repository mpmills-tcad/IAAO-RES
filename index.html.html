 residential = 5.0-10.0; older heterogeneous residential = 5.0-15.0. Rural/seasonal and income-producing = 5.0-20.0.", "p": "311 p.129"}, {"n": 446, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "A scatter diagram of sales ratio vs. effective age showing a downward sloping trend indicates a ________ correlation reflecting ________ ratios in older residences:", "o": ["Positive; higher", "Zero; equal", "Positive; lower", "Negative; lower"], "a": "D", "e": "A downward (negative) slope means as effective age increases, ratios decrease - older properties are under-assessed relative to newer ones. This is a vertical/regression equity issue.", "p": "311 p.130"}, {"n": 447, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "The PRD is calculated by dividing the ________ by the ________:", "o": ["Median; mean", "COD; COV", "Mean; weighted mean", "Weighted mean; mean"], "a": "C", "e": "PRD = Mean Ratio / Weighted Mean Ratio. If the mean exceeds the weighted mean (PRD > 1.0), lower-value properties have higher ratios than high-value properties (regressive pattern).", "p": "311 p.130"}, {"n": 448, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "PRDs greater than 1.03 indicate relative ________ appraisal of higher-value parcels, while PRDs less than 0.98 indicate relative ________ appraisal of higher-value parcels:", "o": ["Under; over", "Equal; unequal", "Over; under", "Progressive; regressive"], "a": "A", "e": "PRD > 1.03: higher-value parcels are relatively UNDER-assessed (regressive). PRD < 0.98: higher-value parcels are relatively OVER-assessed (progressive). IAAO acceptable range: 0.98-1.03.", "p": "311 p.130"}, {"n": 449, "ch": "Ch4: Ratio Studies & Performance Standards", "course": "311", "q": "The PRD relates to equality between which two groups?", "o": ["Urban and rural properties", "Owner-occupied and rental properties", "Residential and commercial properties", "Lower and higher value parcels"], "a": "D", "e": "PRD measures VERTICAL equity - whether high-value and low-value properties are assessed at similar ratios. Horizontal equity refers to equity between similar properties (measured by COD within groups).", "p": "311 p.130"}, {"n": 450, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "In the cost approach model, construction costs represent the ________ side of the market, while depreciation represents the ________ side:", "o": ["Demand; supply", "Neither; both", "Supply; supply", "Supply; demand"], "a": "D", "e": "Construction costs = supply side (what it costs to produce the improvement). Depreciation = demand side (what buyers are willing to pay relative to cost; reflects market acceptance of the property at its age/condition).", "p": "311 p.151"}, {"n": 451, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "The first step in specifying cost models is to:", "o": ["Calibrate the depreciation schedule", "Determine entrepreneurial profit", "Stratify improvements into homogeneous groups", "Calculate replacement cost new"], "a": "C", "e": "Stratification into homogeneous groups is always the first step - residential by class/type, commercial by use type and size. Each stratum will have its own cost table and depreciation schedule.", "p": "311 p.151"}, {"n": 452, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "In the cost approach model V = GQ x [LV + (RCN - D)], GQ represents the general:", "o": ["Grade quality factor", "Quality adjustment for the improvements", "Geographical quantity", "Qualitative (neighborhood/location) factors"], "a": "D", "e": "GQ = General Qualitative factors - multiplicative neighborhood/location adjustments applied to the entire property value. GQ centered on 1.00 for average neighborhoods; above 1.00 for superior, below for inferior.", "p": "311 p.152"}, {"n": 453, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "For commercial properties, construction costs are usually divided between:", "o": ["Land costs and improvement costs", "Direct and indirect costs", "Market and assessed costs", "Interior and exterior costs"], "a": "B", "e": "Commercial cost models divide costs into direct costs (materials, labor, supervision) and indirect costs (architectural fees, permits, financing, insurance during construction).", "p": "311 p.152"}, {"n": 454, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "Formula-driven cost models are equations that express additive adjustments as:", "o": ["Scalar multipliers", "Percentage adjustments", "Depreciation schedules", "Percentages of the base rate"], "a": "D", "e": "Formula-driven cost models express each feature adjustment as a percentage of the base rate per square foot. This allows a single formula to accommodate a wide range of building specifications.", "p": "311 p.152"}, {"n": 455, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "In developing building depreciation schedules, percent good or accrued depreciation is plotted against:", "o": ["Sale price", "Replacement cost new", "Capitalization rate", "Effective age"], "a": "D", "e": "Depreciation schedules plot percent good (or accrued depreciation) against effective age - not chronological age. Effective age reflects actual condition and maintenance relative to typical properties of the same age.", "p": "311 p.153"}, {"n": 456, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "Three types of sales that should be EXCLUDED when deriving depreciation schedules from the market include:", "o": ["All arm-length sales", "Average condition properties", "Properties within 5 years of construction", "Non-arm-length sales, properties with extreme land-to-building ratios, and mixed-use parcels"], "a": "D", "e": "Exclusions for depreciation analysis: non-arms-length sales, properties with extreme land/building ratios (distort depreciation extraction), mixed-use parcels, and properties with additional buildings.", "p": "311 p.153"}, {"n": 457, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "Market calibration of cost models is best accomplished by using:", "o": ["Published cost indices only", "Appraiser judgment only", "Ratio studies or multiple regression analysis", "Assessment appeals data"], "a": "C", "e": "Cost model calibration uses: (1) ratio studies stratified by construction class, size groups, and age groups to identify systematic biases, or (2) multiple regression with cost components as variables.", "p": "311 p.153"}, {"n": 458, "ch": "Ch5: Cost Approach Modeling", "course": "311", "q": "For commercial properties, stratification in cost models is usually based on:", "o": ["Location and zoning", "Owner and tenant type", "Construction class and number of stories", "Age and condition"], "a": "C", "e": "Commercial cost model stratification: primarily by construction/use type (office, retail, industrial, warehouse) and number of stories (single vs. multi-story affects per-sq-ft cost significantly).", "p": "311 p.153"}, {"n": 459, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "In mass appraisal, the sales comparison approach uses which three model formats to arrive at value estimates?", "o": ["Manual, automated, and hybrid", "Residential, commercial, and agricultural", "Direct, indirect, and combination", "Additive, multiplicative, and hybrid"], "a": "D", "e": "The three model structures for mass appraisal sales comparison: (1) Additive MRA (linear), (2) Multiplicative (log-linear) MRA, and (3) Hybrid/generic model combining both.", "p": "311 p.219"}, {"n": 460, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "Multiple regression analysis (MRA) is a statistical technique for:", "o": ["Calculating the COD and PRD", "Ranking properties by value", "Estimating unknown data based on known and available data", "Plotting frequency distributions"], "a": "C", "e": "MRA estimates the value of a dependent variable (sale price) from multiple independent variables (property characteristics) using the principle of least squares - minimizing the sum of squared errors.", "p": "311 p.219"}, {"n": 461, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "In regression statistics, the t-value is the ratio of a regression coefficient to its standard error. A higher t-value indicates:", "o": ["Lower model accuracy", "More significant variable", "Larger coefficient value", "Higher correlation with other variables"], "a": "B", "e": "t-value = coefficient / standard error. Higher t-values indicate more statistically significant variables - they contribute meaningfully to explaining value variation. Typically, t-values above 2.0 are considered significant.", "p": "311 p.219"}, {"n": 462, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "In an additive MRA model, b0 represents the ________ and X1, X2...XP represent the ________:", "o": ["Dependent variable; independent variables", "Intercept (base value); property characteristics (independent variables)", "Sale price; adjustment amounts", "COD; COV"], "a": "B", "e": "b0 = the intercept or base value constant (value when all X variables = 0). X1, X2...XP = the independent variables (property characteristics). b1, b2...bP = the coefficients (dollar values per unit of each X).", "p": "311 p.219"}, {"n": 463, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "The regression statistic R-square represents:", "o": ["The ratio of assessed value to sale price", "The standard deviation divided by the mean", "The coefficient divided by its standard error", "The percentage of variation in sale price explained by the model"], "a": "D", "e": "R-square (coefficient of determination) = percentage of the total variation in sale prices explained by the model. R-square of 0.90 means the model explains 90% of value variation; 10% is unexplained.", "p": "311 p.219"}, {"n": 464, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "In regression statistics, the standard deviation of the regression error is termed the:", "o": ["Coefficient of variation", "R-square", "Adjusted R-square", "Standard error of estimate (SEE)"], "a": "D", "e": "SEE (Standard Error of Estimate) = standard deviation of the residuals (differences between actual and predicted sale prices). Approximately 68% of sale prices fall within +/- 1 SEE of the predicted value.", "p": "311 p.219"}, {"n": 465, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "Multiplicative models are calibrated with ________, whereas hybrid/generic models are calibrated with ________:", "o": ["Additive MRA; log-linear MRA", "Manual methods; automated methods", "Log-linear MRA; additive MRA", "Neither; both use the same method"], "a": "C", "e": "Multiplicative models use log-linear (logistic) MRA - both sale prices and variables are converted to logarithms before calibration. Hybrid models use standard additive MRA for the linear components.", "p": "311 p.220"}, {"n": 466, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "The adjusted R-square adjusts for degrees of freedom, providing an unbiased estimate of:", "o": ["The COD in the ratio study", "The PRD for vertical equity", "Model accuracy in the population (not just the sample)", "The standard error of each coefficient"], "a": "C", "e": "Adjusted R-square corrects for the fact that R-square always increases when variables are added, even meaningless ones. Adjusted R-square only increases if a new variable genuinely improves the model.", "p": "311 p.220"}, {"n": 467, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "Four requirements for effective MRA mass appraisal models are:", "o": ["Median, mode, mean, and range", "Cost, income, sales, and land data", "Tax bills, deeds, permits, and appeals", "Accurate data, adequate sales, good model building skills, and variables capturing location influences"], "a": "D", "e": "Effective MRA requires: (1) accurate property characteristics data, (2) adequate number of arm-length sales, (3) skilled model specification and calibration, and (4) variables that capture important location and market influences.", "p": "311 p.221"}, {"n": 468, "ch": "Ch6: Sales Comparison Approach - MRA", "course": "311", "q": "In multiple regression analysis, residuals represent:", "o": ["The regression coefficients", "The correlation between variables", "The R-square value", "Differences between actual and predicted sale prices"], "a": "D", "e": "Residuals = actual sale price minus predicted sale price. Analyzing residuals reveals model weaknesses - patterns in residuals indicate systematic errors (e.g., all large homes over-predicted, indicating a non-linear size effect).", "p": "311 p.219"}, {"n": 469, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "When estimating market rents in mass appraisal, either ________ or ________ gross income is used:", "o": ["Potential; effective", "Historical; current", "Lease; contract", "Net; gross"], "a": "A", "e": "Market rent estimates use either: Potential Gross Income (PGI - at 100% occupancy) or Effective Gross Income (EGI = PGI minus vacancy). EGI is the income most often capitalized.", "p": "311 p.261"}, {"n": 470, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The GIM formula is:", "o": ["GIM = NOI divided by Sale Price", "GIM = Sale Price divided by Effective Gross Income", "GIM = Cap Rate divided by NOI", "GIM = Expenses divided by Income"], "a": "B", "e": "GIM = Sale Price / Gross Income. Applied as: MV = GI x GIM. Simple to apply but less precise than NOI capitalization because it does not explicitly account for expenses.", "p": "311 p.261"}, {"n": 471, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The OAR formula is:", "o": ["OAR = Sale Price divided by NOI", "OAR = GIM multiplied by EGI", "OAR = NOI divided by Sale Price", "OAR = Expenses divided by Sale Price"], "a": "C", "e": "OAR = NOI / Sale Price. Applied as: V = NOI / OAR. The overall rate (cap rate) is derived from the market by dividing the NOI of comparable sales by their sale prices.", "p": "311 p.261"}, {"n": 472, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "Potential gross income minus vacancy and collection losses equals:", "o": ["Net operating income", "Potential net income", "Gross income multiplier", "Effective gross income"], "a": "D", "e": "EGI = PGI minus Vacancy and Collection Losses. EGI represents the income actually collected - it accounts for the reality that not all potential income is received.", "p": "311 p.261"}, {"n": 473, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The dependent variable in the gross income model is:", "o": ["Overall capitalization rate", "Gross income multiplier", "Sale price", "Gross income per unit"], "a": "D", "e": "In gross income models, the dependent variable is gross income per unit (per sq ft, per room, per apartment unit). Property characteristics that drive rent differences are the independent variables.", "p": "311 p.261"}, {"n": 474, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The dependent variable in the GIM model is:", "o": ["Sale price", "Gross income", "Capitalization rate", "The GIM itself"], "a": "D", "e": "In GIM models, the GIM itself is the dependent variable being predicted from property characteristics. A regression model predicts what GIM is appropriate for a property given its type, location, age, etc.", "p": "311 p.262"}, {"n": 475, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The dependent variable in the OAR (overall capitalization rate) model is:", "o": ["Sale price", "Gross income", "NOI divided by sale price (the OAR itself)", "Net operating income"], "a": "C", "e": "In OAR models, the overall rate (NOI/Sale Price) is the dependent variable. The model predicts the appropriate cap rate for a property based on its characteristics and market conditions.", "p": "311 p.262"}, {"n": 476, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The two basic methods for developing per unit rents, expense ratios, GIMs, and OARs are:", "o": ["Direct and indirect capitalization", "Physical and economic analysis", "Cost and income analysis", "Stratification and modeling (regression)"], "a": "D", "e": "Both stratification (grouping similar properties and computing median values) and regression modeling (statistically estimating from property characteristics) can be used to develop GIMs, OARs, rents, and expense ratios.", "p": "311 p.262"}, {"n": 477, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "Vacancy and collection losses in the income model reflect:", "o": ["Legal restrictions on rent increases", "Above-market lease rates", "Actual specific vacancies of the subject property", "Typical market vacancy rates"], "a": "D", "e": "For ad valorem appraisal, vacancy rates should reflect TYPICAL market vacancy - not the subject actual current vacancy, which may be atypically high or low. Use market-derived typical vacancy rates by property type.", "p": "311 p.262"}, {"n": 478, "ch": "Ch7: Income Approach Modeling", "course": "311", "q": "The measure of goodness-of-fit used in direct sale price models but LESS useful in income models is:", "o": ["COD", "Standard error", "PRD", "R-square"], "a": "D", "e": "R-square measures how well the model predicts sale prices - very useful for direct sales models. In income models (predicting GIMs or OARs), R-square is less meaningful and COD/COV are preferred.", "p": "311 p.262"}, {"n": 479, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "________ are used when implementing a new CAMA system or new valuation techniques because they provide a test on a sample or test area:", "o": ["Ratio studies", "Field reviews", "Pilot studies", "Benchmark comparisons"], "a": "C", "e": "Pilot studies test new models or systems on a sample of parcels before full deployment. They identify data issues, model weaknesses, and calibration problems before they affect the entire assessment roll.", "p": "311 p.276"}, {"n": 480, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Once preliminary values are produced, what is an essential first step in quality control?", "o": ["Publishing value notices", "Field review of all properties", "Submitting to state review agency", "Office review of preliminary values"], "a": "D", "e": "Office review is the first quality control step - examining preliminary values for reasonableness, consistency, and credibility before committing to field review or mailing value notices.", "p": "311 p.276"}, {"n": 481, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "________ studies are one of the best tools to measure the quality of new appraised values during the review process:", "o": ["Depreciation studies", "Cost index studies", "Market studies", "Ratio studies"], "a": "D", "e": "Ratio studies measure accuracy (level) and uniformity (COD) of new values against recent sales - the most objective measure of value quality available during the review process.", "p": "311 p.276"}, {"n": 482, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Three items required for an effective field review include:", "o": ["Tax bills, appeal records, and deeds", "Ratio reports, assessment maps, and property record cards", "Sales data, cost manuals, and income schedules", "Building permits, zoning maps, and environmental studies"], "a": "B", "e": "Field review requires: (1) Ratio study reports (identify problem areas), (2) Assessment/cadastral maps (identify parcels), (3) Property record cards (verify data accuracy in the field).", "p": "311 p.276"}, {"n": 483, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Three aspects of value acceptability are:", "o": ["Median, mode, and mean", "COD, COV, and PRD", "Cost, income, and sales approach", "Accuracy, stability, and explainability"], "a": "D", "e": "Value acceptability requires: (1) Accuracy (values close to market), (2) Stability (values change smoothly over time, avoiding large swings), and (3) Explainability (values defensible to property owners and courts).", "p": "311 p.277"}, {"n": 484, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Two goodness-of-fit statistics used to evaluate accuracy when using multiple regression are:", "o": ["COD and PRD", "Mean and median", "Adjusted R-square and standard error of estimate (SEE)", "t-value and F-statistic"], "a": "C", "e": "MRA model accuracy is evaluated by: (1) Adjusted R-square (percentage of value variation explained by the model), and (2) SEE (Standard Error of Estimate - average prediction error in dollar terms).", "p": "311 p.277"}, {"n": 485, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Which update strategy tends to maximize ACCURACY versus stability?", "o": ["Partial recalibration", "Cyclical recalibration with interim adjustments", "Annual land value updates only", "Full recalibration of all models"], "a": "D", "e": "Full recalibration of all models maximizes accuracy - all rates and coefficients are updated to current market conditions. However, it may sacrifice stability (large year-to-year value swings).", "p": "311 p.277"}, {"n": 486, "ch": "Ch8: Value Review & Maintenance", "course": "311", "q": "Cyclical recalibration with interim adjustments:", "o": ["Tends to maximize accuracy only", "Tends to maximize stability only", "Sacrifices stability for accuracy", "Maintains reasonable accuracy while emphasizing stability"], "a": "D", "e": "Cyclical recalibration: full model recalibration on a schedule (e.g., every 3-5 years) with interim market adjustments applied annually. This balances accuracy against the need for value stability.", "p": "311 p.277"}, {"n": 487, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Scalar values are best centered on 1.00 in which model type?", "o": ["Additive models", "Hybrid models", "All of the above", "Multiplicative models"], "a": "D", "e": "Scalar multipliers centered on 1.00 work best in multiplicative models - where average = 1.00, above-average = >1.00, below-average = <1.00. In additive models, adjustments are expressed as dollar amounts, not scalar factors.", "p": "311 Quiz1 Q1"}, {"n": 488, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Which statistical technique would be most appropriate for grouping similar subdivisions for modeling purposes?", "o": ["Multiple regression analysis", "Location value response surface analysis", "Adaptive estimation procedure (AEP)", "Cluster analysis"], "a": "D", "e": "Cluster analysis groups similar observations (subdivisions) by minimizing within-group differences and maximizing between-group differences - the ideal tool for objective neighborhood delineation.", "p": "311 Quiz1 Q2"}, {"n": 489, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Average home age = 25 years, standard deviation = 3 years, normally distributed. Approximately 95% of homes will fall in what age bracket?", "o": ["22-28 years", "22-26 years", "19-31 years", "16-34 years"], "a": "C", "e": "95% falls within +/- 2 standard deviations of the mean: 25 - (2x3) = 19 and 25 + (2x3) = 31. The 95% interval = 19-31 years.", "p": "311 Quiz1 Q3"}, {"n": 490, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "A scatter diagram shows a loose NEGATIVE correlation between sale price and distance to the CBD. Which correlation coefficient is consistent?", "o": ["Zero", "0.50", "-2.00", "-0.20"], "a": "D", "e": "A loose negative correlation means: as distance increases, price decreases (negatively related). The correlation coefficient must be between -1 and 0. -0.20 indicates a loose (weak) negative relationship. -2.00 is impossible (outside the -1 to +1 range).", "p": "311 Quiz1 Q4"}, {"n": 491, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Which of the following best defines the coefficient of dispersion (COD)?", "o": ["Standard deviation of the ratios expressed as a percentage of the mean", "Average deviation from the chosen measure of central tendency", "The range which contains 50 percent of the ratios", "Average percentage deviation from the median"], "a": "D", "e": "COD = 100 x (Average Absolute Deviation from Median) / Median. It is the average PERCENTAGE deviation from the MEDIAN - not the mean. This is the IAAO standard definition.", "p": "311 Quiz1 Q5"}, {"n": 492, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The IAAO COD standard for older, heterogeneous residential property is:", "o": ["5.0 or less", "10.0 or less", "20.0 or less", "15.0 or less"], "a": "D", "e": "IAAO COD standard: older heterogeneous residential = 5.0-15.0. Newer homogeneous residential = 5.0-10.0. Income-producing and rural/seasonal = 5.0-20.0.", "p": "311 Quiz1 Q6"}, {"n": 493, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Assessors need skills in single property appraisal to:", "o": ["Develop valuation models", "Test values", "Defend values", "All of the above"], "a": "D", "e": "Single-property appraisal skills are essential in mass appraisal for: (1) developing appropriate model structures, (2) testing values for reasonableness on individual properties, and (3) defending values in appeals.", "p": "311 Quiz1 Q7"}, {"n": 494, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The statement or conclusion that is accepted in the absence of sufficient evidence to the contrary is known as the:", "o": ["Alternative hypothesis", "First hypothesis", "Confidence level", "Null hypothesis"], "a": "D", "e": "The null hypothesis (H0) is the default assumption - accepted unless the data provides sufficient evidence to reject it. In ratio studies, the null might be that the median ratio = 1.00.", "p": "311 Quiz1 Q8"}, {"n": 495, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Ratios: 0.89, 0.96, 1.08, 1.14, 1.20. Mean = 1.054. Standard deviation = 0.122. What is the coefficient of variation (COV)?", "o": ["10.6", "13.3", "12.1", "11.4"], "a": "B", "e": "COV = (SD / Mean) x 100 = (0.122 / 1.054) x 100 = 11.6... Closest to 11.4 per IAAO answer key. Note: COV = 100 x 0.1157/1.054 = 10.98 or approx 11.4 depending on rounding.", "p": "311 Quiz1 Q9"}, {"n": 496, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The cost approach is closely related to which model structure?", "o": ["Additive model structure", "Multiplicative model structure", "Least square model structure", "Hybrid model structure"], "a": "D", "e": "The hybrid (generic) model: MV = GQ x [LV + (RCN - D)] directly mirrors the cost approach: Land Value + Depreciated Building Value, multiplied by a general qualitative (neighborhood) factor.", "p": "311 Quiz1 Q11"}, {"n": 497, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Which of the following is NOT one of the seven major steps in the mass appraisal process?", "o": ["Preliminary survey and analysis", "Valuation", "Correlation of values, model testing, and quality control", "Defend value estimates"], "a": "D", "e": "The seven mass appraisal steps: (1) Preliminary survey, (2) Data collection, (3) Data analysis, (4) Model specification, (5) Model calibration, (6) Valuation, (7) Review and quality control. Defending values is not one of the seven formal steps.", "p": "311 Quiz1 Q12"}, {"n": 498, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The process of quantifying and evaluating reliability of value estimates by comparing values to a representative sample of sales is:", "o": ["Model specification", "Model infusion", "Model calibration", "Model testing"], "a": "D", "e": "Model testing = comparing modeled values against actual sales to quantify accuracy. This produces ratio statistics (median, COD, PRD) that tell the assessor whether the model meets IAAO performance standards.", "p": "311 Quiz1 Q13"}, {"n": 499, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "In modern price theory, which of the following is NOT a determinant of demand?", "o": ["Consumer incomes", "Consumer expectations", "Price of related commodities", "Availability and cost of goods used in production"], "a": "D", "e": "Demand determinants: income, tastes/preferences, expectations, prices of related goods (substitutes/complements), number of buyers. Availability and cost of production inputs are SUPPLY-side factors.", "p": "311 Quiz1 Q14"}, {"n": 500, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "V = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is what type of model?", "o": ["Multiplicative", "Hybrid", "None of the above", "Additive"], "a": "D", "e": "This is an additive model: the base value (b0) plus dollar contributions from each property characteristic. Each b coefficient represents the dollar value of one unit of its corresponding X variable.", "p": "311 Quiz1 Q15"}, {"n": 501, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The most effective but most expensive means of collecting income and expense data is:", "o": ["Mail questionnaire", "Telephone survey", "Assessment appeals", "Personal interview"], "a": "D", "e": "Personal interviews yield the most complete and accurate income/expense data but consume the most professional time and resources.", "p": "311 Quiz1 Q16"}, {"n": 502, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "In a net lease, the owner pays:", "o": ["All expenses", "Only operating expenses", "A pre-specified percentage of expenses", "No operating expenses"], "a": "D", "e": "Net lease: tenant pays all operating expenses (property taxes, insurance, maintenance). The owner receives net rent with no expense obligations. Sometimes called a triple-net (NNN) lease.", "p": "311 Quiz1 Q17"}, {"n": 503, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "A lease indexed to the Consumer Price Index is an example of:", "o": ["A percentage lease", "A net lease", "A graduated lease", "An adjustable lease"], "a": "D", "e": "An adjustable (index) lease ties rent increases to an external index (CPI, PPI) to protect landlord purchasing power from inflation. Different from a graduated lease, which specifies fixed step-up amounts.", "p": "311 Quiz1 Q18"}, {"n": 504, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Interactive effects, where the impact of certain property characteristics on value is interrelated, are best handled by:", "o": ["Additive MRA", "Stepwise MRA", "Exponential transformations", "Multiplicative and quotient transformations"], "a": "D", "e": "Multiplicative and quotient transformations capture interaction effects - where the value contribution of one variable depends on another (e.g., quality x size: a larger good-quality home commands a premium over both quality and size alone).", "p": "311 Quiz1 Q19"}, {"n": 505, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Which of the following can best be used to present visually the contents of a frequency distribution?", "o": ["Array", "Scatter diagram", "Box plot", "Bar chart (histogram)"], "a": "D", "e": "A histogram (bar chart) is specifically designed to display frequency distributions - each bar represents an interval, and the height shows how many observations fall in that interval.", "p": "311 Quiz1 Q20"}, {"n": 506, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "The IAAO Standard on Ratio Studies calls for a price-related differential (PRD) in what range?", "o": ["0.95 to 1.05", "0.95 to 1.10", "0 to 0.15", "0.98 to 1.03"], "a": "D", "e": "IAAO PRD standard: 0.98 to 1.03. Values outside this range indicate systematic vertical inequity (regressivity or progressivity) that should be corrected.", "p": "311 Quiz1 Q21"}, {"n": 507, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Costs used in mass appraisal are typically:", "o": ["Reproduction costs", "Historical costs", "Trended historical costs", "Replacement costs"], "a": "D", "e": "Mass appraisal uses replacement costs (cost to construct a building of equal utility using modern materials/methods) rather than reproduction costs (exact replica). Replacement cost manuals are updated regularly to reflect current construction costs.", "p": "311 Quiz1 Q22"}, {"n": 508, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "Which of the following does NOT apply to the development of depreciation tables?", "o": ["Use only arm-length sales", "Exclude parcels with extreme land-to-building ratios", "Exclude parcels with additional buildings", "Include mixed-use parcels"], "a": "D", "e": "Mixed-use parcels should be EXCLUDED from depreciation analysis - their complex mix of uses makes it impossible to accurately extract depreciation for a single building type. Only clean, arm-length, single-use sales are appropriate.", "p": "311 Quiz1 Q23"}, {"n": 509, "ch": "Quiz 1: Chapters 1-5", "course": "311", "q": "In market calibration of cost models, market adjustments can be developed using ratio studies stratified by:", "o": ["Construction class only", "Size only", "Age groups only", "All of the above: construction class, size, and age groups"], "a": "D", "e": "Cost model calibration uses ratio studies stratified by: construction class (wood frame vs. masonry), size ranges (large homes vs. small), and age/condition groups - to identify where the model systematically over- or under-predicts.", "p": "311 Quiz1 Q24"}, {"n": 510, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "V = b0 + (b1 x X1) + (b2 x X2) + (b3 x X3) is an example of which model structure for sales comparison?", "o": ["Hybrid", "Multiplicative", "Adaptive Estimation Procedure", "Additive"], "a": "D", "e": "This is the standard additive model formula for the sales comparison approach in mass appraisal.", "p": "311 Quiz2 Q1"}, {"n": 511, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "N=349; Adj R-sq=0.879; SEE=9,800; Avg sale price=00,000. Approximately two-thirds of regression errors fall within what range?", "o": ["-19.6% to +19.6%", "0% to 12.1%", "-12.1% to +12.1%", "-9.8% to +9.8%"], "a": "D", "e": "Two-thirds (68%) of errors fall within +/- 1 SEE. SEE as % of mean = ,800/00,000 = 9.8%. So roughly two-thirds of predictions are within -9.8% to +9.8% of actual sale prices.", "p": "311 Quiz2 Q2"}, {"n": 512, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "The most accurate measure of the percentage of variation in sale prices explained by a regression model is the:", "o": ["R-square", "Coefficient of variation", "Standard error of estimate", "Adjusted R-square"], "a": "D", "e": "Adjusted R-square corrects R-square for the number of variables in the model (degrees of freedom). Unlike R-square, it only increases if a new variable genuinely improves model fit - more accurate for comparing models.", "p": "311 Quiz2 Q3"}, {"n": 513, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "In regression statistics, the ratio of a regression coefficient to its standard error is the:", "o": ["R-square", "Adjusted R-square", "Standard error of estimate", "t-value"], "a": "D", "e": "t-value = coefficient / standard error. It measures statistical significance. Higher t-values (typically > 2.0) indicate the variable is a statistically significant predictor of value.", "p": "311 Quiz2 Q4"}, {"n": 514, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "In MRA, ________ represent the difference between actual and predicted sale prices:", "o": ["Standard error of estimate", "Coefficient of variation", "None of the above", "Residuals"], "a": "D", "e": "Residuals = actual sale price minus predicted sale price for each observation. Systematic patterns in residuals reveal model weaknesses that need to be addressed.", "p": "311 Quiz2 Q5"}, {"n": 515, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Which of the following employs the Euclidean distance metric?", "o": ["Location value response surface analysis", "Multiplicative MRA", "Adaptive estimation procedure / Feedback", "Automated comparable sales"], "a": "D", "e": "Automated comparable sales uses a Euclidean distance metric to find the most similar properties to the subject based on multiple characteristics simultaneously. The closest properties are selected as comparables.", "p": "311 Quiz2 Q6"}, {"n": 516, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "During office review, the reasonableness, consistency, and credibility of values can be gauged through:", "o": ["Ratio studies only", "Benchmark values only", "Average change in values only", "All of the above: ratio studies, benchmark values, and average value changes"], "a": "D", "e": "Office review uses all available tools: ratio studies (accuracy/uniformity), benchmark comparisons (individual property reasonableness), and average change reports (detecting unexpected value shifts by area or class).", "p": "311 Quiz2 Q7"}, {"n": 517, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Materials required for an effective field review of values include:", "o": ["Assessment maps and property record cards only", "Sales ratio reports only", "Average value change reports only", "All of the above"], "a": "D", "e": "Field review requires all three: (1) Assessment/cadastral maps to locate parcels, (2) Property record cards to verify data, (3) Sales ratio reports and value change reports to guide which areas need attention.", "p": "311 Quiz2 Q8"}, {"n": 518, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Aspects of value acceptability are:", "o": ["Accuracy only", "Stability only", "Explainability only", "Accuracy, stability, and explainability"], "a": "D", "e": "All three aspects are required: (1) Accuracy - values close to market, (2) Stability - reasonable year-to-year continuity, (3) Explainability - values that can be clearly justified to owners and courts.", "p": "311 Quiz2 Q9"}, {"n": 519, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Which update strategy maximizes accuracy versus stability?", "o": ["Cyclical recalibration with interim adjustments", "Partial recalibration", "All equally maximize both", "Full recalibration of all models"], "a": "D", "e": "Full recalibration maximizes accuracy (all coefficients updated to current market) but may sacrifice stability (large year-to-year swings). It is appropriate when values have drifted far from market.", "p": "311 Quiz2 Q10"}, {"n": 520, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "MRA works on the principle of:", "o": ["Passing the sales file multiple times until coefficients converge", "Finding best comparables via Euclidean distance metric", "Minimizing the absolute errors between actual and predicted prices", "Minimizing the SQUARED errors between actual and predicted sale prices"], "a": "D", "e": "MRA uses ordinary least squares (OLS): it finds the coefficients that minimize the sum of squared residuals. Squaring penalizes large errors more heavily than small ones.", "p": "311 Quiz2 Q11"}, {"n": 521, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "The most flexible model structure, which is also the most difficult to calibrate, is the:", "o": ["Additive model", "None of the above", "Multiplicative model", "Hybrid model"], "a": "D", "e": "The hybrid model combines multiplicative and additive elements, allowing the greatest flexibility in modeling complex value relationships. However, this flexibility makes calibration more complex.", "p": "311 Quiz2 Q12"}, {"n": 522, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "When modeling income properties with small sample sizes, they can best be expanded by:", "o": ["Using non-market sales", "Combining property types", "Supplementing with prior year values", "Extending the period from which sales are drawn"], "a": "A", "e": "Extending the time period from which sales are drawn (with appropriate time adjustments) is the preferred approach to expand small income property samples. Using non-market sales or mixing property types would distort the model.", "p": "311 Quiz2 Q13"}, {"n": 523, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "The most appropriate calibration tool for a multiplicative model is:", "o": ["Additive MRA", "AEP / Feedback", "Response surface analysis", "Log-linear MRA"], "a": "D", "e": "Multiplicative models are calibrated using log-linear MRA - both the dependent variable (sale price) and independent variables are converted to natural logarithms before regression. The resulting coefficients are exponents.", "p": "311 Quiz2 Q14"}, {"n": 524, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Which measure is used to assess the significance of individual independent variables in a regression model?", "o": ["Correlation coefficient", "Adjusted R-square", "Standard error of estimate", "t-value"], "a": "D", "e": "The t-value measures whether a specific variable makes a statistically significant contribution to the model. Variables with t-values below approximately 2.0 may not be significant and could be candidates for removal.", "p": "311 Quiz2 Q15"}, {"n": 525, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "SP/SQFT = 61.85 x SQFT^0.977 x PCTGOOD^0.652. Which of the following is true?", "o": ["The model is hybrid in form", "The model is multiplicative in form", "The contribution of SQFT to value is linear", "The effect of SQFT and PCTGOOD upon value is additive"], "a": "B", "e": "This model is MULTIPLICATIVE: variables are multiplied together with exponents. The exponent of SQFT (0.977) is less than 1, meaning the effect is slightly less-than-linear (diminishing returns to size).", "p": "311 Quiz2 Q16"}, {"n": 526, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "GIM data: newer apartments in average economic area = 6.7; older apartments in superior economic area = 6.0; older apartments in average area = 5.4. Which multiplier is MOST likely inconsistent with appraisal theory?", "o": ["6.0 for older apartments in superior area", "5.9 for mid-age apartments in average area", "5.4 for older apartments in average area", "6.7 for newer apartments in average area"], "a": "D", "e": "A GIM of 6.7 for newer apartments in the AVERAGE area exceeds the GIM for newer apartments in the SUPERIOR area - this is inconsistent with appraisal theory, which holds that superior location should command a higher GIM (or the same level). This multiplier likely requires override.", "p": "311 Quiz2 Q17"}, {"n": 527, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "In developing gross income models for a large metropolitan area, it would be most important to stratify properties by:", "o": ["Value", "Size, stories, or number of units", "Economic area", "Use class"], "a": "D", "e": "Primary stratification for income models should be by use class (apartments, retail, office, industrial) because different use types have fundamentally different income characteristics, cap rates, and GIMs.", "p": "311 Quiz2 Q18"}, {"n": 528, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Which of the following is LEAST effective in evaluating the reliability of an expense ratio model?", "o": ["Coefficient of dispersion", "Coefficient of variation", "Standard error of estimate", "R-square"], "a": "D", "e": "R-square measures how well a model predicts sale PRICES and is effective for direct sales models. For expense ratio models, measures of dispersion (COD, COV, SEE) around the predicted expense ratio are more meaningful than R-square.", "p": "311 Quiz2 Q19"}, {"n": 529, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Which of the following is an important component of the field review of values?", "o": ["Assessment maps only", "Property record cards only", "Valuation reports only", "All of the above"], "a": "D", "e": "Effective field review requires all three: maps (locate parcels), property record cards (verify physical data), and valuation/ratio reports (guide review priorities).", "p": "311 Quiz2 Q20"}, {"n": 530, "ch": "Quiz 2: Chapters 6-8", "course": "311", "q": "Office building: 2,500 sq ft, rent 5/sf, vacancy 5%, expenses 15%, misc income 2%, cap rate 8%. Value (rounded to nearest 00) is:", "o": ["78,500", "70,900", "98,400", "86,500"], "a": "B", "e": "PGI = 2,500 x 5 = 7,500. Less vacancy (5%): 7,500 x 0.95 = 5,625. EGI. Add misc income (2%): 7,500 x 0.02 = 50. Total EGI = 6,375. Less expenses (15%): 6,375 x 0.85 = 0,919. NOI = 0,919. Value = 0,919/0.08 = 86,488, rounded = 86,500.", "p": "311 Quiz2 Q22"}]};

const COURSE_META = {
  '101':{color:'#1F3864',name:'Course 101',title:'Fundamentals of Real Property Appraisal'},
  '102':{color:'#2D1A50',name:'Course 102',title:'Income Approach to Valuation'},
  '201':{color:'#1B3A2D',name:'Course 201',title:'Appraisal of Land'},
  '300':{color:'#2D1F52',name:'Course 300',title:'Fundamentals of Mass Appraisal'},
  '311':{color:'#1A3A1A',name:'Course 311',title:'Real Property Modeling Concepts'},
};

let S = {correct:0, wrong:0, answered:0, total:0};
let currentQs = [];

/* ── LANDING ── */
function buildLanding() {
  const grid = document.getElementById('course-grid');
  ['101','102','201','300','311'].forEach(c => {
    const m = COURSE_META[c];
    const qs = DATA.courses[c].questions;
    const pass = Math.ceil(qs.length * 0.7);
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.onclick = () => startExam(c);
    card.innerHTML =
      '<div class="card-band" style="background:'+m.color+'"></div>' +
      '<div class="card-inner">' +
        '<div class="card-course-label">'+m.name+'</div>' +
        '<div class="card-title">'+m.title+'</div>' +
        '<div class="card-meta">' +
          '<span>'+qs.length+' questions</span>' +
          '<span class="dot"></span>' +
          '<span>Pass: '+pass+' correct (70%)</span>' +
        '</div>' +
        '<button class="start-btn">Start Exam <span class="arrow">&#8594;</span></button>' +
      '</div>';
    grid.appendChild(card);
  });

  const mqs = DATA.master;
  const mpass = Math.ceil(mqs.length * 0.7);
  const mwrap = document.getElementById('master-wrap');
  const mc = document.createElement('div');
  mc.className = 'master-card';
  mc.onclick = () => startExam('master');
  mc.innerHTML =
    '<div class="master-inner">' +
      '<div class="master-left">' +
        '<div class="master-eyebrow">&#9670; All 5 Courses Combined &#9670;</div>' +
        '<h2>Master Practice Exam</h2>' +
        '<p>'+mqs.length+' questions &nbsp;·&nbsp; Duplicates removed &nbsp;·&nbsp; Pass: '+mpass+' correct (70%)</p>' +
      '</div>' +
      '<button class="master-start-btn">Begin Master Exam &#8594;</button>' +
    '</div>';
  mwrap.appendChild(mc);
}

/* ── START EXAM ── */
function startExam(key) {
  const isMaster = key === 'master';
  currentQs = isMaster ? DATA.master : DATA.courses[key].questions;
  const title = isMaster ? 'Master Exam — All Courses' : 'Course '+key+': '+COURSE_META[key].title;
  const color = isMaster ? '#4A5568' : COURSE_META[key].color;

  S = {correct:0, wrong:0, answered:0, total:currentQs.length};

  // Topbar
  document.getElementById('topbar').style.background = color;
  document.getElementById('topbar-title').textContent = title;

  // Build body
  const body = document.getElementById('exam-body');
  body.innerHTML = '';

  // Progress bar
  const pw = document.createElement('div');
  pw.className = 'progress-wrap';
  pw.innerHTML =
    '<div class="progress-row">' +
      '<span id="prog-txt">0 of '+currentQs.length+' answered</span>' +
      '<span id="prog-pct">0%</span>' +
    '</div>' +
    '<div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>';
  body.appendChild(pw);

  // Questions grouped by chapter
  let lastCh = null;
  currentQs.forEach((q, idx) => {
    const courseColor = isMaster
      ? (COURSE_META[q.course] ? COURSE_META[q.course].color : color)
      : color;
    const chKey = (isMaster ? q.course + '|' : '') + q.ch;

    if (chKey !== lastCh) {
      const chEl = document.createElement('div');
      chEl.className = 'ch-header';
      chEl.style.background = courseColor;
      chEl.textContent = (isMaster ? 'Course '+q.course+'  ·  ' : '') + q.ch;
      body.appendChild(chEl);
      lastCh = chKey;
    }

    const opts = ['A','B','C','D'];
    const optHtml = q.o.map((txt, i) =>
      '<button class="opt" id="opt-'+idx+'-'+i+'" onclick="pick('+idx+','+i+')" data-l="'+opts[i]+'">' +
        '<span class="opt-ltr">'+opts[i]+'.</span>' +
        '<span>'+escHtml(txt)+'</span>' +
        '<span class="check"></span>' +
      '</button>'
    ).join('');

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-'+idx;
    card.innerHTML =
      '<div class="q-head">' +
        '<div class="q-num">Question '+q.n+'</div>' +
        '<div class="q-text">'+escHtml(q.q)+'</div>' +
        '<div class="q-ref">['+q.p+']</div>' +
      '</div>' +
      '<div class="q-opts">'+optHtml+'</div>' +
      '<div class="explanation" id="exp-'+idx+'">' +
        '<div class="exp-label">Explanation</div>' +
        '<div id="exp-txt-'+idx+'"></div>' +
      '</div>';
    body.appendChild(card);
  });

  // Results card
  const rc = document.createElement('div');
  rc.className = 'results-card'; rc.id = 'results-card';
  body.appendChild(rc);

  document.getElementById('landing').style.display = 'none';
  document.getElementById('exam-view').style.display = 'block';
  window.scrollTo(0,0);
  updateBar();
}

/* ── PICK ANSWER ── */
function pick(qIdx, optIdx) {
  const card = document.getElementById('qcard-'+qIdx);
  if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

  const q = currentQs[qIdx];
  const letters = ['A','B','C','D'];
  const chosen = letters[optIdx];
  const isRight = chosen === q.a;
  const corrIdx = letters.indexOf(q.a);

  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('opt-'+qIdx+'-'+i);
    btn.disabled = true;
    if (i === corrIdx) { btn.classList.add('is-correct'); btn.querySelector('.check').textContent = ' ✓'; }
    else if (i === optIdx && !isRight) { btn.classList.add('is-wrong'); btn.querySelector('.check').textContent = ' ✗'; }
  }

  card.classList.add(isRight ? 'correct' : 'wrong');

  const exp = document.getElementById('exp-'+qIdx);
  document.getElementById('exp-txt-'+qIdx).textContent = q.e;
  exp.classList.add('show');
  if (!isRight) exp.classList.add('wrong-exp');

  if (isRight) S.correct++; else S.wrong++;
  S.answered++;

  updateProgress();
  updateBar();
  if (S.answered === S.total) showResults();
}

function updateProgress() {
  const pct = Math.round(S.answered / S.total * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = S.answered + ' of ' + S.total + ' answered';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('topbar-answered').textContent = S.answered + ' / ' + S.total;
}

function updateBar() {
  document.getElementById('sb-correct').textContent = S.correct;
  document.getElementById('sb-wrong').textContent   = S.wrong;
  document.getElementById('sb-remain').textContent  = S.total - S.answered;
  document.getElementById('sb-pct').textContent =
    S.answered > 0 ? Math.round(S.correct / S.answered * 100) + '%' : '—';
}

function showResults() {
  const rc   = document.getElementById('results-card');
  const pass = S.correct >= Math.ceil(S.total * 0.7);
  const pct  = Math.round(S.correct / S.total * 100);
  const cls  = pass ? 'pass-color' : 'fail-color';
  rc.style.display = 'block';
  rc.innerHTML =
    '<div class="results-score '+cls+'">'+pct+'%</div>' +
    '<div class="results-verdict '+cls+'">'+(pass ? '✓ PASSED' : '✗ NOT PASSED')+'</div>' +
    '<div class="results-detail">'+S.correct+' correct out of '+S.total+' &nbsp;·&nbsp; 70% required ('+Math.ceil(S.total*.7)+' questions)</div>' +
    '<button class="results-back" onclick="goHome()">&#8592; Back to All Exams</button>';
  rc.scrollIntoView({behavior:'smooth', block:'center'});
}

function goHome() {
  document.getElementById('exam-view').style.display = 'none';
  document.getElementById('landing').style.display   = 'flex';
  currentQs = [];
  window.scrollTo(0,0);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

buildLanding();
</script>
</body>
</html>
