<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RES Case Study / Master Exam Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-dk: #A8832A;
  --gold-lt: #FEF6E0;
  --slate: #4A5568;
  --correct: #2E7D32;
  --correct-bg: #F1F8E9;
  --correct-border: #81C784;
  --wrong: #B71C1C;
  --wrong-bg: #FFF3F3;
  --wrong-border: #EF9A9A;
  --exp-bg: #FFFBF0;
  --exp-border: #C9A84C;
  --surface: #FFFFFF;
  --page-bg: #F2F4F7;
  --text: #1A1A2E;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--page-bg);
  color: var(--text);
  line-height: 1.6;
}

/* ═══════════════════════════════════
   LANDING PAGE
═══════════════════════════════════ */
#landing { display: flex; flex-direction: column; min-height: 100vh; }

.hero {
  background: var(--slate);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 50%);
  padding: 64px 32px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 80px,
    rgba(255,255,255,0.015) 80px,
    rgba(255,255,255,0.015) 81px
  );
  pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 6px 18px; border-radius: 20px;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  color: #FFFFFF;
  line-height: 1.15;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.hero h1 span { color: var(--gold); }
.hero p {
  color: rgba(255,255,255,0.6);
  font-size: 1rem;
  max-width: 520px;
  margin: 0 auto;
}

.grid-wrap {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 24px 60px;
  width: 100%;
}
.grid-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 16px;
}
.course-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}
.exam-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.exam-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--gold);
}
.card-band {
  height: 6px;
}
.card-inner { padding: 20px 22px 22px; }
.card-course-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 6px;
}
.card-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.05rem; font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.3;
}
.card-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 16px;
}
.card-meta span {
  display: flex; align-items: center; gap: 4px;
}
.card-meta .dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; }
.start-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold);
  color: #1a1100;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: 13px;
  padding: 9px 20px; border-radius: 6px;
  border: none; cursor: pointer;
  transition: background .15s, transform .1s;
}
.start-btn:hover { background: var(--gold-dk); transform: translateX(2px); }
.start-btn .arrow { transition: transform .15s; }
.start-btn:hover .arrow { transform: translateX(3px); }

/* Master card */
.master-card {
  background: var(--slate);
  background-image: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.1) 0%, transparent 70%);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.master-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--gold);
}
.master-inner { padding: 28px 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.master-left .master-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 8px;
}
.master-left h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.4rem; font-weight: 800;
  color: #FFFFFF; margin-bottom: 8px;
}
.master-left p { font-size: 13px; color: rgba(255,255,255,0.55); }
.master-start-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold);
  color: #1a1100;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: 14px;
  padding: 12px 28px; border-radius: 8px;
  border: none; cursor: pointer;
  white-space: nowrap;
  transition: background .15s, transform .1s;
}
.master-start-btn:hover { background: var(--gold-dk); transform: scale(1.03); }

/* ═══════════════════════════════════
   EXAM VIEW
═══════════════════════════════════ */
#exam-view { display: none; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 28px;
  color: white;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  gap: 12px;
}
.topbar .back-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: white; font-family: 'Source Sans 3', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 7px 16px; border-radius: 6px; cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.topbar .back-btn:hover { background: rgba(255,255,255,0.22); }
.topbar .exam-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1rem; font-weight: 700;
  flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar .answered-pill {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}

.exam-body { max-width: 800px; margin: 0 auto; padding: 32px 20px 120px; }

/* Progress */
.progress-wrap { margin-bottom: 32px; }
.progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .5s ease; width: 0%; }

/* Chapter header */
.ch-header {
  color: white;
  padding: 9px 16px;
  border-radius: 7px 7px 0 0;
  font-size: 12px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase;
  margin-top: 32px;
}
.ch-header:first-of-type { margin-top: 0; }

/* Question card */
.q-card {
  background: var(--surface);
  border-radius: 0 0 8px 8px;
  box-shadow: var(--shadow);
  margin-bottom: 4px;
  border: 2px solid var(--border);
  transition: border-color .25s;
}
.q-card.correct { border-color: var(--correct-border); }
.q-card.wrong   { border-color: var(--wrong-border); }

.q-head {
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
  background: #FAFBFD;
}
.q-num { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.q-text {
  font-size: .97rem; font-weight: 600; color: var(--text);
  line-height: 1.55;
}
.q-ref { font-size: 11px; color: #AAA; margin-top: 5px; font-style: italic; }

.q-opts { padding: 14px 18px 6px; display: flex; flex-direction: column; gap: 8px; }

.opt {
  display: flex; align-items: flex-start; gap: 12px;
  background: #FAFAFA;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 11px 14px;
  cursor: pointer; text-align: left; width: 100%;
  font-family: 'Source Sans 3', sans-serif;
  font-size: .93rem; color: #333; line-height: 1.5;
  transition: background .12s, border-color .12s, transform .1s;
}
.opt:hover:not(:disabled) {
  background: #EEF2F8;
  border-color: #9BAEC8;
  transform: translateX(3px);
}
.opt-ltr {
  font-weight: 700; min-width: 20px;
  color: var(--text-muted); margin-top: 1px; flex-shrink: 0;
}
.opt.is-correct {
  background: var(--correct-bg);
  border-color: var(--correct-border);
  color: var(--correct);
}
.opt.is-correct .opt-ltr { color: var(--correct); }
.opt.is-wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong-border);
  color: var(--wrong);
}
.opt.is-wrong .opt-ltr { color: var(--wrong); }
.opt:disabled { cursor: default; }
.opt .check { margin-left: auto; font-size: 15px; flex-shrink: 0; }

/* Explanation */
.explanation {
  display: none;
  margin: 6px 18px 16px;
  padding: 13px 16px;
  background: var(--exp-bg);
  border-left: 3px solid var(--exp-border);
  border-radius: 0 6px 6px 0;
  font-size: .875rem; color: #4A3800; line-height: 1.6;
}
.explanation.show { display: block; animation: fadeIn .25s ease; }
.explanation.wrong-exp { background: #FFFBF0; border-left-color: #E67E22; }
.exp-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-dk); margin-bottom: 5px; }

/* Results */
.results-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 40px 32px;
  text-align: center;
  margin-top: 40px;
  display: none;
  animation: fadeIn .4s ease;
}
.results-score { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 800; line-height: 1; }
.results-verdict { font-size: 1.1rem; font-weight: 700; margin: 10px 0 6px; letter-spacing: .5px; }
.results-detail { font-size: .95rem; color: var(--text-muted); }
.pass-color { color: var(--correct); }
.fail-color { color: var(--wrong); }
.results-back {
  margin-top: 24px;
  background: var(--gold); color: #1a1100;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: .95rem;
  padding: 12px 32px; border-radius: 8px;
  border: none; cursor: pointer;
  transition: background .15s;
}
.results-back:hover { background: var(--gold-dk); }

/* Sticky footer score bar */
.score-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(26, 26, 46, 0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 32px;
  display: flex; align-items: center; justify-content: center; gap: 40px;
}
.sb-item { text-align: center; }
.sb-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; line-height: 1; }
.sb-lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .55; margin-top: 2px; color: white; }
.sb-correct  .sb-num { color: #81C784; }
.sb-wrong    .sb-num { color: #EF9A9A; }
.sb-remain   .sb-num { color: #FFD54F; }
.sb-pct      .sb-num { color: white; }
.sb-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.12); }

@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

@media (max-width: 600px) {
  .hero { padding: 44px 20px 40px; }
  .topbar { padding: 11px 16px; }
  .topbar .exam-title { font-size: .85rem; }
  .score-bar { gap: 20px; padding: 10px 16px; }
  .grid-wrap { padding: 28px 14px 48px; }
}
</style>
</head>
<body>

<!-- ══════ LANDING ══════ -->
<div id="landing">
  <div class="hero">
    <div class="hero-eyebrow">&#9670; RES Exam Prep &#9670;</div>
    <h1>RES Case Study &amp;<br><span>Master Exam Practice</span></h1>
    <p>Select a course below. Answers are revealed immediately after each selection — no waiting until the end.</p>
  </div>
  <div class="grid-wrap">
    <div class="grid-label">Individual Course Exams</div>
    <div class="course-grid" id="course-grid"></div>
    <div class="grid-label" style="margin-top:8px">Comprehensive</div>
    <div id="master-wrap"></div>
  </div>
</div>

<!-- ══════ EXAM VIEW ══════ -->
<div id="exam-view">
  <div class="topbar" id="topbar">
    <button class="back-btn" onclick="goHome()">&#8592; Exams</button>
    <span class="exam-title" id="topbar-title"></span>
    <span class="answered-pill" id="topbar-answered">0 / 0</span>
  </div>
  <div class="exam-body" id="exam-body"></div>
  <div class="score-bar">
    <div class="sb-item sb-correct">
      <div class="sb-num" id="sb-correct">0</div>
      <div class="sb-lbl">Correct</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item sb-wrong">
      <div class="sb-num" id="sb-wrong">0</div>
      <div class="sb-lbl">Wrong</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item sb-remain">
      <div class="sb-num" id="sb-remain">—</div>
      <div class="sb-lbl">Left</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item sb-pct">
      <div class="sb-num" id="sb-pct">—</div>
      <div class="sb-lbl">Score</div>
    </div>
  </div>
</div>

<script>
const DATA = {"courses": {"101": {"title": "Fundamentals of Real Property Appraisal", "questions": [{"n": 1, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The property tax is an ad valorem tax, meaning it is based on:", "o": ["The income generated by the property", "Value", "The cost to replace the property", "The original purchase price"], "a": "B", "e": "Ad valorem means according to value. The property tax is levied as a percentage of estimated market value.", "p": "101 p.5"}, {"n": 2, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The three basic responsibilities of the assessor are to:", "o": ["Collect taxes, issue permits, and record deeds", "Discover, list, and value all taxable property", "Appraise, sell, and transfer taxable property", "Zone, map, and record all real property"], "a": "B", "e": "The assessors three core duties: discover all taxable property, list it, and value it for taxation.", "p": "101 p.5"}, {"n": 3, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The taxable location of personal property is referred to as its:", "o": ["Domicile", "Nexus", "Assessment site", "Situs"], "a": "D", "e": "Situs is the legal term for where personal property is physically situated and subject to tax.", "p": "101 p.6"}, {"n": 4, "ch": "Ch1: Assessment & Appraisal Theory", "q": "An estimate of value in writing of an adequately described property as of a given date is termed a(n):", "o": ["Assessment", "Market analysis", "Equalization report", "Appraisal"], "a": "D", "e": "An appraisal is a formal written estimate of value for a described property as of a specific date.", "p": "101 p.4"}, {"n": 5, "ch": "Ch1: Assessment & Appraisal Theory", "q": "A jurisdiction tax rate is determined by dividing the revenue needed from property tax by:", "o": ["The total number of parcels", "The prior year levy", "The total market value of all property", "The total assessed value of the taxing jurisdiction"], "a": "D", "e": "Tax Rate = Net Budget divided by Total Assessed Value.", "p": "101 p.8"}, {"n": 6, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The type of value most commonly estimated by the assessor is:", "o": ["Use value", "Investment value", "Insurable value", "Market value"], "a": "D", "e": "Assessors typically estimate market value - the most probable price in an open competitive market.", "p": "101 p.7"}, {"n": 7, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The effective tax rate (ETR) reflects the ratio between:", "o": ["The mill rate and assessment level", "The tax levy and the budget", "The assessed value and cost", "The current tax bill and the property market value"], "a": "D", "e": "ETR = Tax Bill divided by Market Value. It is the true property tax burden as a share of market value.", "p": "101 p.13"}, {"n": 8, "ch": "Ch1: Assessment & Appraisal Theory", "q": "For a property to have value it must possess:", "o": ["Size, location, condition, and age", "Title, zoning, access, and improvements", "Income, appreciation, liquidity, and leverage", "Utility, scarcity, desirability, and effective purchasing power"], "a": "D", "e": "The four elements of value (USDE): Utility, Scarcity, Desirability, and Effective Purchasing Power.", "p": "101 p.19"}, {"n": 9, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The use that generates the highest net return to a property over a reasonable period is its:", "o": ["Interim use", "Probable future use", "Current use", "Highest and best use"], "a": "D", "e": "Highest and best use is legally permissible, physically possible, financially feasible, and maximally productive.", "p": "101 p.39"}, {"n": 10, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The principle of conformity states that maximum neighborhood value is attained when:", "o": ["All properties are the same age", "Properties appreciate uniformly", "All structures are equal quality", "The uses of land are perfectly complementary"], "a": "D", "e": "Conformity: maximum value is achieved when land uses in a neighborhood are compatible and complementary.", "p": "101 p.27"}, {"n": 11, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Which principle affirms that land cannot be valued on one use while improvements are valued on another?", "o": ["Substitution", "Anticipation", "Surplus productivity", "Consistent use"], "a": "D", "e": "Consistent use: land and improvements must be valued under the same use assumption simultaneously.", "p": "101 p.21"}, {"n": 12, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The four tests of highest and best use must be applied in which sequence?", "o": ["Financially feasible, maximally productive, legally permissible, physically possible", "Physically possible, legally permissible, maximally productive, financially feasible", "Maximally productive, financially feasible, physically possible, legally permissible", "Legally permissible, physically possible, financially feasible, maximally productive"], "a": "D", "e": "Sequential order: (1) Legally permissible, (2) Physically possible, (3) Financially feasible, (4) Maximally productive.", "p": "101 p.39"}, {"n": 13, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Real property is defined as:", "o": ["Any property that can be moved without damage", "All property owned by a legal entity", "Tangible personal property used in trade", "A parcel of land and any structures or improvements permanently affixed thereto"], "a": "D", "e": "Real property = land plus all permanently attached improvements.", "p": "101 p.16"}, {"n": 14, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Property is considered personal property if it can be:", "o": ["Owned by a private individual", "Subject to property taxes", "Assessed as of the lien date", "Moved without causing damage to itself or the structure"], "a": "D", "e": "Personal property is movable - removable without damage to itself or the structure.", "p": "101 p.16"}, {"n": 15, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Assessment level multiplied by the tax rate equals the:", "o": ["Assessed value", "Taxable value", "Nominal tax rate", "Effective tax rate"], "a": "D", "e": "ETR = Assessment Level x Tax Rate.", "p": "101 p.13"}, {"n": 16, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Equilibrium in the market is defined as the point at which:", "o": ["All properties have sold", "Supply exceeds demand", "Interest rates stabilize", "The forces of supply and demand meet"], "a": "D", "e": "Equilibrium is the balance point where quantity supplied equals quantity demanded.", "p": "101 p.24"}, {"n": 17, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The two types of highest and best use analysis are:", "o": ["Single-property and mass appraisal", "Cost approach and income approach", "Interim use and final use", "As vacant and as improved"], "a": "D", "e": "H&BU is analyzed: (1) as if the site were vacant and available, and (2) as currently improved.", "p": "101 p.39"}, {"n": 18, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The four stages of a typical neighborhood life cycle in correct order are:", "o": ["Decline, growth, stability, revitalization", "Growth, decline, stability, revitalization", "Stability, growth, decline, revitalization", "Growth, stability, decline, revitalization"], "a": "D", "e": "The four stages in order: Growth, Stability, Decline, Revitalization.", "p": "101 p.53"}, {"n": 19, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Which of the following contributes to a change in DEMAND (not supply)?", "o": ["Number of sellers in the market", "Cost of production materials", "Price of inputs to produce goods", "Consumer income and purchasing power"], "a": "D", "e": "Demand factors: consumer income, tastes, prices of substitutes, expectations, number of buyers.", "p": "101 p.24"}, {"n": 20, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The definition of market value assumes all of the following EXCEPT:", "o": ["Buyer and seller are typically motivated", "Reasonable exposure time in the open market", "Payment in cash or cash-equivalent terms", "The buyer is forced to purchase within 30 days"], "a": "D", "e": "Market value assumes motivated parties, reasonable exposure, and cash-equivalent payment. A forced sale violates the open-market assumption.", "p": "101 p.19"}, {"n": 21, "ch": "Ch1: Assessment & Appraisal Theory", "q": "Which of the following is NOT one of the four government powers limiting private property rights?", "o": ["Taxation", "Eminent domain", "Police power", "Dedication"], "a": "D", "e": "The four government limitations are: Taxation, Eminent Domain, Police Power, and Escheat. Dedication is a voluntary act by a property owner.", "p": "101 p.17"}, {"n": 22, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The first step in the seven-step appraisal process is:", "o": ["Data collection and analysis", "Application of the three approaches", "Reconciliation and final value opinion", "Definition of the appraisal problem"], "a": "D", "e": "Step 1 is defining the appraisal problem - identifying the property, rights appraised, purpose, date, and limiting conditions.", "p": "101 p.46"}, {"n": 23, "ch": "Ch1: Assessment & Appraisal Theory", "q": "The underlying principle for all three approaches to appraisal is:", "o": ["Anticipation", "Contribution", "Balance", "Substitution"], "a": "D", "e": "Substitution: a rational buyer will not pay more than the cost of acquiring an equally desirable substitute.", "p": "101 p.44"}, {"n": 24, "ch": "Ch2: Land Description & Valuation", "q": "The principle that returns to land are what remain after returns to labor, management, and capital are satisfied is:", "o": ["Supply and demand", "Change", "Anticipation", "Surplus productivity"], "a": "D", "e": "Surplus productivity - land receives the residual income after all other agents of production have been compensated.", "p": "101 p.95"}, {"n": 25, "ch": "Ch2: Land Description & Valuation", "q": "Measuring property lines with compass bearings and distances between monuments describes which system?", "o": ["State plane coordinate system", "Public Land Survey System", "Platted subdivision system", "Metes and bounds"], "a": "D", "e": "Metes and bounds describes boundaries using compass directions and distances between monuments.", "p": "101 p.99"}, {"n": 26, "ch": "Ch2: Land Description & Valuation", "q": "A township in the Public Land Survey System contains how many sections, each containing how many acres?", "o": ["32 sections - 620 acres", "36 sections - 320 acres", "30 sections - 640 acres", "36 sections - 640 acres"], "a": "D", "e": "A township = 6 x 6 miles = 36 square miles. Each section = 1 square mile = 640 acres.", "p": "101 p.80"}, {"n": 27, "ch": "Ch2: Land Description & Valuation", "q": "In the PLSS, the NE quarter NW quarter SE quarter SW quarter contains how many acres?", "o": ["5 acres", "10 acres", "40 acres", "2.5 acres"], "a": "D", "e": "Each quarter division divides by 4: 640 / 4 / 4 / 4 / 4 = 2.5 acres.", "p": "101 p.80"}, {"n": 28, "ch": "Ch2: Land Description & Valuation", "q": "When using the direct sales comparison approach to value land, the first step is to:", "o": ["Apply dollar adjustments", "Calculate price per front foot", "Determine final value by reconciliation", "Stratify sales into homogeneous groups"], "a": "D", "e": "Stratification - grouping sales by type, location, and characteristics - is the essential first step.", "p": "101 p.115"}, {"n": 29, "ch": "Ch2: Land Description & Valuation", "q": "Improvements such as streets, sidewalks, and utilities are considered:", "o": ["Direct costs", "Superadequacies", "Functional additions", "Site improvements"], "a": "D", "e": "Site improvements are infrastructure (streets, utilities, grading) that make raw land developable.", "p": "101 p.93"}, {"n": 30, "ch": "Ch2: Land Description & Valuation", "q": "Which land valuation method compares the subject to comparable vacant parcels that have recently sold?", "o": ["Abstraction method", "Allocation method", "Anticipated use method", "Direct sales comparison method"], "a": "D", "e": "The direct sales comparison method is preferred - it compares vacant land sales directly and adjusts for differences.", "p": "101 p.115"}, {"n": 31, "ch": "Ch2: Land Description & Valuation", "q": "Front foot, square foot, and acre are examples of basic:", "o": ["Legal description systems", "Adjustment methods", "Stratification categories", "Units of comparison"], "a": "D", "e": "Units of comparison normalize sale prices for comparison.", "p": "101 p.115"}, {"n": 32, "ch": "Ch2: Land Description & Valuation", "q": "In the direct sales comparison approach, adjustments are always made to the ________ property:", "o": ["Subject", "Either one", "Most recent", "Comparable"], "a": "D", "e": "Adjustments are ALWAYS made to the comparable - the subject is the fixed benchmark.", "p": "101 p.115"}, {"n": 33, "ch": "Ch2: Land Description & Valuation", "q": "If a comparable lot is SUPERIOR to the subject in some characteristic, the adjustment to the comparable is:", "o": ["Positive (+)", "Zero", "Depends on magnitude", "Negative (-)"], "a": "D", "e": "If the comparable is superior its price is adjusted downward (-) to equate it to the subject.", "p": "101 p.115"}, {"n": 34, "ch": "Ch2: Land Description & Valuation", "q": "The abstraction method of land valuation involves:", "o": ["Comparing the subject to similar vacant parcels", "Applying a land-to-value ratio", "Capitalizing ground rent", "Subtracting the depreciated value of improvements from the sale price"], "a": "D", "e": "Abstraction: Land Value = Sale Price minus (RCN minus Depreciation). Extracts land value from improved sales.", "p": "101 p.120"}, {"n": 35, "ch": "Ch2: Land Description & Valuation", "q": "The preferred method of valuing land when adequate vacant land sales are available is:", "o": ["Abstraction method", "Allocation method", "Cost of development method", "Direct sales comparison method"], "a": "D", "e": "Direct sales comparison is always preferred when adequate comparable vacant land sales exist.", "p": "101 p.115"}, {"n": 36, "ch": "Ch2: Land Description & Valuation", "q": "A land-to-building ratio of 1:4 means land represents what percent of total value?", "o": ["40%", "25%", "80%", "20%"], "a": "D", "e": "Ratio 1:4 = 1 part land + 4 parts building = 5 parts total. Land = 1/5 = 20%.", "p": "101 p.117"}, {"n": 37, "ch": "Ch2: Land Description & Valuation", "q": "The property account number linking ownership records, tax maps, and assessment records is the:", "o": ["Legal description", "Assessment ratio", "Cadastral index", "Parcel identifier (PIN)"], "a": "D", "e": "The parcel identifier (PIN) is a unique code linking every record system to the physical parcel.", "p": "101 p.92"}, {"n": 38, "ch": "Ch2: Land Description & Valuation", "q": "The concept that market value of vacant land depends on potential use rather than current use is:", "o": ["Supply and demand", "Anticipation", "Change", "Highest and best use"], "a": "D", "e": "H&BU - land is valued at its highest and best use, not necessarily its current use.", "p": "101 p.39"}, {"n": 39, "ch": "Ch2: Land Description & Valuation", "q": "Factors affecting land values such as size, topography, and location are termed:", "o": ["Governmental factors", "Social factors", "Economic factors", "Physical factors"], "a": "D", "e": "Physical factors include size, shape, topography, frontage, drainage, utilities, and locational attributes of the site.", "p": "101 p.95"}, {"n": 40, "ch": "Ch2: Land Description & Valuation", "q": "The land valuation method that replicates the actions of subdividers or developers is the:", "o": ["Sales comparison method", "Allocation method", "Abstraction method", "Anticipated use or development method"], "a": "D", "e": "The anticipated use/development method models what a developer would pay - projecting lot sales, deducting costs and profit, then discounting to present value.", "p": "101 p.120"}, {"n": 41, "ch": "Ch3: Cost Estimation & Depreciation", "q": "The cost approach is premised on the principle of substitution, which holds that an informed buyer will not pay:", "o": ["More than the assessed value", "Less than the income-justified value", "More than the sellers asking price", "More to build a property than the cost of acquiring a similar one with equal utility"], "a": "D", "e": "The cost approach is grounded in substitution - a rational buyer will not pay more to construct than to acquire an equivalent existing property.", "p": "101 p.147"}, {"n": 42, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Costs that occur directly on the construction site are called:", "o": ["Indirect costs", "Soft costs", "Overhead costs", "Direct costs"], "a": "D", "e": "Direct (hard) costs are on-site construction expenses: materials, labor, and equipment.", "p": "101 p.148"}, {"n": 43, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Architectural fees, insurance, and title expenses during construction are classified as:", "o": ["Direct costs", "Variable costs", "Replacement costs", "Indirect costs (soft costs)"], "a": "D", "e": "Indirect costs include architectural/engineering fees, financing costs, insurance, permits, and taxes during construction.", "p": "101 p.148"}, {"n": 44, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Reproduction cost new is defined as:", "o": ["Cost to build an equally useful structure with modern materials", "Depreciated value of the current improvement", "Insured value of the structure", "Cost to produce an exact replica using original materials and methods"], "a": "D", "e": "Reproduction cost = exact replica using same materials, design, and methods as original.", "p": "101 p.150"}, {"n": 45, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Replacement cost new (RCN) is defined as:", "o": ["Cost to produce an exact replica", "Depreciated market value of improvements", "Original construction cost indexed to current dollars", "Cost to produce a building of equal utility using modern methods and materials"], "a": "D", "e": "RCN uses current materials and standards to produce equivalent utility.", "p": "101 p.150"}, {"n": 46, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Building A: 100x100 ft (10,000 sq ft). Building B: 50x200 ft (10,000 sq ft). Which costs MORE to build?", "o": ["Building A - it is more square", "They cost the same", "Cannot be determined", "Building B - it has more exterior wall perimeter per square foot"], "a": "D", "e": "Building B has 500 ft perimeter vs Building A 400 ft. More perimeter = more exterior wall = higher cost.", "p": "101 p.155"}, {"n": 47, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Building A was built 20 years ago for 00,000. Cost index was 200 then; now it is 350. Reproduction cost new today is:", "o": ["00,000", "00,000", "00,000", "00,000"], "a": "D", "e": "RCN = Historical Cost x (Current Index / Past Index) = 00,000 x (350/200) = 00,000.", "p": "101 p.155"}, {"n": 48, "ch": "Ch3: Cost Estimation & Depreciation", "q": "The easiest, fastest, and most widely used method of estimating cost is the:", "o": ["Quantity survey method", "Unit-in-place method", "Trended historical cost method", "Comparative unit (square foot) method"], "a": "D", "e": "The comparative unit method applies a cost-per-unit rate to building size. Most efficient for valuing large numbers of properties.", "p": "101 p.155"}, {"n": 49, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Which of the following is a desirable feature of a cost manual?", "o": ["Applicable to most structure types only", "Based on actual costs only", "Suitable for computerization only", "All of the above"], "a": "D", "e": "A good cost manual should be comprehensive, accurate (real market data), regularly updated, and CAMA-compatible.", "p": "101 p.197"}, {"n": 50, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Depreciation in the cost approach is defined as:", "o": ["IRS tax write-off over useful life", "Annual decline in assessed value", "Physical wear and tear only", "The difference between market value of an improvement and its cost at the time of appraisal"], "a": "D", "e": "Appraisal depreciation = any loss in value from any cause = RCN minus depreciated value.", "p": "101 p.172"}, {"n": 51, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Property B sold for 80,000 with land value of 0,000. RCN for improvement is 00,000. Extracted depreciation is:", "o": ["25%", "40%", "55%", "50%"], "a": "D", "e": "Improvement value = 80,000 - 0,000 = 00,000. Depreciation = (00,000 - 00,000) / 00,000 = 50%.", "p": "101 p.174"}, {"n": 52, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Curable physical deterioration is measured by:", "o": ["The economic age-life formula", "Capitalizing rent loss", "The observed condition breakdown method", "The cost to cure"], "a": "D", "e": "Curable physical deterioration = cost to cure. An item is curable when the cost to repair does not exceed the value added.", "p": "101 p.175"}, {"n": 53, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Functional obsolescence is a loss in value due to:", "o": ["Physical wear and deterioration", "Factors outside the property boundaries", "The passage of time regardless of condition", "A deficiency, modernization need, or superadequacy within the structure"], "a": "D", "e": "Functional obsolescence originates within the building - poor floor plan, outdated features, or over-improvements.", "p": "101 p.172"}, {"n": 54, "ch": "Ch3: Cost Estimation & Depreciation", "q": "External (economic) obsolescence is a loss in value resulting from:", "o": ["A superadequacy in the improvements", "Outdated design features inside the building", "Physical deterioration of structural components", "A decrease in utility caused by factors outside the property boundaries"], "a": "D", "e": "External obsolescence originates outside the property and is always incurable.", "p": "101 p.172"}, {"n": 55, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Incurable physical deterioration is measured by the:", "o": ["Cost to cure", "Sales comparison market extraction", "Capitalized income loss approach", "Economic age-life method"], "a": "D", "e": "The economic age-life method: Depreciation % = Effective Age / Total Economic Life.", "p": "101 p.172"}, {"n": 56, "ch": "Ch3: Cost Estimation & Depreciation", "q": "If a depreciation table starts at 0% and goes to 40%, the percent good table would:", "o": ["Start at 0% and go to 40%", "Start at 40% and go to 100%", "Start at 60% and go to 100%", "Start at 100% and go to 60%"], "a": "D", "e": "Percent good = 100% - Depreciation %. If depreciation goes 0 to 40%, percent good goes 100% to 60%.", "p": "101 p.183"}, {"n": 57, "ch": "Ch3: Cost Estimation & Depreciation", "q": "The most detailed depreciation method, required for demonstration appraisal reports, is the:", "o": ["Economic age-life method", "Modified economic age-life method", "Sales comparison method", "Observed condition (breakdown) method"], "a": "D", "e": "The observed condition/breakdown method separately identifies and measures each type and category of depreciation.", "p": "101 p.197"}, {"n": 58, "ch": "Ch3: Cost Estimation & Depreciation", "q": "A short-lived item: cost new = ,000; actual age = 5 years; total useful life = 20 years. Dollar depreciation is:", "o": [",000", ",500", "50", ",250"], "a": "D", "e": "Depreciation = (5/20) x ,000 = 25% x ,000 = ,250.", "p": "101 p.183"}, {"n": 59, "ch": "Ch3: Cost Estimation & Depreciation", "q": "A residence lacks a second bath on the first floor. RCN if installed originally = 1,500; cost to install today = 3,500. Functional obsolescence is:", "o": ["1,500", "3,500", ",500", ",000"], "a": "D", "e": "Curable functional obsolescence = Excess Cost to Cure = 3,500 - 1,500 = ,000.", "p": "101 p.197"}, {"n": 60, "ch": "Ch3: Cost Estimation & Depreciation", "q": "Residence rents for 00/month; comparable rents for 25/month. GRM = 150; land-to-building ratio = 1:4. External obsolescence to the improvement is:", "o": [",750", ",625", ",500", ",000"], "a": "D", "e": "Rent loss = 5/month. Total loss = 5 x 150 = ,750. Building share = 4/5 = 80%. Obsolescence = ,750 x 0.80 = ,000.", "p": "101 p.213"}, {"n": 61, "ch": "Ch3: Cost Estimation & Depreciation", "q": "If the cost to cure a functional deficiency exceeds the value added to the property, it is classified as:", "o": ["Curable functional obsolescence", "Physical curable deterioration", "External obsolescence", "Incurable functional obsolescence"], "a": "D", "e": "Incurable if cost to fix > value added. Curable if cost to fix is less than or equal to value added.", "p": "101 p.172"}, {"n": 62, "ch": "Ch4: Sales Comparison Approach", "q": "The major premise of the sales comparison approach is that:", "o": ["Value equals the cost to reproduce the property", "The income stream determines value", "Land and building must be valued separately", "Value is determined by comparing the subject to similar recently sold properties"], "a": "D", "e": "The sales comparison approach derives value by analyzing actual sales of comparable properties and adjusting for differences.", "p": "101 p.231"}, {"n": 63, "ch": "Ch4: Sales Comparison Approach", "q": "The underlying principle of the adjustment process in the sales comparison approach is:", "o": ["Anticipation", "Substitution", "Balance", "Contribution"], "a": "D", "e": "Contribution governs adjustments - each feature is adjusted for the value it contributes to the whole property.", "p": "101 p.232"}, {"n": 64, "ch": "Ch4: Sales Comparison Approach", "q": "A major advantage of the sales comparison approach is that it:", "o": ["Can be used for all special-purpose properties", "Requires no market data", "Can be completed without inspection", "Reflects the actual actions of buyers and sellers in the market"], "a": "D", "e": "The sales comparison approach is market-driven, directly reflecting real buyer/seller behavior.", "p": "101 p.232"}, {"n": 65, "ch": "Ch4: Sales Comparison Approach", "q": "The sales comparison approach generally CANNOT reliably value:", "o": ["Single-family residences", "Vacant land", "Agricultural land", "Special-purpose or one-of-a-kind properties"], "a": "D", "e": "Special-purpose properties have few or no true comparables, making the sales comparison approach unreliable.", "p": "101 p.232"}, {"n": 66, "ch": "Ch4: Sales Comparison Approach", "q": "The cardinal rule in the sales comparison approach is that all adjustments are made to the:", "o": ["Subject property", "Both subject and comparable", "The one with more differences", "Comparable sale property"], "a": "D", "e": "Adjustments are ALWAYS made to the comparable - never to the subject. The subject is the fixed benchmark.", "p": "101 p.232"}, {"n": 67, "ch": "Ch4: Sales Comparison Approach", "q": "Paired sales analysis requires sale properties to be:", "o": ["Sold within 90 days of each other", "Located in the same neighborhood", "Sold under the same financing conditions", "Identical in all attributes except the one being measured"], "a": "D", "e": "Paired sales isolates the value contribution of one feature by finding two sales differing in only that characteristic.", "p": "101 p.240"}, {"n": 68, "ch": "Ch4: Sales Comparison Approach", "q": "Which method of determining adjustments CANNOT be used to measure market conditions (time trends)?", "o": ["Paired sales analysis", "Multiple regression analysis", "Repeat sales analysis", "Depreciated cost method"], "a": "D", "e": "The depreciated cost method values features based on cost and cannot detect market-based time trends.", "p": "101 p.232"}, {"n": 69, "ch": "Ch4: Sales Comparison Approach", "q": "The unit of comparison for office properties is generally the:", "o": ["Price per room", "Price per acre", "Price per animal unit", "Price per square foot of net rentable area"], "a": "D", "e": "Office properties are typically compared on a price-per-square-foot basis (NRA).", "p": "101 p.232"}, {"n": 70, "ch": "Ch4: Sales Comparison Approach", "q": "Price per animal unit is the appropriate unit of comparison when valuing:", "o": ["Office properties", "Suburban residential lots", "Industrial warehouses", "Agricultural livestock operations"], "a": "D", "e": "Agricultural livestock operations are valued on a per-animal-unit basis when carrying capacity is the primary value driver.", "p": "101 p.232"}, {"n": 71, "ch": "Ch4: Sales Comparison Approach", "q": "The principle of change states that market value is never constant because:", "o": ["Properties physically deteriorate over time", "Buyers and sellers have different motivations", "Interest rates fluctuate annually", "Physical, governmental, social, and economic forces are constantly at work"], "a": "D", "e": "The four PEGS forces constantly influence markets - hence the need for market condition (time) adjustments.", "p": "101 p.232"}, {"n": 72, "ch": "Quiz 1: Chapters 1-2", "q": "The basic responsibilities of the assessor include which of the following?", "o": ["List only", "Value only", "Discover only", "All of the above: discover, list, and value"], "a": "D", "e": "The three basic assessor responsibilities are: discover all taxable property, list it, and value it.", "p": "101 Quiz1 Q1"}, {"n": 73, "ch": "Quiz 1: Chapters 1-2", "q": "One of the steps an assessor must take in the DISCOVERY of property is to:", "o": ["Create a legal description", "Determine the physical attributes of the property", "Confirm the property rights", "Conduct periodic on-site inspections of properties"], "a": "D", "e": "Discovery requires physically locating and identifying property - periodic on-site inspections are a key method.", "p": "101 Quiz1 Q2"}, {"n": 74, "ch": "Quiz 1: Chapters 1-2", "q": "The property tax is a(n) _________ tax, meaning it is based on value:", "o": ["Use tax", "Income tax", "Value added tax", "Ad valorem"], "a": "D", "e": "Ad valorem means according to value.", "p": "101 Quiz1 Q3"}, {"n": 75, "ch": "Quiz 1: Chapters 1-2", "q": "Actual value = 75,000; assessment level = 20%; tax rate = 92.8 mills. The property tax is:", "o": ["24.80", ",248.00", ",624.00", ",299.20"], "a": "A", "e": "AV = 75,000 x 0.20 = 5,000. Tax = 5,000 x 0.0928 = ,248. Per IAAO answer key: A (24.80).", "p": "101 Quiz1 Q4"}, {"n": 76, "ch": "Quiz 1: Chapters 1-2", "q": "If a tax rate is 3.30 per 00, the decimal equivalent is:", "o": ["1.3300", "13.300", "133.00", "0.1330"], "a": "D", "e": "3.30 per 00 = 13.30 / 100 = 0.1330 as a decimal multiplier.", "p": "101 Quiz1 Q5"}, {"n": 77, "ch": "Quiz 1: Chapters 1-2", "q": "________ divided by the assessed value equals the tax rate:", "o": ["Market value", "Millage", "Assessment level", "Budget"], "a": "D", "e": "Tax Rate = Net Budget / Total Assessed Value.", "p": "101 Quiz1 Q6"}, {"n": 78, "ch": "Quiz 1: Chapters 1-2", "q": "Assessment level times the tax rate equals the:", "o": ["Nominal tax rate", "Taxable value", "Market value", "Effective tax rate"], "a": "D", "e": "ETR = Assessment Level x Tax Rate.", "p": "101 Quiz1 Q7"}, {"n": 79, "ch": "Quiz 1: Chapters 1-2", "q": "Budget = ,000,000; Market Value = 00,000,000; Assessment Level = 50%; Non-property tax revenue = ,000,000. Tax rate in dollars per 00 is:", "o": ["1.25", ".25", ".50", ".25"], "a": "D", "e": "Net budget = ,000,000. AV = 00M x 50% = 00M. Rate = M / 00M = 0.0125 = .25 per 00.", "p": "101 Quiz1 Q8"}, {"n": 80, "ch": "Quiz 1: Chapters 1-2", "q": "________ is the physical land and everything permanently attached to it:", "o": ["Chattel", "Real property", "Real estate", "All of the above"], "a": "C", "e": "Real estate is the physical land and all permanently attached structures. Real property is a broader legal concept including real estate plus the rights.", "p": "101 Quiz1 Q9"}, {"n": 81, "ch": "Quiz 1: Chapters 1-2", "q": "Which of the following is a GOVERNMENTAL restriction on the bundle of rights?", "o": ["Lien", "Lease", "Easement", "Eminent domain"], "a": "D", "e": "Eminent domain is a government power to take private property for public use with just compensation. Liens, leases, and easements are private encumbrances.", "p": "101 Quiz1 Q10"}, {"n": 82, "ch": "Quiz 1: Chapters 1-2", "q": "Which of the following is a basic right associated with the ownership of property?", "o": ["To use", "To lease or rent", "To enter or leave", "All of the above"], "a": "D", "e": "The bundle of rights includes: to use, to lease/rent, to enter/leave, to sell, to exclude others, and to bequeath.", "p": "101 Quiz1 Q11"}, {"n": 83, "ch": "Quiz 1: Chapters 1-2", "q": "The economic forces that determine SCARCITY - one of the four elements of value - are:", "o": ["Anticipation and change", "Increasing and decreasing returns", "Progression and regression", "Supply and demand"], "a": "D", "e": "Scarcity is a function of supply and demand. Limited supply relative to demand creates scarcity.", "p": "101 Quiz1 Q12"}, {"n": 84, "ch": "Quiz 1: Chapters 1-2", "q": "________ is the point at which the forces of supply and demand meet - the point of balance:", "o": ["Changes in supply", "Changes in demand", "All of the above", "Equilibrium"], "a": "D", "e": "Equilibrium is the balance point where supply and demand forces meet.", "p": "101 Quiz1 Q13"}, {"n": 85, "ch": "Quiz 1: Chapters 1-2", "q": "A ________ interest is ownership of all the rights in a property, except those reserved by the government, and with no private encumbrances:", "o": ["Possessory", "Leasehold", "Leased fee", "Fee simple"], "a": "D", "e": "Fee simple = full ownership with no private encumbrances, subject only to government powers.", "p": "101 Quiz1 Q14"}, {"n": 86, "ch": "Quiz 1: Chapters 1-2", "q": "In the appraisal process, data collection requires the assessor to collect:", "o": ["General data", "Specific data", "Comparative data", "All of the above"], "a": "D", "e": "Data collection requires general data (regional/neighborhood), specific data (subject property), and comparative data (comparable sales/rents).", "p": "101 Quiz1 Q15"}, {"n": 87, "ch": "Quiz 1: Chapters 1-2", "q": "Which is NOT one of the four great forces by which value is created, maintained, modified, or destroyed?", "o": ["Economic", "Social", "Governmental", "Conceptual"], "a": "D", "e": "The four PEGS forces are Physical, Economic, Governmental, and Social. Conceptual is not one of them.", "p": "101 Quiz1 Q16"}, {"n": 88, "ch": "Quiz 1: Chapters 1-2", "q": "A ________ is defined as an area of complementary land uses in which all properties are similarly influenced by the four forces affecting value:", "o": ["Tract", "Lot", "Subdivision", "Neighborhood"], "a": "D", "e": "A neighborhood is a geographic area where all properties experience similar influences from the four PEGS forces.", "p": "101 Quiz1 Q17"}, {"n": 89, "ch": "Quiz 1: Chapters 1-2", "q": "Parcel A: land 0,000, improvements 50,000. Parcel B: land 00,000, improvements 00,000. Subject total value = 00,000. Allocation method land value is:", "o": ["00,000", "0,000", "None of the above", "5,000"], "a": "D", "e": "Land ratio: A = 0K/00K = 25%; B = 00K/00K = 25%. Subject land = 00,000 x 25% = 5,000.", "p": "101 Quiz1 Q18"}, {"n": 90, "ch": "Quiz 1: Chapters 1-2", "q": "What element of the marketplace is likely to contribute to a change in DEMAND?", "o": ["Cost of production", "Number of sellers", "Price of other goods", "Consumer expectations"], "a": "D", "e": "Consumer expectations are a demand-side factor. Cost of production, number of sellers, and price of inputs are supply-side factors.", "p": "101 Quiz1 Q19"}, {"n": 91, "ch": "Quiz 1: Chapters 1-2", "q": "What element of the marketplace is likely to contribute to a change in SUPPLY?", "o": ["Consumer income", "Consumer taste and preference", "Consumer expectations (demand side)", "Entrepreneur expectations"], "a": "D", "e": "Entrepreneur/producer expectations affect supply. Consumer income, tastes, and expectations are demand-side factors.", "p": "101 Quiz1 Q20"}, {"n": 92, "ch": "Quiz 1: Chapters 1-2", "q": "A township in the PLSS contains _______ sections, each section containing _______ acres:", "o": ["32 - 620", "36 - 320", "30 - 640", "36 - 640"], "a": "D", "e": "A township = 6x6 miles = 36 sections. Each section = 1 square mile = 640 acres.", "p": "101 Quiz1 Q21"}, {"n": 93, "ch": "Quiz 1: Chapters 1-2", "q": "The NE quarter NW quarter SE quarter SW quarter contains _______ acres:", "o": ["5", "10", "None of the above - it contains 40", "2.5"], "a": "D", "e": "640 / 4 / 4 / 4 / 4 = 2.5 acres.", "p": "101 Quiz1 Q22"}, {"n": 94, "ch": "Quiz 1: Chapters 1-2", "q": "A land description system where boundaries are described as distances between semipermanent points or compass bearing lines is:", "o": ["State plane coordinate system", "Public Land Survey System", "Platted subdivision system", "Metes and bounds"], "a": "D", "e": "Metes and bounds uses compass bearings and distances between monuments to describe boundaries.", "p": "101 Quiz1 Q23"}, {"n": 95, "ch": "Quiz 1: Chapters 1-2", "q": "The principle that market value of a property tends to be set by the cost of acquiring an equally desirable substitute is:", "o": ["Progression", "Surplus productivity", "Conformity", "Substitution"], "a": "D", "e": "Substitution: a rational buyer will not pay more than the cost of an equivalent substitute.", "p": "101 Quiz1 Q24"}, {"n": 96, "ch": "Quiz 1: Chapters 1-2", "q": "A parcel identifier links ownership records, tax maps, and assessment records. Thus the identifier must be:", "o": ["Unique", "Permanent", "Simple", "All of the above"], "a": "D", "e": "A parcel identifier must be unique, permanent, and simple to be effective across all record systems.", "p": "101 Quiz1 Q25"}, {"n": 97, "ch": "Quiz 1: Chapters 1-2", "q": "Stratification is the first step in analyzing land sales, and the primary sort is by:", "o": ["Zoning", "Land use regulations", "Probable future use", "Market area"], "a": "D", "e": "The primary stratification sort is by market area - ensuring comparables come from the same competitive market.", "p": "101 Quiz1 Q26"}, {"n": 98, "ch": "Quiz 1: Chapters 1-2", "q": "Given: Sale price = 20,000; Cost new of improvement = 60,000; Depreciation = 0,000. Indicated land value using abstraction is:", "o": ["0,000", "0,000", "None of the above", "0,000"], "a": "D", "e": "Land = Sale Price - (Cost New - Depreciation) = 20,000 - (60,000 - 0,000) = 20,000 - 70,000 = 0,000.", "p": "101 Quiz1 Q29"}, {"n": 99, "ch": "Quiz 1: Chapters 1-2", "q": "The principle illustrating that market value is determined by factors such as zoning, rent controls, and interest rates is:", "o": ["Anticipation", "Contribution", "Consistent use", "Change"], "a": "D", "e": "Change: market value is never constant because external forces (governmental, economic, social, physical) are always at work.", "p": "101 Quiz1 Q30"}, {"n": 100, "ch": "Quiz 1: Chapters 1-2", "q": "The appropriate map scale for urban areas is:", "o": ["1 inch = 200 feet", "1 inch = 100 feet", "1 foot = 400 feet", "1 inch = 50 feet"], "a": "D", "e": "Urban areas use the largest scale (most detail): 1 inch = 50 feet. Suburban = 1 inch = 100 or 200 feet. Rural = smaller scale.", "p": "101 Quiz1 Q31"}, {"n": 101, "ch": "Quiz 1: Chapters 1-2", "q": "A lot measures 242 feet x 1,800 feet. At 0,000 per acre the lot value is:", "o": ["0,000", ",600,000", "None of the above", "00,000"], "a": "D", "e": "Area = 242 x 1,800 = 435,600 sq ft. Acres = 435,600 / 43,560 = 10 acres. Value = 10 x 0,000 = 00,000.", "p": "101 Quiz1 Q32"}, {"n": 102, "ch": "Quiz 1: Chapters 1-2", "q": "When pedestrian access is an important consideration the appropriate land unit of comparison is the:", "o": ["Square foot", "Acre", "Units buildable", "Front foot"], "a": "D", "e": "Front footage captures street frontage and pedestrian/visibility access value - typical for retail storefronts.", "p": "101 Quiz1 Q33"}, {"n": 103, "ch": "Quiz 1: Chapters 1-2", "q": "The correct sequence of percentage adjustments in the direct sales comparison approach is:", "o": ["Market conditions, financing, location, physical characteristics", "Location, market conditions, financing, physical characteristics", "Physical characteristics, location, market conditions, financing", "Financing, market conditions, location, physical characteristics"], "a": "D", "e": "Sequence: (1) Financing, (2) Market conditions/time, (3) Location, (4) Physical characteristics.", "p": "101 Quiz1 Q34"}, {"n": 104, "ch": "Quiz 1: Chapters 1-2", "q": "The land valuation method that replicates the actions of subdividers or developers is the:", "o": ["Sales comparison method", "Allocation method", "Abstraction method", "Anticipated use or development method"], "a": "D", "e": "The anticipated use/development method models what a developer would pay - projecting lot sales, deducting costs and profit, then discounting to present value.", "p": "101 Quiz1 Q35"}, {"n": 105, "ch": "Quiz 2: Chapters 3-4", "q": "The cost of producing a building of equal utility using modern materials and workmanship is called:", "o": ["Indirect cost", "Reproduction cost", "Direct cost", "Replacement cost"], "a": "D", "e": "Replacement cost new (RCN) uses current materials and standards to produce equivalent utility.", "p": "101 Quiz2 Q1"}, {"n": 106, "ch": "Quiz 2: Chapters 3-4", "q": "When using a cost manual, which component is NOT included in the inventory of physical characteristics?", "o": ["Heating and cooling", "Porches", "Current condition", "Location"], "a": "D", "e": "Cost manuals capture physical building characteristics. Location affects land value but is not a physical building characteristic.", "p": "101 Quiz2 Q2"}, {"n": 107, "ch": "Quiz 2: Chapters 3-4", "q": "The underlying principle in the adjustment process in the sales comparison approach is the Principle of:", "o": ["Substitution", "Complementary use", "Change", "Contribution"], "a": "D", "e": "Contribution governs adjustments - each feature is worth what it adds to overall property value.", "p": "101 Quiz2 Q3"}, {"n": 108, "ch": "Quiz 2: Chapters 3-4", "q": "A resale sold 18 months ago for 00,000 and again 8 months ago for 20,000. Monthly time adjustment is:", "o": ["0.09%", "10%", "0.83%", "1%"], "a": "D", "e": "Change = 0,000 over 10 months (18-8). Monthly % = 0,000 / 00,000 / 10 = 1% per month.", "p": "101 Quiz2 Q4"}, {"n": 109, "ch": "Quiz 2: Chapters 3-4", "q": "Which approach to value is premised on the Principle of Substitution?", "o": ["Cost approach only", "Sales comparison approach only", "Income approach only", "All three approaches"], "a": "D", "e": "Substitution underlies all three approaches.", "p": "101 Quiz2 Q5"}, {"n": 110, "ch": "Quiz 2: Chapters 3-4", "q": "The Principle of Change states that market value is never constant because:", "o": ["Supply always exceeds demand long-term", "All improvements depreciate to zero", "Buyers and sellers always disagree on price", "Environmental, governmental, social, and economic forces are constantly at work"], "a": "D", "e": "The four PEGS forces constantly influence value.", "p": "101 Quiz2 Q6"}, {"n": 111, "ch": "Quiz 2: Chapters 3-4", "q": "Which is NOT an appropriate unit of comparison for multi-family residential properties?", "o": ["Price per room", "Price per square foot", "GIM (Gross Income Multiplier)", "Price per cubic foot"], "a": "D", "e": "For multi-family: price per room, per unit, per sq ft, and GIM are all appropriate. Price per cubic foot is rarely used.", "p": "101 Quiz2 Q7"}, {"n": 112, "ch": "Quiz 2: Chapters 3-4", "q": "The cost of building an exact replica of a building is called:", "o": ["Direct cost", "Indirect cost", "Replacement cost", "Reproduction cost"], "a": "D", "e": "Reproduction cost = exact replica using same materials, design, and methods as original.", "p": "101 Quiz2 Q8"}, {"n": 113, "ch": "Quiz 2: Chapters 3-4", "q": "Direct costs for a 1,500 sq ft home = 0/sq ft; indirect costs = 20% of direct. Cost new of the improvement is:", "o": ["20,000", "94,000", "6,000", "44,000"], "a": "D", "e": "Direct = 1,500 x 0 = 20,000. Indirect = 20,000 x 20% = 4,000. Cost new = 44,000.", "p": "101 Quiz2 Q9"}, {"n": 114, "ch": "Quiz 2: Chapters 3-4", "q": "Same data: cost new = 44,000; land = 0,000; depreciation rate = 0.5%/year x 10 years. Indicated value by cost approach is:", "o": ["36,800", "94,000", "None of the above", "86,800"], "a": "D", "e": "Depreciation = 5%. Depreciated improvement = 44,000 x 0.95 = 36,800. Total = 36,800 + 0,000 = 86,800.", "p": "101 Quiz2 Q10"}, {"n": 115, "ch": "Quiz 2: Chapters 3-4", "q": "External obsolescence attributable to the improvement is measured by:", "o": ["Capitalizing rent loss using a GRM only", "The cost to cure", "The economic age-life method", "Capitalizing rent loss using GRM multiplied by the buildings share of total value"], "a": "D", "e": "External obsolescence affects land and improvements. Only the improvement share is charged: (Rent Loss x GRM) x Building Ratio.", "p": "101 Quiz2 Q11"}, {"n": 116, "ch": "Quiz 2: Chapters 3-4", "q": "When a property experiences functional obsolescence it is usually the result of:", "o": ["Physical wear beyond normal maintenance", "Factors outside the property boundaries", "Over-assessment by the assessor", "Diminished utility within the building"], "a": "D", "e": "Functional obsolescence = diminished utility within the building - poor design, missing features, or superadequacies.", "p": "101 Quiz2 Q12"}, {"n": 117, "ch": "Quiz 2: Chapters 3-4", "q": "The most accurate but most time-consuming method of cost estimation is the:", "o": ["Unit-in-place method", "Square foot or cubic foot method", "Trended historical cost method", "Quantity survey method"], "a": "D", "e": "Quantity survey inventories every material and component - most detailed and accurate, but impractical for mass appraisal.", "p": "101 Quiz2 Q13"}, {"n": 118, "ch": "Quiz 2: Chapters 3-4", "q": "The first adjustment in the sales comparison approach is:", "o": ["Market conditions (time of sale)", "Location", "Physical characteristics", "Financing"], "a": "D", "e": "Financing (cash equivalency) is applied first to convert all sales to a cash-equivalent basis before any other adjustments.", "p": "101 Quiz2 Q14"}, {"n": 119, "ch": "Quiz 2: Chapters 3-4", "q": "RCN = 68,000; curable items depreciation = 0,000; short-lived incurable depreciation = 7,200; actual age = 20 yrs; total life = 80 yrs; curable RCN = ,800; short-lived RCN = 0,000. Long-lived incurable depreciation is:", "o": ["5,200", "7,300", "21,440", "4,800"], "a": "D", "e": "Long-lived RCN = 68,000 - ,800 - 0,000 = 99,200. Depreciation % = 20/80 = 25%. Amount = 99,200 x 25% = 4,800.", "p": "101 Quiz2 Q15"}, {"n": 120, "ch": "Quiz 2: Chapters 3-4", "q": "Using the same data, total physical depreciation is:", "o": ["25,900", "12,400", "04,000", "02,000"], "a": "D", "e": "Total = curable (0,000) + short-lived incurable (7,200) + long-lived incurable (4,800) = 02,000.", "p": "101 Quiz2 Q16"}, {"n": 121, "ch": "Quiz 2: Chapters 3-4", "q": "Using the same data (RCN = 68,000; total physical depreciation = 02,000; land = 5,000), indicated value by cost approach is:", "o": ["39,000", "30,600", "17,100", "41,000"], "a": "D", "e": "Depreciated improvement = 68,000 - 02,000 = 66,000. Total value = 66,000 + 5,000 = 41,000.", "p": "101 Quiz2 Q17"}, {"n": 122, "ch": "Quiz 2: Chapters 3-4", "q": "Which sale is MOST comparable to a subject with 3BR, 2.5 bath, 1 den, 2-car garage? Sale 1: 4BR, 2.5 bath, den, 2-car (10 mo. ago). Sale 3: 3BR, 2.5 bath, den, 2-car (10 mo. ago, 30,000). Sale 4: 3BR, 1.5 bath, den, 1-car (current).", "o": ["Sale 1 - most recent", "Sale 2 - closest price", "Sale 4 - current sale", "Sale 3 - fewest differences from subject"], "a": "D", "e": "Sale 3 matches the subject on bedrooms, bathrooms, den, and garage - only a time adjustment is needed.", "p": "101 Quiz2 Q19"}, {"n": 123, "ch": "Quiz 2: Chapters 3-4", "q": "Which of the following influences DEMAND when analyzing supply and demand?", "o": ["Current inventories", "Materials for construction", "Capital availability for producers", "Local services"], "a": "D", "e": "Demand factors include consumer income, tastes, expectations, and access to services. Inventories, materials, and capital are supply-side factors.", "p": "101 Quiz2 Q20"}, {"n": 124, "ch": "Quiz 2: Chapters 3-4", "q": "Which of the following is a method used to determine adjustments in the sales comparison approach?", "o": ["Paired sales analysis only", "Multiple regression analysis only", "Depreciated cost only", "All of the above"], "a": "D", "e": "Recognized adjustment methods include: paired sales analysis, multiple regression analysis, and depreciated cost - all are valid.", "p": "101 Quiz2 Q21"}, {"n": 125, "ch": "Quiz 2: Chapters 3-4", "q": "The cost approach is MOST applicable when:", "o": ["Income data is abundant", "Comparable sales are plentiful", "The property has been on the market over a year", "Valuing new construction, special-purpose properties, or properties with planned renovations"], "a": "D", "e": "Best uses of the cost approach: new/proposed construction, special-purpose properties, and renovation analysis.", "p": "101 Quiz2 Q22"}, {"n": 126, "ch": "Quiz 2: Chapters 3-4", "q": "Which is NOT a characteristic of cost?", "o": ["Quality of workmanship", "Design type", "Floor area", "Land value"], "a": "D", "e": "Cost characteristics are building attributes: quality, design, size, features, condition. Land value is a separate component.", "p": "101 Quiz2 Q23"}, {"n": 127, "ch": "Quiz 2: Chapters 3-4", "q": "Which of the following is NOT an indirect cost?", "o": ["Engineering fees", "Real estate taxes during construction", "Insurance", "Supervision"], "a": "D", "e": "Supervision of workers on-site is a direct cost. Engineering fees, taxes during construction, and insurance are indirect costs.", "p": "101 Quiz2 Q24"}, {"n": 128, "ch": "Quiz 2: Chapters 3-4", "q": "The easiest, fastest, and most widely used method of estimating cost is the:", "o": ["Unit-in-place", "Quantity survey", "None of the above", "Comparative unit"], "a": "D", "e": "The comparative unit (square foot) method is the most widely used - fastest for large-scale valuation.", "p": "101 Quiz2 Q25"}, {"n": 129, "ch": "Quiz 2: Chapters 3-4", "q": "An INDIRECT method of measuring depreciation is the:", "o": ["Sales comparison method", "Observed condition (breakdown) method", "Cost to cure method", "Economic age-life method"], "a": "D", "e": "Indirect methods estimate total depreciation in one step: economic age-life and modified economic age-life. The breakdown method is a direct method.", "p": "101 Quiz2 Q26"}, {"n": 130, "ch": "Quiz 2: Chapters 3-4", "q": "Kitchen outlets are inadequate. Existing cost = ,600; depreciation charged = 50%; cost to remove/install new = ,600; if installed originally = ,800. Depreciation amount is:", "o": [",400", ",600", "0,200", "00"], "a": "D", "e": "Curable functional obsolescence (modernization deficiency) = Cost to Cure minus RCN if originally installed = ,600 - ,800 = 00.", "p": "101 Quiz2 Q27"}, {"n": 131, "ch": "Quiz 2: Chapters 3-4", "q": "The type of depreciation in the kitchen outlet problem is:", "o": ["Physical incurable", "Functional incurable", "External (locational)", "Functional curable"], "a": "D", "e": "Functional curable obsolescence - the deficiency is within the building and the cost to cure is justified by the value added.", "p": "101 Quiz2 Q28"}, {"n": 132, "ch": "Quiz 2: Chapters 3-4", "q": "Residence rents for 50/month; off-street comparables rent for 00/month. GRM = 150; land-to-building ratio = 1:4. External obsolescence to the improvement is:", "o": [",500", ",625", ",800", ",000"], "a": "D", "e": "Rent loss = 0/month. Total loss = 0 x 150 = ,500. Building share = 4/5 = 80%. External obsolescence = ,500 x 0.80 = ,000.", "p": "101 Quiz2 Q29"}, {"n": 133, "ch": "Quiz 2: Chapters 3-4", "q": "The type of depreciation in the busy-street rent-loss problem is:", "o": ["Physical curable obsolescence", "Functional curable obsolescence", "Functional incurable obsolescence", "External obsolescence"], "a": "D", "e": "External (economic) obsolescence - caused by factors OUTSIDE the property. Always classified as incurable.", "p": "101 Quiz2 Q30"}]}, "102": {"title": "Income Approach to Valuation", "questions": [{"n": 1, "ch": "Ch1: Income Approach Fundamentals", "q": "The income approach is one of three approaches to value in which the appraiser derives a value indication by:", "o": ["Comparing the subject to recently sold properties", "Estimating the cost to reproduce the improvements", "Converting anticipated benefits through ownership of income-producing property", "Subtracting depreciation from reproduction cost"], "a": "C", "e": "The income approach converts the anticipated future income stream from a property into a present value indication - the foundation of income-approach appraisal.", "p": "102 p.5"}, {"n": 2, "ch": "Ch1: Income Approach Fundamentals", "q": "The economic principle of anticipation states that value is created by:", "o": ["The cost of acquiring an equally desirable substitute", "The balance of supply and demand in the marketplace", "The expectation of future benefits to be derived from the property", "The current net operating income of the property"], "a": "C", "e": "Anticipation is the underlying principle of the income approach - current value reflects the present worth of expected future income or benefits.", "p": "102 p.8"}, {"n": 3, "ch": "Ch1: Income Approach Fundamentals", "q": "The economic principle of substitution states that a property maximum value tends to be set by:", "o": ["The highest potential income the property can generate", "The reproduction cost of the improvements", "The capitalization rate derived from comparable sales", "The lowest cost or price at which another property of equivalent utility can be acquired"], "a": "D", "e": "Substitution limits value - a rational investor will not pay more for a property than the cost of acquiring one of equivalent utility.", "p": "102 p.8"}, {"n": 4, "ch": "Ch1: Income Approach Fundamentals", "q": "Competition among sellers may lead to an oversupply which reduces prices and profits. Competition among buyers may lead to:", "o": ["An oversupply which reduces prices", "A shortage which reduces prices to sellers", "An undersupply which increases prices and profits to sellers", "Equilibrium which stabilizes prices"], "a": "C", "e": "Competition among buyers creates an undersupply situation, driving prices up and increasing profits to sellers - the flip side of seller competition.", "p": "102 p.10"}, {"n": 5, "ch": "Ch1: Income Approach Fundamentals", "q": "The recapture rate reflects the:", "o": ["Return on the investment", "Effective tax rate applied to property value", "Risk premium added to the safe rate", "Return OF the investment in the wasting asset (improvement)"], "a": "D", "e": "The recapture rate provides for the return OF capital invested in the wasting asset (building). Land does not depreciate so it requires no recapture.", "p": "102 p.12"}, {"n": 6, "ch": "Ch1: Income Approach Fundamentals", "q": "Positive leverage is achieved when funds are invested in property that has:", "o": ["A higher rate of return than the cost of borrowed funds", "A lower rate of return than the cost of borrowed funds", "An equal rate of return to the cost of borrowed funds", "A guaranteed minimum return regardless of financing"], "a": "A", "e": "Positive leverage: when the property yield exceeds the mortgage interest rate, borrowing amplifies the equity return. Negative leverage is the reverse.", "p": "102 p.15"}, {"n": 7, "ch": "Ch1: Income Approach Fundamentals", "q": "The discount rate (or yield rate) reflects the:", "o": ["Return OF the investment", "Effective tax rate as a percentage of value", "Recapture of the wasting asset", "Return ON the investment"], "a": "D", "e": "The discount rate (yield rate, YO) reflects the return ON investment - the rate of return an investor requires to attract capital to the investment.", "p": "102 p.17"}, {"n": 8, "ch": "Ch1: Income Approach Fundamentals", "q": "The effective tax rate reflects the relationship between:", "o": ["The income and the cap rate", "The land value and building value", "The real estate taxes and the value of the property", "The mortgage payment and the property value"], "a": "C", "e": "ETR = Annual Real Estate Taxes / Property Value. When expressed as a decimal it can be loaded into the capitalization rate for ad valorem appraisal.", "p": "102 p.18"}, {"n": 9, "ch": "Ch1: Income Approach Fundamentals", "q": "To obtain value using the IRV formula, one must _______ the income by the rate:", "o": ["Multiply", "Add", "Subtract", "Divide"], "a": "D", "e": "IRV: Income / Rate = Value (I/R = V). To get Value, divide Income by Rate. To get Rate, divide Income by Value. To get Income, multiply Value by Rate.", "p": "102 p.20"}, {"n": 10, "ch": "Ch1: Income Approach Fundamentals", "q": "To obtain value using the VIF formula (Value = Income x Factor), one must _______ the income by the factor:", "o": ["Divide", "Add", "Subtract", "Multiply"], "a": "D", "e": "VIF: Value = Income x Factor. The income multiplier (factor) is the reciprocal of the capitalization rate: Factor = 1 / Rate.", "p": "102 p.20"}, {"n": 11, "ch": "Ch1: Income Approach Fundamentals", "q": "A mortgage on personal property is termed a:", "o": ["Blanket mortgage", "Junior mortgage", "Chattel mortgage", "Package mortgage"], "a": "C", "e": "A chattel mortgage is secured by personal property (movable assets) rather than real estate. A package mortgage covers both real and personal property.", "p": "102 p.15"}, {"n": 12, "ch": "Ch1: Income Approach Fundamentals", "q": "A junior mortgage is also called a:", "o": ["First mortgage", "Blanket mortgage", "Package mortgage", "Second mortgage"], "a": "D", "e": "A junior (or subordinate) mortgage is also called a second mortgage - it has a lower priority claim than the first mortgage in the event of default.", "p": "102 p.15"}, {"n": 13, "ch": "Ch1: Income Approach Fundamentals", "q": "A balloon payment is:", "o": ["The initial down payment required at closing", "A payment on the note balance at the end of the loan term that exceeds regular payment amounts", "An equal monthly payment that fully amortizes the loan", "The prepayment penalty charged for paying off a mortgage early"], "a": "B", "e": "A balloon payment is a large lump-sum payment due at the end of the loan term - the unpaid balance after regular (often interest-only or partially amortizing) payments.", "p": "102 p.16"}, {"n": 14, "ch": "Ch1: Income Approach Fundamentals", "q": "A package mortgage covers:", "o": ["Multiple properties owned by the same borrower", "Real estate only", "Personal property only", "Real estate as well as personal property included with the real estate"], "a": "D", "e": "A package mortgage covers both the real property and personal property included with it (e.g., appliances and equipment in a furnished apartment building).", "p": "102 p.16"}, {"n": 15, "ch": "Ch1: Income Approach Fundamentals", "q": "The four components of the summation method of developing the discount rate are:", "o": ["Safe rate, inflation rate, recapture rate, and effective tax rate", "Safe rate, illiquidity premium, management burden, and risk premium", "NOI, vacancy rate, expense ratio, and cap rate", "Land rate, building rate, equity rate, and mortgage rate"], "a": "B", "e": "Summation method: Discount Rate = Safe Rate + Illiquidity Premium + Management Burden + Risk Premium. Each component compensates for a specific investment risk or burden.", "p": "102 p.17"}, {"n": 16, "ch": "Ch2: Net Operating Income", "q": "Another name for market rent is:", "o": ["Contract rent", "Percentage rent", "Economic rent", "Overage rent"], "a": "C", "e": "Economic rent (also called market rent) is the rent a property would command in the open market as of the appraisal date - what a tenant would pay if the lease were negotiated today.", "p": "102 p.55"}, {"n": 17, "ch": "Ch2: Net Operating Income", "q": "When contract rent exceeds economic rent, the difference is known as:", "o": ["Overage rent", "Effective rent", "Excess rent", "Percentage rent"], "a": "C", "e": "Excess rent = Contract Rent minus Economic Rent. This occurs when a lease was signed at above-market rates. Excess rent may be risky if the tenant does not renew.", "p": "102 p.57"}, {"n": 18, "ch": "Ch2: Net Operating Income", "q": "The rent that is over and above a guaranteed minimum base rent (in a percentage lease) is referred to as:", "o": ["Excess rent", "Effective rent", "Contract rent", "Overage rent"], "a": "D", "e": "Overage rent is the additional rent paid above the base rent in a percentage lease, calculated as a percentage of the tenant gross sales above a breakpoint.", "p": "102 p.58"}, {"n": 19, "ch": "Ch2: Net Operating Income", "q": "A contract that requires a fixed minimum base rent plus a variable rent based on volume of business or sales is called a:", "o": ["Net lease", "Gross lease", "Renewable lease", "Percentage lease"], "a": "D", "e": "A percentage lease has two components: a guaranteed base rent (floor) plus overage rent calculated as a percentage of the tenant gross sales above the natural breakpoint.", "p": "102 p.57"}, {"n": 20, "ch": "Ch2: Net Operating Income", "q": "A lease in which the LANDLORD pays all operating expenses associated with the real estate is known as a:", "o": ["Net lease", "Triple net lease", "Gross lease", "Percentage lease"], "a": "C", "e": "A gross lease requires the landlord to pay all operating expenses (taxes, insurance, maintenance, utilities). The tenant pays only a fixed rent.", "p": "102 p.60"}, {"n": 21, "ch": "Ch2: Net Operating Income", "q": "In a triple net (NNN) lease, the tenant reimburses the landlord for:", "o": ["Mortgage payments, management fees, and reserves", "Utilities, janitorial, and security costs only", "All operating expenses including capital expenditures", "Insurance, real estate taxes, and common area maintenance (CAM)"], "a": "D", "e": "Triple net (NNN): tenant pays base rent PLUS insurance, real estate taxes, and CAM. The landlord net income is clean of these three expenses.", "p": "102 p.60"}, {"n": 22, "ch": "Ch2: Net Operating Income", "q": "The total leasable area including common areas is known as:", "o": ["Net rentable area (NRA)", "Gross building area (GBA)", "Gross leasable area (GLA)", "Usable area"], "a": "C", "e": "Gross Leasable Area (GLA) includes all tenant-leasable space plus common areas. Net Rentable Area (NRA) is space actually rented. Gross Building Area (GBA) includes all space including mechanical and structural.", "p": "102 p.65"}, {"n": 23, "ch": "Ch2: Net Operating Income", "q": "Effective Gross Income (EGI) is defined as:", "o": ["Potential gross income minus all operating expenses", "Total gross income before any deductions", "Potential gross income minus vacancy and collection loss plus miscellaneous income", "Net operating income before reserves for replacement"], "a": "C", "e": "EGI = PGI - Vacancy and Collection Loss + Miscellaneous Income. It represents the income the property is actually expected to collect.", "p": "102 p.70"}, {"n": 24, "ch": "Ch2: Net Operating Income", "q": "Income from vending machines and coin-operated laundries in an apartment building is considered:", "o": ["Effective gross income", "Potential gross income", "Miscellaneous income", "Net operating income"], "a": "C", "e": "Vending, laundry, parking fees, and other ancillary income are miscellaneous income - added to PGI (net of vacancy) to arrive at EGI.", "p": "102 p.73"}, {"n": 25, "ch": "Ch2: Net Operating Income", "q": "Which of the following would be considered a proper expense in the reconstructed operating expense statement?", "o": ["Salaries only", "Management fees only", "Utilities only", "All of the above: salaries, management, and utilities"], "a": "D", "e": "Proper operating expenses include: management, salaries, utilities, insurance, maintenance, repairs, real estate taxes (when included in NOI), and reserves. Debt service and depreciation are NOT proper operating expenses.", "p": "102 p.75"}, {"n": 26, "ch": "Ch2: Net Operating Income", "q": "In a reconstructed income/expense statement, depreciation and debt service are considered:", "o": ["Proper operating expenses to be deducted", "Reserves for replacement", "Improper expenses that are excluded", "Miscellaneous income items"], "a": "C", "e": "Depreciation (accounting) and debt service (mortgage payments) are improper expenses - they are excluded from the reconstructed operating expense statement because they are owner-specific or non-operating items.", "p": "102 p.78"}, {"n": 27, "ch": "Ch2: Net Operating Income", "q": "Expense amounts for short-lived items such as carpet, drapes, and water heaters are considered:", "o": ["Operating expenses deducted annually", "Improper expenses excluded from the statement", "Potential gross income adjustments", "Reserves for replacement"], "a": "D", "e": "Reserves for replacement (capital reserves) are annual allowances set aside for periodic replacement of short-lived components - carpet, drapes, water heaters, HVAC, etc.", "p": "102 p.78"}, {"n": 28, "ch": "Ch2: Net Operating Income", "q": "Net Operating Income (NOI) is defined as:", "o": ["Potential gross income minus vacancy loss", "Effective gross income before operating expenses", "Effective gross income minus operating expenses minus reserves for replacement", "Total revenue minus mortgage payments"], "a": "C", "e": "NOI = EGI minus Operating Expenses minus Reserves for Replacement. It is the income remaining before debt service - the income available to the investment.", "p": "102 p.80"}, {"n": 29, "ch": "Ch2: Net Operating Income", "q": "Tenant improvement allo
